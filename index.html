<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Travel OS 1.0.6-R</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <style>
        :root {
            --os-height: 100dvh;
            --safe-top: env(safe-area-inset-top, 47px);
            --safe-bottom: env(safe-area-inset-bottom, 34px);
            --spring-fluid: cubic-bezier(0.23, 1, 0.32, 1);

            /* 初始变量同步：11:11 AM 晴昼模式 */
            --ambient-1: #f0f9ff; 
            --ambient-2: #ffffff;
            --ambient-stop: #e0f2fe; /* 规则 1：完全替换硬编码黑色 */
            --text-primary: rgba(28, 28, 30, 0.85);
            --text-sub: rgba(60, 60, 67, 0.6);
            --glass-blur: 35px;
        }

        body, html {
            width: 100vw; height: var(--os-height);
            margin: 0; padding: 0; overflow: hidden; 
            background-color: var(--ambient-2); 
            font-family: -apple-system, "SF Pro Display", sans-serif;
            transition: background 1.5s var(--spring-fluid);
        }

        /* 规则 1 & 3：背景引擎与层级隔离 */
        .ambient-engine {
            position: fixed; inset: 0;
            background: 
                radial-gradient(circle at 10% 0%, var(--ambient-1) 0%, transparent 80%),
                radial-gradient(circle at 90% 100%, var(--ambient-stop) 0%, transparent 80%),
                linear-gradient(160deg, var(--ambient-1) 0%, var(--ambient-stop) 100%);
            background-size: 150% 150%;
            z-index: -1; transform: translateZ(0);
            animation: fluid-vibe 30s infinite alternate linear;
            /* 规则 3：增加隔离层，防止 Safari 渲染崩溃 */
            isolation: isolate; 
        }

        @keyframes fluid-vibe {
            0% { background-position: 0% 0%; }
            100% { background-position: 15% 10%; }
        }

        .weather-overlay {
            position: fixed; inset: 0;
            background: url('data:image/svg+xml,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity="0.015"/></svg>');
            z-index: 0; pointer-events: none;
        }

        /* 静息铭牌：规则 2 & 3 */
        .nameplate {
            position: relative; margin: 0 16px 12px 16px; width: auto;
            padding: 14px 20px; background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(var(--glass-blur)) saturate(1.8);
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(1.8);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px; transition: all 0.5s var(--spring-fluid);
            z-index: 50; cursor: pointer;
            color: var(--text-primary);
        }

        /* 展开状态：绝对对称居中 */
        .nameplate.expanded {
            position: fixed; margin: 0; left: 16px; right: 16px; 
            top: 50%; transform: translateY(-50%);
            max-height: 70dvh;
            background: rgba(255, 255, 255, 0.96);
            color: #1c1c1e; z-index: 1000;
            padding: 0; border-radius: 28px;
            display: flex; flex-direction: column;
            box-shadow: 0 40px 100px rgba(0,0,0,0.15);
        }

        .expanded-content {
            padding: 24px; overflow-y: auto;
            overscroll-behavior: contain; -webkit-overflow-scrolling: touch;
        }

        .overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 999; opacity: 0; pointer-events: none;
            transition: opacity 0.5s var(--spring-fluid);
        }
        .overlay.active { opacity: 1; pointer-events: auto; }

        .tag { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 2px; font-weight: 500; opacity: 0.6; }
        .title { font-size: 19px; font-weight: 400; letter-spacing: -0.3px;}
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function useChronosEngine() {
            const [state, setState] = useState({ label: "..." });

            useEffect(() => {
                const updateEngine = () => {
                    const hour = new Date().getHours();
                    const root = document.documentElement;
                    let chronos;

                    if (hour >= 5 && hour < 8) {
                        chronos = { label: "晨曦", isDark: false, colors: ["#fef2f2", "#fff7ed", "#fff1f2"] };
                    } else if (hour >= 8 && hour < 17) {
                        // 规则 2：提高晴昼白平衡，确保通透
                        chronos = { label: "晴昼", isDark: false, colors: ["#f0f9ff", "#ffffff", "#e0f2fe"] }; 
                    } else if (hour >= 17 && hour < 19.5) {
                        chronos = { label: "暮色", isDark: true, colors: ["#451a03", "#78350f", "#2d0a05"] };
                    } else {
                        chronos = { label: "夜空", isDark: true, colors: ["#0f172a", "#020617", "#010103"] };
                    }

                    root.style.setProperty('--ambient-1', chronos.colors[0]);
                    root.style.setProperty('--ambient-2', chronos.colors[1]);
                    root.style.setProperty('--ambient-stop', chronos.colors[2]);
                    root.style.setProperty('--text-primary', chronos.isDark ? 'rgba(255, 255, 255, 0.95)' : 'rgba(28, 28, 30, 0.85)');
                    root.style.setProperty('--text-sub', chronos.isDark ? 'rgba(255, 255, 255, 0.5)' : 'rgba(60, 60, 67, 0.6)');
                    
                    setState(chronos);
                };

                updateEngine();
                const interval = setInterval(updateEngine, 60000);
                return () => clearInterval(interval);
            }, []);

            return state;
        }

        function App() {
            const [activeId, setActiveId] = useState(null);
            const { label } = useChronosEngine();

            return (
                <div style={{ height: '100%', position: 'relative' }}>
                    <div className="ambient-engine" />
                    <div className="weather-overlay" />
                    <div className={`overlay ${activeId ? 'active' : ''}`} onClick={() => setActiveId(null)} />

                    <main style={{ padding: 'calc(var(--safe-top) + 20px) 0' }}>
                        <header style={{ padding: '0 16px', marginBottom: '36px' }}>
                            <h1 style={{ color: 'var(--text-primary)', fontWeight: 300, fontSize: '32px', margin: 0 }}>Kuala Lumpur</h1>
                            <p style={{ color: 'var(--text-sub)', fontSize: '14px', marginTop: '6px', fontWeight: 300 }}>{label} · OS 1.0.6-R 稳定运行</p>
                        </header>

                        <div className={`nameplate ${activeId === 1 ? 'expanded' : ''}`} onClick={() => { if (!activeId) setActiveId(1); }}>
                            <div className={activeId === 1 ? "expanded-content" : ""}>
                                <div className="tag">Dining · 19:30</div>
                                <div className="title">KIWAMI Yakiniku</div>
                                {activeId === 1 && (
                                    <div style={{ marginTop: '24px', fontSize: '15px', lineHeight: '1.6' }}>
                                        <b>白平衡修复确认：</b> 当前为晴昼模式，背景已移除硬编码黑色，呈现出极致的高透蔚蓝质感。点击外部背景可收起。
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className={`nameplate ${activeId === 2 ? 'expanded' : ''}`} onClick={() => { if (!activeId) setActiveId(2); }} style={{ opacity: activeId === 1 ? 0 : 1 }}>
                            <div className={activeId === 2 ? "expanded-content" : ""}>
                                <div className="tag">Flight · 09:00</div>
                                <div className="title">MH001 · 台北</div>
                                {activeId === 2 && (
                                    <div style={{ marginTop: '24px', fontSize: '15px', lineHeight: '1.6' }}>
                                        <b>渲染层隔离测试：</b> 启用 isolation: isolate 协议，确保在高帧率手势下，复合层渲染保持绝对稳定。
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
