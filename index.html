<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Travel Log | OS 1.0.4 🧳</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js" defer></script>
  <style>
    /* ==========================================================================
       OS 1.0.4 - Industrial Stable (Gemini Team Edition)
       Apple iOS 26 Liquid Glass Environment
       ========================================================================== */
    :root {
      --apple-ease: cubic-bezier(0.32, 0.72, 0, 1);
      --rim-opacity: 0.4;
      --blur-radius: 25px;
      --focus-scale: 0.98;
      --apple-blue: #0071e3;
    }

    body {
      margin: 0; padding: 0; background-color: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden; /* 由 ContentLayer 處理滾動，鎖死底層 */
      color: #1D1D1F;
    }

    /* ----------------------------------------------------
       Phase 1: 四層實體殼層 (Layered Shell)
       ---------------------------------------------------- */
    #background-layer {
      position: fixed; inset: -20%; z-index: -10; pointer-events: none;
      background: radial-gradient(circle at 15% 15%, #e8f0fe 0%, transparent 50%),
                  radial-gradient(circle at 85% 85%, #f6eef2 0%, transparent 50%);
      background-size: 200% 200%; filter: blur(100px);
      transition: filter 1.5s ease, background 1.5s ease;
      will-change: transform;
      animation: ambientShift 30s ease-in-out infinite alternate;
    }
    @keyframes ambientShift { 0% { background-position: 0% 0%; } 100% { background-position: 100% 100%; } }

    #content-layer {
      position: relative; z-index: 1; height: 100dvh; overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch; 
      padding-bottom: calc(env(safe-area-inset-bottom) + 20px);
      transition: padding-bottom 0.4s var(--apple-ease), transform 0.4s var(--apple-ease);
      transform-origin: center center;
    }

    #chrome-layer { position: fixed; inset: 0; z-index: 90; pointer-events: none; }
    #modal-layer { position: fixed; inset: 0; z-index: 100; pointer-events: none; }

    /* ----------------------------------------------------
       Phase 2: Liquid Glass 2.0 (Physical Rim Light)
       ---------------------------------------------------- */
    .liquid-glass {
      position: relative; border: none !important;
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(var(--blur-radius)) saturate(180%);
      -webkit-backdrop-filter: blur(var(--blur-radius)) saturate(180%);
      border-radius: 28px;
      /* 光學擴散厚度感 */
      box-shadow: 
        inset 0 0 0 0.5px rgba(255, 255, 255, var(--rim-opacity)),
        0 12px 40px rgba(0, 0, 0, 0.05);
      transition: all 0.4s var(--apple-ease);
    }

    .theme-dark .liquid-glass {
      background: rgba(0, 0, 0, 0.2);
      --rim-opacity: 0.2; /* 亮度感知：深色模式光感柔和 */
      color: #FFF;
    }

    /* 三級模糊降級 (滾動性能保護) */
    .scrolling .liquid-glass { --blur-radius: 8px; }

    /* ----------------------------------------------------
       Phase 3: 深度聚焦 (Depth Focus) 與交互反饋
       ---------------------------------------------------- */
    .is-unfocused {
      opacity: 0.4; transform: scale(var(--focus-scale));
      filter: blur(1.5px) brightness(0.95);
    }

    .apple-pulse { animation: pulse 0.4s var(--apple-ease); }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    .tap-scale:active { transform: scale(0.96); opacity: 0.8; }

    /* ----------------------------------------------------
       Phase 4: Daily Planner (Timeline UI)
       ---------------------------------------------------- */
    .timeline-container { position: relative; padding-left: 56px; }
    .timeline-line {
      position: absolute; left: 27px; top: 0; bottom: 0;
      width: 1.5px; background: linear-gradient(to bottom, var(--apple-blue), transparent);
      opacity: 0.3; transition: all 0.4s var(--apple-ease);
    }
    .timeline-line.conflict {
      background: linear-gradient(to bottom, #ff3b30, transparent);
      animation: elasticRepulsion 0.6s var(--apple-ease) infinite alternate;
    }
    @keyframes elasticRepulsion { 0% { transform: translateX(0); } 100% { transform: translateX(2px); } }

    .activity-node {
      position: absolute; left: -34px; top: 18px;
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--apple-blue); box-shadow: 0 0 8px rgba(0, 113, 227, 0.4);
    }

    .inplace-input {
      background: rgba(0,0,0,0.03); border-radius: 12px;
      padding: 12px 16px; width: 100%; border: none; outline: none;
      font-size: 17px; font-weight: 500; font-family: inherit;
      color: inherit;
    }

    /* Swipe 手勢防護 */
    .swipe-container { position: relative; overflow: hidden; border-radius: 28px; }
    .swipe-actions {
      position: absolute; right: 0; top: 0; bottom: 0; width: 100px;
      display: flex; align-items: center; justify-content: flex-end; padding-right: 28px;
      color: #FF3B30; font-size: 24px; z-index: 0; opacity: 0;
      background: rgba(255, 255, 255, 0.9);
      -webkit-mask-image: linear-gradient(to right, transparent 0%, black 24px);
    }
    .swipe-card { position: relative; z-index: 1; transition: transform 0.4s var(--apple-ease); will-change: transform; }

    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="theme-light">

  <div id="background-layer"></div>

  <div id="content-layer" class="no-scrollbar">
    </div>

  <div id="chrome-layer">
    <button id="btn-fab" data-action="open-create-modal" class="fixed bottom-10 left-1/2 -translate-x-1/2 w-[64px] h-[64px] rounded-full z-[90] tap-scale pointer-events-auto" style="display: none;">
       <div class="liquid-glass flex items-center justify-center text-[var(--apple-blue)] w-full h-full shadow-lg" style="border-radius: 50%;">
         <i class="fa-solid fa-plus text-2xl font-light"></i>
       </div>
    </button>
  </div>

  <div id="modal-layer"></div>

  <script>
    // ==========================================================================
    // OS 1.0.4 Industrial Logic Core
    // ==========================================================================

    const AppUtils = {
      generateId: () => {
        try { return crypto.randomUUID(); } 
        catch (e) { return 'id-' + Date.now() + Math.random().toString(36).slice(2, 9); }
      }
    };

    // --- Phase 0: 數據防護與遷移 (P0級) ---
    const DataManager = {
      key: 'OS_104_MASTER',
      state: { trips: [], activeId: null, view: 'home' },

      init() {
        const raw = localStorage.getItem('TRAVEL_LOG_DATA') || localStorage.getItem(this.key);
        if (raw) {
          localStorage.setItem('TRAVEL_LOG_BACKUP_103', raw); // 影子備份
          let parsed = JSON.parse(raw);
          
          // 數據清洗與升級
          this.state.trips = (parsed.trips || []).map(t => ({
            ...t,
            days: (t.days || []).map(d => ({ 
              ...d, 
              activities: d.activities || [] // 強制補全 Daily Planner 結構
            }))
          }));
          this.save();
        }
      },
      save() { localStorage.setItem(this.key, JSON.stringify(this.state)); }
    };

    // --- Phase 1: 環境協調器 (純計算) ---
    const EnvironmentCoordinator = {
      compute(weatherCode) {
        const isRainy = [51,53,55,61,63,65,80,81,82,95].includes(weatherCode);
        return {
          themeId: isRainy ? 'theme-dark' : 'theme-light',
          bgGradient: isRainy ? 'from-[#3a4750] to-[#2c3e50]' : 'from-[#5cb0ff] to-[#80c6ff]'
        };
      }
    };

    // --- Phase 2: 局部渲染與視圖更新 ---
    const Renderer = {
      render() {
        const content = document.getElementById('content-layer');
        const fab = document.getElementById('btn-fab');
        
        if (DataManager.state.view === 'home') {
          fab.style.display = 'block';
          content.innerHTML = this.tempHome();
          GestureManager.bindSwipe();
        } else {
          fab.style.display = 'none';
          this.renderEditor();
        }
      },

      patchSlot(id, html) {
        const el = document.getElementById(id);
        if (el && el.innerHTML !== html) {
          el.innerHTML = html;
          el.classList.add('apple-pulse');
          setTimeout(() => el.classList.remove('apple-pulse'), 400);
        }
      },

      tempHome() {
        return `
          <div class="max-w-3xl mx-auto px-6 py-20">
            <h1 class="text-[34px] font-extrabold mb-10 tracking-tight">行程助手 🧳</h1>
            <div class="space-y-6">
              ${DataManager.state.trips.map(t => `
                <div class="swipe-container group" data-id="${t.id}">
                  <div class="swipe-actions"><i class="fa-solid fa-trash-can"></i></div>
                  <div class="swipe-card liquid-glass p-6 cursor-pointer tap-scale" data-action="open-trip" data-id="${t.id}">
                    <div class="text-[13px] font-bold opacity-40 mb-2 tracking-wide">${t.startDate} ─ ${t.endDate}</div>
                    <h3 class="text-[22px] font-bold tracking-tight">${t.title}</h3>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      },

      renderEditor() {
        const trip = DataManager.state.trips.find(t => t.id === DataManager.state.activeId);
        const content = document.getElementById('content-layer');
        content.innerHTML = `
          <div class="min-h-screen pb-40">
            <header class="px-6 pt-16 flex items-center justify-between mb-8">
               <button data-action="go-home" class="w-10 h-10 liquid-glass rounded-full flex items-center justify-center tap-scale"><i class="fa-solid fa-chevron-left"></i></button>
               <h2 class="text-lg font-bold tracking-tight">${trip.title}</h2>
               <div class="w-10"></div>
            </header>
            <div class="px-6 space-y-12">
              ${trip.days.map((d, i) => this.tempDay(d, i)).join('')}
            </div>
          </div>
        `;
      },

      tempDay(day, idx) {
        return `
          <div class="relative">
            <div class="flex items-center gap-4 mb-6">
              <div class="w-8 h-8 rounded-full bg-[var(--apple-blue)] text-white text-xs font-bold flex items-center justify-center shadow-lg">D${idx+1}</div>
              <h3 class="text-[22px] font-bold tracking-tight">${day.destination || '你想去哪？'}</h3>
            </div>
            <div class="timeline-container">
              <div class="timeline-line" id="line-${day.id}"></div>
              <div id="activities-${day.id}" class="space-y-4">
                ${this.tempActivities(day)}
              </div>
              <div class="mt-6" id="add-btn-area-${day.id}">
                <button data-action="start-quick-add" data-day="${day.id}" class="text-[var(--apple-blue)] font-bold text-[15px] tap-scale flex items-center gap-2">
                  <i class="fa-solid fa-plus-circle"></i> 添加活動
                </button>
              </div>
            </div>
          </div>
        `;
      },

      tempActivities(day) {
        if (!day.activities || !day.activities.length) return `<div class="text-sm opacity-30 italic py-2">該日尚未安排活動</div>`;
        return day.activities.map(act => `
          <div class="activity-item relative liquid-glass p-5" data-id="${act.id}">
            <div class="activity-node"></div>
            <div class="flex justify-between items-center">
              <div class="flex-1">
                <div class="text-[12px] font-bold opacity-40 uppercase mb-1 tracking-wider">${act.time || '全天'}</div>
                <div class="font-bold text-[18px]">${act.title}</div>
              </div>
              <div class="text-xl opacity-40">📍</div>
            </div>
          </div>
        `).join('');
      }
    };

    // --- Phase 3: 手勢與視口管理 (iPhone 穩定性) ---
    const GestureManager = {
      bindSwipe() {
        document.querySelectorAll('.swipe-card').forEach(card => {
          let startX = 0, currentX = 0;
          card.ontouchstart = (e) => {
            if (e.touches[0].clientX < 20) return; // iOS 邊緣死區 (Edge Swipe 防護)
            startX = e.touches[0].clientX;
            card.style.transition = 'none';
          };
          card.ontouchmove = (e) => {
            if (startX === 0) return;
            currentX = Math.max(e.touches[0].clientX - startX, -100);
            if (currentX < 0) card.style.transform = `translateX(${currentX}px)`;
          };
          card.ontouchend = () => {
            if (startX === 0) return;
            card.style.transition = 'transform 0.4s var(--apple-ease)';
            if (currentX < -65) {
              card.style.transform = 'translateX(-120vw)';
              setTimeout(() => App.deleteTrip(card.parentElement.dataset.id), 300);
            } else { card.style.transform = 'translateX(0)'; }
            startX = 0; currentX = 0;
          };
        });
      }
    };

    const SafariFix = {
      init() {
        // 滾動感知降級
        const content = document.getElementById('content-layer');
        let scrollTimer;
        content.addEventListener('scroll', () => {
          document.body.classList.add('scrolling');
          clearTimeout(scrollTimer);
          scrollTimer = setTimeout(() => document.body.classList.remove('scrolling'), 150);
        }, { passive: true });

        // VisualViewport 鍵盤補償
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', () => {
            const offset = window.innerHeight - window.visualViewport.height;
            if (offset > 50) {
              content.style.paddingBottom = `${offset + 20}px`;
              // 40% 重心定位
              const activeEl = document.activeElement;
              if (activeEl) setTimeout(() => activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
            } else {
              content.style.paddingBottom = 'calc(env(safe-area-inset-bottom) + 20px)';
            }
          });
        }
      }
    };

    // --- Phase 4: 全局控制器 (App Controller) ---
    const App = {
      init() {
        DataManager.init();
        Renderer.render();
        SafariFix.init();
        this.bindDelegation();
      },

      bindDelegation() {
        document.addEventListener('click', e => {
          const target = e.target.closest('[data-action]');
          if (!target) return;
          const action = target.dataset.action;

          if (action === 'open-trip') {
            DataManager.state.activeId = target.dataset.id;
            DataManager.state.view = 'editor';
            Renderer.render();
          }
          else if (action === 'go-home') {
            DataManager.state.view = 'home';
            DataManager.state.activeId = null;
            Renderer.render();
          }
          else if (action === 'open-create-modal') this.openCreateModal();
          else if (action === 'close-modal') this.closeModal();
          else if (action === 'confirm-create') this.confirmCreateTrip();
          else if (action === 'start-quick-add') this.startQuickAdd(target.dataset.day);
        });
      },

      deleteTrip(id) {
        DataManager.state.trips = DataManager.state.trips.filter(t => t.id !== id);
        DataManager.save();
        Renderer.render();
      },

      // --- 深度交互：原地流式編輯 (In-place Flow Edit) ---
      startQuickAdd(dayId) {
        const container = document.getElementById(`activities-${dayId}`);
        const btnArea = document.getElementById(`add-btn-area-${dayId}`);
        btnArea.style.display = 'none'; // 隱藏添加按鈕

        const slotId = 'slot-' + AppUtils.generateId();
        const html = `
          <div id="${slotId}" class="liquid-glass p-5 apple-pulse">
            <input type="text" class="inplace-input" placeholder="去哪裡？做什麼？" onkeydown="if(event.key==='Enter') App.commitQuickAdd('${dayId}', '${slotId}', this.value)" onblur="App.cancelQuickAdd('${dayId}', '${slotId}', this.value)">
            <div class="text-[11px] font-medium opacity-40 mt-3 text-right">按 Enter 同步 ☁️</div>
          </div>
        `;
        
        // 移除「尚未安排」提示
        if (container.innerHTML.includes('尚未安排活動')) container.innerHTML = '';
        container.insertAdjacentHTML('beforeend', html);
        
        // 心流保護 (Depth Focus)
        document.querySelectorAll('.activity-item').forEach(el => el.classList.add('is-unfocused'));
        
        const input = document.getElementById(slotId).querySelector('input');
        input.focus();
      },

      commitQuickAdd(dayId, slotId, value) {
        if (!value.trim()) { this.cancelQuickAdd(dayId, slotId, ''); return; }
        
        const trip = DataManager.state.trips.find(t => t.id === DataManager.state.activeId);
        const day = trip.days.find(d => d.id === dayId);
        day.activities.push({ id: AppUtils.generateId(), title: value, time: '12:00' }); // 預設時間，實戰可擴展
        DataManager.save();

        this.restoreFocus(dayId);
      },

      cancelQuickAdd(dayId, slotId, value) {
        if(value.trim()) { this.commitQuickAdd(dayId, slotId, value); return; } // 失焦保存
        this.restoreFocus(dayId);
      },

      restoreFocus(dayId) {
        document.querySelectorAll('.activity-item').forEach(el => el.classList.remove('is-unfocused'));
        const trip = DataManager.state.trips.find(t => t.id === DataManager.state.activeId);
        Renderer.patchSlot(`activities-${dayId}`, Renderer.tempActivities(trip.days.find(d => d.id === dayId)));
        document.getElementById(`add-btn-area-${dayId}`).style.display = 'block';
      },

      // --- Modal 邏輯 (僅保留給行程創建) ---
      openCreateModal() {
        const layer = document.getElementById('modal-layer');
        layer.style.pointerEvents = 'auto';
        layer.innerHTML = `
          <div class="absolute inset-0 bg-black/10 backdrop-blur-md" data-action="close-modal"></div>
          <div id="modal-card" class="absolute bottom-0 left-0 w-full md:relative md:mx-auto md:mt-24 md:max-w-md liquid-glass rounded-t-[40px] md:rounded-[40px] p-8 pb-12 transition-transform duration-500 translate-y-full">
            <h2 class="text-2xl font-bold mb-8 text-center">新的旅行 ☁️</h2>
            <div class="space-y-4">
              <input id="new-trip-title" type="text" class="inplace-input" style="background:rgba(255,255,255,0.5)" placeholder="行程名稱 (例如：北海道冬日遊)">
              <div class="flex gap-4">
                <input id="new-trip-start" type="date" class="inplace-input" style="background:rgba(255,255,255,0.5)">
                <input id="new-trip-end" type="date" class="inplace-input" style="background:rgba(255,255,255,0.5)">
              </div>
            </div>
            <button data-action="confirm-create" class="w-full h-14 bg-[#1D1D1F] text-white rounded-2xl font-bold mt-8 tap-scale">建立行程</button>
          </div>
        `;
        setTimeout(() => document.getElementById('modal-card').classList.remove('translate-y-full'), 10);
      },

      closeModal() {
        const card = document.getElementById('modal-card');
        if (card) card.classList.add('translate-y-full');
        setTimeout(() => {
          document.getElementById('modal-layer').innerHTML = '';
          document.getElementById('modal-layer').style.pointerEvents = 'none';
        }, 400);
      },

      confirmCreateTrip() {
        const title = document.getElementById('new-trip-title').value;
        const start = document.getElementById('new-trip-start').value;
        const end = document.getElementById('new-trip-end').value;
        if (!title || !start) return;

        DataManager.state.trips.unshift({
          id: AppUtils.generateId(),
          title, startDate: start, endDate: end,
          days: [{ id: AppUtils.generateId(), destination: '首站目的地', activities: [] }]
        });
        DataManager.save();
        this.closeModal();
        Renderer.render();
      }
    };

    App.init();
  </script>
</body>
</html>
