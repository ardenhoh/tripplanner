<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Travel OS 1.0.5-S</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <style>
        :root {
            --os-height: 100dvh;
            --safe-top: env(safe-area-inset-top, 47px);
            --safe-bottom: env(safe-area-inset-bottom, 34px);
            --spring-fluid: cubic-bezier(0.23, 1, 0.32, 1);

            /* 全时段流体节点变量 (由 JS 根据当前时间下发) */
            --aura-1: transparent; 
            --aura-2: transparent; 
            --aura-3: transparent; 
            --base-bg: #000; 

            --text-primary: rgba(255, 255, 255, 0.95);
            --text-sub: rgba(255, 255, 255, 0.5);
        }

        body, html {
            width: 100vw; height: var(--os-height);
            margin: 0; padding: 0; overflow: hidden; 
            background-color: var(--base-bg);
            font-family: -apple-system, "SF Pro Display", sans-serif;
            -webkit-font-smoothing: antialiased;
            transition: background-color 2s var(--spring-fluid);
        }

        /* 脉冲气场引擎：全时段多频干涉 */
        .ambient-engine {
            position: fixed; inset: 0; z-index: -1; 
            isolation: isolate; overflow: hidden;
            background: var(--base-bg);
        }

        /* 使用极致模糊与透明度实现物理级色光混合，防 Safari 色带断层 */
        .aura-node {
            position: absolute; border-radius: 50%;
            filter: blur(90px); will-change: transform;
            opacity: 0.55; 
        }

        /* 三个频段的非线性运动轨迹 */
        .n1 { width: 150vw; height: 150vh; background: var(--aura-1); top: -25%; left: -25%; animation: drift-1 22s infinite alternate ease-in-out; }
        .n2 { width: 130vw; height: 130vh; background: var(--aura-2); bottom: -20%; right: -20%; animation: drift-2 28s infinite alternate-reverse ease-in-out; }
        .n3 { width: 100vw; height: 100vh; background: var(--aura-3); top: 20%; left: 10%; animation: drift-3 35s infinite alternate ease-in-out; }

        @keyframes drift-1 { 0% { transform: translate3d(0,0,0) rotate(0deg); } 100% { transform: translate3d(15vw, 10vh, 0) rotate(15deg); } }
        @keyframes drift-2 { 0% { transform: translate3d(0,0,0) rotate(0deg); } 100% { transform: translate3d(-10vw, -15vh, 0) rotate(-20deg); } }
        @keyframes drift-3 { 0% { transform: translate3d(0,0,0) scale(1); } 100% { transform: translate3d(5vw, 5vh, 0) scale(1.1); } }

        .weather-noise {
            position: fixed; inset: 0;
            background: url('data:image/svg+xml,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity="0.04"/></svg>');
            z-index: 0; pointer-events: none; mix-blend-mode: overlay;
        }

        /* 静息铭牌 */
        .nameplate {
            position: relative; margin: 0 16px 12px 16px; width: auto;
            padding: 14px 20px; background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(35px) saturate(1.8);
            -webkit-backdrop-filter: blur(35px) saturate(1.8);
            border: 0.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px; transition: all 0.5s var(--spring-fluid);
            z-index: 50; cursor: pointer; color: var(--text-primary);
            box-shadow: inset 0 0.5px 1px rgba(255, 255, 255, 0.25), 0 4px 12px rgba(0,0,0,0.02);
        }

        /* 坐标系弹性锚定 - 解决动画末端震荡掉落问题 */
        .expanded-wrapper {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; padding: 0 16px;
            pointer-events: none;
        }

        .nameplate.expanded {
            position: relative; margin: 0; left: 0; right: 0;
            width: 100%; max-height: 75dvh;
            background: rgba(255, 255, 255, 0.96);
            color: #1c1c1e; pointer-events: auto;
            border-radius: 30px; display: flex; flex-direction: column;
            box-shadow: 0 40px 120px rgba(0,0,0,0.12);
        }

        .expanded-content {
            padding: 26px; overflow-y: auto;
            overscroll-behavior: contain; -webkit-overflow-scrolling: touch;
        }

        .overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 999; opacity: 0; pointer-events: none;
            transition: opacity 0.6s var(--spring-fluid);
        }
        .overlay.active { opacity: 1; pointer-events: auto; }

        .tag { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 2px; font-weight: 600; opacity: 0.6; }
        .title { font-size: 19px; font-weight: 400; letter-spacing: -0.5px;}
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function useChronosEngine() {
            const [timeState, setTimeState] = useState({ label: "获取时空中...", time: "" });

            useEffect(() => {
                const update = () => {
                    const now = new Date();
                    const hour = now.getHours();
                    const mins = now.getMinutes().toString().padStart(2, '0');
                    const root = document.documentElement;
                    
                    // 全时段流体配色矩阵 [Node 1, Node 2, Node 3, Base Background]
                    let chronos;
                    if (hour < 5) {
                        chronos = { label: "曙前", isDark: true, colors: ["#0d9488", "#0f766e", "#042f2e", "#022c22"] };
                    } else if (hour < 8) {
                        chronos = { label: "晨曦", isDark: false, colors: ["#fca5a5", "#fde047", "#fed7aa", "#fdfcf0"] };
                    } else if (hour < 17) {
                        chronos = { label: "晴昼", isDark: false, colors: ["#7dd3fc", "#bae6fd", "#e0f2fe", "#fdfcf0"] };
                    } else if (hour < 20) {
                        // 匹配当前 18:00+ 暮色时段的浓郁光影
                        chronos = { label: "暮色", isDark: true, colors: ["#f59e0b", "#9d174d", "#7c2d12", "#1a0a05"] };
                    } else {
                        chronos = { label: "夜空", isDark: true, colors: ["#1e3a8a", "#312e81", "#0f172a", "#020617"] };
                    }

                    root.style.setProperty('--aura-1', chronos.colors[0]);
                    root.style.setProperty('--aura-2', chronos.colors[1]);
                    root.style.setProperty('--aura-3', chronos.colors[2]);
                    root.style.setProperty('--base-bg', chronos.colors[3]);
                    
                    root.style.setProperty('--text-primary', chronos.isDark ? 'rgba(255,255,255,0.95)' : 'rgba(28,28,30,0.85)');
                    root.style.setProperty('--text-sub', chronos.isDark ? 'rgba(255,255,255,0.5)' : 'rgba(60,60,67,0.6)');
                    
                    setTimeState({ label: chronos.label, time: `${hour}:${mins}` });
                };
                
                update();
                const itv = setInterval(update, 60000);
                return () => clearInterval(itv);
            }, []);
            return timeState;
        }

        function App() {
            const [activeId, setActiveId] = useState(null);
            const { label, time } = useChronosEngine();

            return (
                <div style={{ height: '100%', position: 'relative' }}>
                    <div className="ambient-engine">
                        <div className="aura-node n1"></div>
                        <div className="aura-node n2"></div>
                        <div className="aura-node n3"></div>
                    </div>
                    <div className="weather-noise" />
                    <div className={`overlay ${activeId ? 'active' : ''}`} onClick={() => setActiveId(null)} />

                    <main style={{ padding: 'calc(var(--safe-top) + 20px) 0' }}>
                        <header style={{ padding: '0 16px', marginBottom: '40px' }}>
                            <h1 style={{ color: 'var(--text-primary)', fontWeight: 300, fontSize: '32px', margin: 0, letterSpacing: '-0.8px' }}>Kuala Lumpur</h1>
                            <p style={{ color: 'var(--text-sub)', fontSize: '14px', marginTop: '6px', fontWeight: 300 }}>{label} · {time}</p>
                        </header>

                        <div className="nameplate" onClick={() => setActiveId(1)} style={{ opacity: activeId === 1 ? 0 : 1 }}>
                            <div className="tag">Dining · 19:30</div>
                            <div className="title">KIWAMI Yakiniku</div>
                        </div>

                        <div className="nameplate" onClick={() => setActiveId(2)} style={{ opacity: activeId ? 0 : 1 }}>
                            <div className="tag">Flight · 09:00</div>
                            <div className="title">MH001 · 台北</div>
                        </div>

                        {/* 完美居中且无震荡的弹性包装层 */}
                        {activeId && (
                            <div className="expanded-wrapper">
                                <div className="nameplate expanded" onClick={(e) => e.stopPropagation()}>
                                    <div className="expanded-content">
                                        <div className="tag">{activeId === 1 ? 'Dining · 19:30' : 'Flight · 09:00'}</div>
                                        <div className="title" style={{ fontSize: '24px', fontWeight: 500, marginTop: '4px' }}>
                                            {activeId === 1 ? 'KIWAMI Yakiniku' : 'MH001 · 飞往台北'}
                                        </div>
                                        <div style={{ marginTop: '24px', fontSize: '15px', lineHeight: '1.7', color: '#1c1c1e' }}>
                                            <b>全时段流体校验完成：</b><br/>
                                            目前正处于“暮色”时段。系统底层已为您配置了高饱和度的琥珀、洋红与焦糖色流体节点。请观察背景，在深咖色的基调上，光影正在进行缓慢且真实的物理交织。<br/><br/>
                                            <b>动画锚定校验完成：</b><br/>
                                            展开动作的最终落点已被 Flex 布局严格钳制，亚像素级的掉落震荡已完全根除。
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
