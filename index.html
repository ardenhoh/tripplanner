<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Travel Log | OS 1.0.4-R 🧳</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js" defer></script>
  <style>
    /* ==========================================================================
       OS 1.0.4-R (Restored)
       Apple iOS 26 Liquid Glass Environment
       ========================================================================== */
    :root {
      --apple-ease: cubic-bezier(0.32, 0.72, 0, 1);
      --rim-opacity: 0.4;
      --blur-radius: 25px;
      --focus-scale: 0.98;
      --apple-blue: #0071e3;
    }

    body {
      margin: 0; padding: 0; background-color: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden; color: #1D1D1F;
      overscroll-behavior: none;
    }

    /* ----------------------------------------------------
       Phase 1: 四層實體殼層 (Layered Shell)
       ---------------------------------------------------- */
    #background-layer {
      position: fixed; inset: -20%; z-index: -10; pointer-events: none;
      background: radial-gradient(circle at 15% 15%, #e8f0fe 0%, transparent 50%),
                  radial-gradient(circle at 85% 85%, #f6eef2 0%, transparent 50%);
      background-size: 200% 200%; filter: blur(100px);
      transition: filter 1.5s ease, background 1.5s ease;
      will-change: transform;
      animation: ambientShift 30s ease-in-out infinite alternate;
    }
    @keyframes ambientShift { 0% { background-position: 0% 0%; } 100% { background-position: 100% 100%; } }

    #content-layer {
      position: relative; z-index: 1; height: 100dvh; overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch; 
      padding-bottom: calc(env(safe-area-inset-bottom) + 20px);
      transition: padding-bottom 0.4s var(--apple-ease), transform 0.4s var(--apple-ease);
      transform-origin: center center;
    }

    #chrome-layer { position: fixed; inset: 0; z-index: 90; pointer-events: none; }
    #modal-layer { position: fixed; inset: 0; z-index: 100; pointer-events: none; }

    /* ----------------------------------------------------
       Phase 2: Liquid Glass 2.0 (Physical Rim Light)
       ---------------------------------------------------- */
    .liquid-glass {
      position: relative; border: none !important;
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(var(--blur-radius)) saturate(180%);
      -webkit-backdrop-filter: blur(var(--blur-radius)) saturate(180%);
      border-radius: 28px;
      /* 邊緣折射：模擬 0.5px 厚度感 */
      box-shadow: 
        inset 0 0 0 0.5px rgba(255, 255, 255, var(--rim-opacity)),
        0 12px 40px rgba(0, 0, 0, 0.05);
      transition: all 0.4s var(--apple-ease);
    }

    .theme-dark .liquid-glass {
      background: rgba(0, 0, 0, 0.2);
      --rim-opacity: 0.15; /* 亮度感知補償 */
      color: #FFF;
    }

    .scrolling .liquid-glass { --blur-radius: 8px; } /* 滾動降級守衛 */

    /* Orb 與光學連線 */
    .liquid-orb-wrapper { position: relative; border-radius: 50%; filter: drop-shadow(0 6px 12px rgba(0,113,227,0.15)); }
    .liquid-orb {
      background: linear-gradient(135deg, #f9feff 0%, #eefdff 100%);
      border-radius: 50%; width: 100%; height: 100%; position: relative; overflow: hidden;
      box-shadow: inset 4px 4px 12px rgba(255,255,255,1);
    }
    .liquid-orb::after {
      content: ''; position: absolute; top: -20%; left: -20%; width: 140%; height: 140%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0) 50%);
      filter: blur(8px); animation: orbWobble 4s infinite ease-in-out alternate; pointer-events: none;
    }
    @keyframes orbWobble { 0% { transform: scale(1); } 100% { transform: scale(1.1) translate(4px, 6px); } }
    
    .optical-line { width: 1px; height: 10px; background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.02)); margin: 4px 0; }
    .theme-dark .optical-line { background: linear-gradient(to bottom, rgba(255,255,255,0.2), rgba(255,255,255,0.05)); }

    /* ----------------------------------------------------
       Phase 3: 天氣系統與 Timeline
       ---------------------------------------------------- */
    .weather-header { height: 38vh; min-height: 350px; position: relative; overflow: hidden; transition: all 1s var(--apple-ease); }
    .particle-layer { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
    .rain { position: absolute; width: 1.5px; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.8)); animation: rainFall linear infinite; }
    @keyframes rainFall { 0% { transform: translateY(-50px); opacity: 0; } 20% { opacity: 1; } 100% { transform: translateY(600px); opacity: 0; } }

    .timeline-container { position: relative; padding-left: 24px; margin-top: 16px; }
    .timeline-line {
      position: absolute; left: 38px; top: 0; bottom: 0;
      width: 1.5px; background: linear-gradient(to bottom, var(--apple-blue), transparent);
      opacity: 0.3; transition: all 0.4s var(--apple-ease);
    }
    
    /* 1.0.4 子節點縮進 */
    .activity-item { margin-left: 32px; margin-bottom: 16px; position: relative; }
    .activity-node {
      position: absolute; left: -22px; top: 22px;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--apple-blue); box-shadow: 0 0 8px rgba(0,113,227,0.4);
    }

    /* 深度聚焦與原地編輯 */
    .is-unfocused { opacity: 0.3; transform: scale(var(--focus-scale)); filter: blur(1.5px) brightness(0.95); pointer-events: none; }
    .inplace-input {
      background: rgba(0,0,0,0.03); border-radius: 12px; padding: 12px 16px; width: 100%;
      border: none; outline: none; font-size: 16px; font-weight: 500; font-family: inherit; color: inherit;
    }
    .theme-dark .inplace-input { background: rgba(255,255,255,0.1); }

    /* ----------------------------------------------------
       Phase 4: iOS 警示交互
       ---------------------------------------------------- */
    .swipe-container { position: relative; overflow: hidden; border-radius: 28px; }
    /* 還原 #FF3B30 與垃圾桶 */
    .swipe-actions {
      position: absolute; right: 0; top: 0; bottom: 0; width: 120px;
      display: flex; align-items: center; justify-content: flex-end; padding-right: 28px;
      background: #FF3B30; color: white; font-size: 22px; z-index: 0; opacity: 0;
      -webkit-mask-image: linear-gradient(to right, transparent 0%, black 30px);
      transition: opacity 0.3s;
    }
    .swipe-card { position: relative; z-index: 1; transition: transform 0.4s var(--apple-ease); will-change: transform; }

    .skeleton-pulse { animation: skeletonPulse 1s ease-in-out infinite alternate; opacity: 0.5; }
    @keyframes skeletonPulse { 0% { opacity: 0.3; } 100% { opacity: 0.7; } }
    .apple-pulse { animation: pulse 0.4s var(--apple-ease); }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    .tap-scale:active { transform: scale(0.96); opacity: 0.8; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="theme-light">

  <div id="background-layer"></div>

  <div id="content-layer" class="no-scrollbar">
    </div>

  <div id="chrome-layer">
    <button id="btn-fab" data-action="open-create-modal" class="fixed bottom-10 left-1/2 -translate-x-1/2 w-[64px] h-[64px] rounded-full z-[90] tap-scale pointer-events-auto" style="display: none;">
       <div class="liquid-glass flex items-center justify-center text-[var(--apple-blue)] w-full h-full shadow-lg" style="border-radius: 50%;">
         <i class="fa-solid fa-plus text-2xl font-light"></i>
       </div>
    </button>
  </div>

  <div id="modal-layer"></div>

  <script>
    // ==========================================================================
    // OS 1.0.4-R Core Logic
    // ==========================================================================

    const AppUtils = {
      generateId: () => {
        try { return crypto.randomUUID(); } 
        catch (e) { return 'id-' + Date.now() + Math.random().toString(36).slice(2, 9); }
      }
    };

    // --- Data Manager (P0 Shadow Backup) ---
    const DataManager = {
      key: 'OS_104_MASTER',
      state: { trips: [], activeId: null, view: 'home' },

      init() {
        const raw = localStorage.getItem('TRAVEL_LOG_DATA') || localStorage.getItem(this.key);
        if (raw) {
          localStorage.setItem('TRAVEL_LOG_BACKUP_103', raw); // 1.0.3 影子備份
          let parsed = JSON.parse(raw);
          
          this.state.trips = (parsed.trips || []).map(t => ({
            ...t,
            days: (t.days || []).map(d => ({ 
              ...d, 
              activities: d.activities || [] 
            }))
          }));
          this.save();
        }
      },
      save() { localStorage.setItem(this.key, JSON.stringify(this.state)); }
    };

    // --- Weather & Environment (1.0.3 Restored) ---
    const EnvironmentCoordinator = {
      compute(code) {
        const isRainy = [51,53,55,61,63,65,80,81,82,95].includes(code);
        const isCloudy = [1,2,3,45,48].includes(code);
        return {
          themeId: isRainy ? 'theme-dark' : 'theme-light',
          bgGradient: isRainy ? 'from-[#3a4750] to-[#2c3e50]' : (isCloudy ? 'from-[#7da2b8] to-[#bacfdc]' : 'from-[#5cb0ff] to-[#80c6ff]'),
          enableRain: isRainy
        };
      }
    };

    const WeatherEngine = {
      async fetch(city) {
        // 模擬 1.0.3 異步請求延遲
        return new Promise(resolve => {
          setTimeout(() => {
            const isRainy = Math.random() > 0.5;
            resolve({
              temp: 24 + Math.floor(Math.random()*6),
              status: isRainy ? 'Rainy' : 'Clear',
              code: isRainy ? 61 : 1,
              high: 30, low: 22,
              forecast: Array.from({length: 24}, (_, i) => ({ 
                hour: i, temp: 24 + Math.floor(Math.random()*4), icon: isRainy ? '🌧️' : '☀️' 
              }))
            });
          }, 800);
        });
      }
    };

    const ParticleEngine = {
      render(enable) {
        const container = document.getElementById('particle-slot');
        if (!container) return;
        if (enable) {
          container.innerHTML = Array(30).fill().map(() => `<div class="rain" style="left:${Math.random()*100}%; animation-delay:-${Math.random()}s; height:${30+Math.random()*50}px"></div>`).join('');
        } else {
          container.innerHTML = '';
        }
      }
    };

    // --- Renderer (Slot Patching) ---
    const Renderer = {
      render() {
        const content = document.getElementById('content-layer');
        const fab = document.getElementById('btn-fab');
        
        if (DataManager.state.view === 'home') {
          fab.style.display = 'block';
          content.innerHTML = this.tempHome();
          GestureManager.bindSwipe();
        } else {
          fab.style.display = 'none';
          this.renderEditor();
        }
      },

      tempHome() {
        return `
          <div class="max-w-3xl mx-auto px-6 py-20">
            <h1 class="text-[34px] font-extrabold mb-10 tracking-tight">行程助手 🧳</h1>
            <div class="space-y-6">
              ${DataManager.state.trips.map(t => `
                <div class="swipe-container group" data-id="${t.id}">
                  <div class="swipe-actions"><i class="fa-solid fa-trash-can"></i></div>
                  <div class="swipe-card liquid-glass p-6 cursor-pointer tap-scale flex items-center justify-between" data-action="open-trip" data-id="${t.id}">
                    <div class="flex-1 pr-4">
                      <h3 class="text-[22px] font-bold tracking-tight mb-2">${t.title}</h3>
                      <div class="text-[13px] font-medium opacity-50">${t.days.length} 天行程</div>
                    </div>
                    <div class="flex flex-col items-center justify-center border-l border-black/5 dark:border-white/10 pl-4">
                      <span class="text-[11px] font-bold opacity-60 uppercase tracking-wider">${t.startDate.split('-').slice(1).join('/')}</span>
                      <div class="optical-line"></div>
                      <span class="text-[11px] font-bold opacity-60 uppercase tracking-wider">${t.endDate.split('-').slice(1).join('/')}</span>
                    </div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      },

      async renderEditor() {
        const trip = DataManager.state.trips.find(t => t.id === DataManager.state.activeId);
        const content = document.getElementById('content-layer');
        const city = trip.days[0]?.destination || '墨爾本';
        
        // 初始狀態鎖定 (State Lock Skeleton)
        content.innerHTML = `
          <div class="min-h-screen pb-40">
            <header class="weather-header">
               <div id="bg-slot" class="absolute inset-0 bg-gradient-to-b from-gray-200 to-gray-300 opacity-90 transition-colors duration-1000"></div>
               <div id="particle-slot" class="particle-layer"></div>
               <div class="relative z-10 px-6 pt-12 pb-6 flex flex-col items-center h-full justify-between">
                  <button data-action="go-home" class="self-start w-10 h-10 liquid-glass rounded-full flex items-center justify-center tap-scale text-current"><i class="fa-solid fa-chevron-left"></i></button>
                  <div class="flex flex-col items-center text-center -mt-6 w-full text-current">
                    <h2 class="text-[32px] font-medium tracking-tight mb-0 truncate w-full px-12">${city}</h2>
                    <div id="temp-slot" class="text-[84px] font-thin leading-none tracking-tighter my-0.5 skeleton-pulse">--°</div>
                    <p id="status-slot" class="font-medium opacity-90 text-[15px] tracking-wide skeleton-pulse">加載中...</p>
                  </div>
                  <div id="forecast-slot" class="w-full liquid-glass rounded-[24px] px-2 flex gap-2 overflow-x-auto no-scrollbar snap-x snap-mandatory mt-6 text-current h-[100px] items-center">
                  </div>
               </div>
            </header>
            <div class="max-w-3xl mx-auto px-6 mt-8 space-y-12">
              ${trip.days.map((d, i) => this.tempDay(d, i)).join('')}
            </div>
          </div>
        `;

        // 異步抓取並 Patch
        const w = await WeatherEngine.fetch(city);
        const config = EnvironmentCoordinator.compute(w.code);

        document.body.className = config.themeId;
        document.getElementById('bg-slot').className = `absolute inset-0 bg-gradient-to-b ${config.bgGradient} opacity-90 transition-colors duration-1000`;
        ParticleEngine.render(config.enableRain);

        const tempSlot = document.getElementById('temp-slot');
        tempSlot.classList.remove('skeleton-pulse');
        tempSlot.innerText = `${w.temp}°`;
        
        const statusSlot = document.getElementById('status-slot');
        statusSlot.classList.remove('skeleton-pulse');
        statusSlot.innerText = `${w.status} · H:${w.high}° L:${w.low}°`;

        const currentHour = new Date().getHours();
        const forecastHTML = w.forecast.map(f => {
           const isNow = f.hour === currentHour;
           const label = isNow ? 'Now' : (f.hour > 12 ? (f.hour-12)+'PM' : (f.hour===0?12:f.hour)+'AM');
           return `<div id="${isNow ? 'current-hour-node' : ''}" class="flex-shrink-0 w-[60px] flex flex-col items-center justify-center scroll-snap-align-center">
                     <span class="text-[12px] font-semibold opacity-90">${label}</span>
                     <span class="text-[22px] my-1">${f.icon}</span>
                     <span class="font-bold text-[16px]">${f.temp}°</span>
                   </div>`;
        }).join('');
        
        const forecastSlot = document.getElementById('forecast-slot');
        forecastSlot.innerHTML = forecastHTML;

        // QA: ResizeObserver 確保 Snap-to-center 不死循環
        const ro = new ResizeObserver(() => {
          const node = document.getElementById('current-hour-node');
          if (node && forecastSlot.scrollWidth > forecastSlot.clientWidth) {
            forecastSlot.scrollTo({ left: node.offsetLeft - forecastSlot.clientWidth/2 + node.offsetWidth/2, behavior: 'smooth' });
            ro.disconnect();
          }
        });
        ro.observe(forecastSlot);
      },

      tempDay(day, idx) {
        return `
          <div class="relative">
            <div class="flex items-center gap-4 mb-6 relative z-10">
              <div class="w-12 h-12 liquid-orb-wrapper flex-shrink-0"><div class="liquid-orb flex flex-col items-center justify-center text-[var(--apple-blue)]"><span class="text-[9px] font-black uppercase mt-1 opacity-90">Day</span><span class="text-xl font-bold leading-none -mt-0.5">${idx+1}</span></div></div>
              <h3 class="text-[22px] font-bold tracking-tight">${day.destination || '新目的地'}</h3>
            </div>
            <div class="timeline-container">
              <div class="timeline-line"></div>
              <div id="activities-${day.id}" class="space-y-4">
                ${this.tempActivities(day)}
              </div>
              <div class="mt-4 ml-6" id="add-btn-area-${day.id}">
                <button data-action="start-quick-add" data-day="${day.id}" class="text-[var(--apple-blue)] font-bold text-[15px] tap-scale flex items-center gap-2">
                  <i class="fa-solid fa-plus-circle"></i> 添加活動
                </button>
              </div>
            </div>
          </div>
        `;
      },

      tempActivities(day) {
        if (!day.activities || !day.activities.length) return `<div class="ml-6 text-sm opacity-30 italic py-2">尚未安排活動</div>`;
        return day.activities.map(act => `
          <div class="activity-item liquid-glass p-4" data-id="${act.id}">
            <div class="activity-node"></div>
            <div class="flex justify-between items-center">
              <div class="flex-1">
                <div class="text-[12px] font-bold opacity-50 uppercase mb-0.5 tracking-wider">${act.time || '全天'}</div>
                <div class="font-bold text-[17px]">${act.title}</div>
              </div>
            </div>
          </div>
        `).join('');
      }
    };

    // --- Phase 4: Safari 穩定性與手勢 ---
    const GestureManager = {
      bindSwipe() {
        document.querySelectorAll('.swipe-card').forEach(card => {
          let startX = 0, currentX = 0;
          const actions = card.previousElementSibling;
          
          card.ontouchstart = (e) => {
            if (e.touches[0].clientX < 20) return; // 20px 邊緣死區 (Safari Edge Swipe)
            startX = e.touches[0].clientX;
            card.style.transition = 'none';
          };
          card.ontouchmove = (e) => {
            if (startX === 0) return;
            currentX = Math.max(e.touches[0].clientX - startX, -100);
            if (currentX < 0) {
              card.style.transform = `translateX(${currentX}px)`;
              actions.style.opacity = '1';
            }
          };
          card.ontouchend = () => {
            if (startX === 0) return;
            card.style.transition = 'transform 0.4s var(--apple-ease)';
            if (currentX < -65) {
              card.style.transform = 'translateX(-120vw)';
              setTimeout(() => App.deleteTrip(card.parentElement.dataset.id), 300);
            } else { 
              card.style.transform = 'translateX(0)'; 
              setTimeout(() => actions.style.opacity = '0', 200);
            }
            startX = 0; currentX = 0;
          };
        });
      }
    };

    const SafariFix = {
      init() {
        const content = document.getElementById('content-layer');
        let scrollTimer;
        content.addEventListener('scroll', () => {
          document.body.classList.add('scrolling');
          clearTimeout(scrollTimer);
          scrollTimer = setTimeout(() => document.body.classList.remove('scrolling'), 150);
        }, { passive: true });

        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', () => {
            const offset = window.innerHeight - window.visualViewport.height;
            if (offset > 50) {
              content.style.paddingBottom = `${offset + 20}px`;
              const activeEl = document.activeElement;
              // 黃金 40% 重心補償
              if (activeEl) setTimeout(() => activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
            } else {
              content.style.paddingBottom = 'calc(env(safe-area-inset-bottom) + 20px)';
            }
          });
        }
      }
    };

    // --- Phase 5: 應用邏輯與原地編輯 ---
    const App = {
      init() {
        DataManager.init();
        Renderer.render();
        SafariFix.init();
        
        document.addEventListener('click', e => {
          const target = e.target.closest('[data-action]');
          if (!target) return;
          const action = target.dataset.action;

          if (action === 'open-trip') { DataManager.state.activeId = target.dataset.id; DataManager.state.view = 'editor'; Renderer.render(); }
          else if (action === 'go-home') { DataManager.state.view = 'home'; DataManager.state.activeId = null; Renderer.render(); }
          else if (action === 'open-create-modal') this.openCreateModal();
          else if (action === 'close-modal') this.closeModal();
          else if (action === 'confirm-create') this.confirmCreateTrip();
          else if (action === 'start-quick-add') this.startQuickAdd(target.dataset.day);
        });
      },

      deleteTrip(id) {
        DataManager.state.trips = DataManager.state.trips.filter(t => t.id !== id);
        DataManager.save(); Renderer.render();
      },

      startQuickAdd(dayId) {
        const container = document.getElementById(`activities-${dayId}`);
        document.getElementById(`add-btn-area-${dayId}`).style.display = 'none';

        const slotId = 'slot-' + AppUtils.generateId();
        const html = `
          <div id="${slotId}" class="activity-item liquid-glass p-4 apple-pulse relative z-20">
            <input type="text" class="inplace-input" placeholder="去哪裡？做什麼？" onkeydown="if(event.key==='Enter') App.commitQuickAdd('${dayId}', '${slotId}', this.value)" onblur="App.cancelQuickAdd('${dayId}', '${slotId}', this.value)">
            <div class="text-[11px] font-bold opacity-40 mt-2 text-right">按 Enter 同步 ☁️</div>
          </div>
        `;
        
        if (container.innerHTML.includes('尚未安排')) container.innerHTML = '';
        container.insertAdjacentHTML('beforeend', html);
        
        // Depth Focus 心流保護
        document.querySelectorAll('.activity-item:not(#'+slotId+')').forEach(el => el.classList.add('is-unfocused'));
        document.getElementById(slotId).querySelector('input').focus();
      },

      commitQuickAdd(dayId, slotId, value) {
        if (!value.trim()) { this.cancelQuickAdd(dayId, slotId, ''); return; }
        
        const trip = DataManager.state.trips.find(t => t.id === DataManager.state.activeId);
        const day = trip.days.find(d => d.id === dayId);
        
        day.activities.push({ id: AppUtils.generateId(), title: value, time: '10:00' });
        DataManager.save();

        document.querySelectorAll('.is-unfocused').forEach(el => el.classList.remove('is-unfocused'));
        Renderer.patchSlot(`activities-${dayId}`, Renderer.tempActivities(day));
        document.getElementById(`add-btn-area-${dayId}`).style.display = 'block';
      },

      cancelQuickAdd(dayId, slotId, value) {
        if(value.trim()) { this.commitQuickAdd(dayId, slotId, value); return; }
        document.querySelectorAll('.is-unfocused').forEach(el => el.classList.remove('is-unfocused'));
        const trip = DataManager.state.trips.find(t => t.id === DataManager.state.activeId);
        Renderer.patchSlot(`activities-${dayId}`, Renderer.tempActivities(trip.days.find(d => d.id === dayId)));
        document.getElementById(`add-btn-area-${dayId}`).style.display = 'block';
      },

      openCreateModal() {
        const layer = document.getElementById('modal-layer');
        layer.style.pointerEvents = 'auto';
        layer.innerHTML = `
          <div class="absolute inset-0 bg-black/10 backdrop-blur-md" data-action="close-modal"></div>
          <div id="modal-card" class="absolute bottom-0 left-0 w-full liquid-glass rounded-t-[40px] p-8 pb-12 transition-transform duration-500 translate-y-full">
            <h2 class="text-2xl font-bold mb-8 text-center tracking-tight">新的冒險 ☁️</h2>
            <div class="space-y-4">
              <input id="new-trip-title" type="text" class="inplace-input" style="background:rgba(255,255,255,0.4)" placeholder="行程名稱 (例: 札幌雪祭)">
              <div class="flex gap-4">
                <input id="new-trip-start" type="date" class="inplace-input" style="background:rgba(255,255,255,0.4)">
                <input id="new-trip-end" type="date" class="inplace-input" style="background:rgba(255,255,255,0.4)">
              </div>
            </div>
            <button data-action="confirm-create" class="w-full h-14 bg-[#1D1D1F] text-white rounded-2xl font-bold mt-8 tap-scale">建立行程</button>
          </div>
        `;
        setTimeout(() => document.getElementById('modal-card').classList.remove('translate-y-full'), 10);
      },

      closeModal() {
        const card = document.getElementById('modal-card');
        if (card) card.classList.add('translate-y-full');
        setTimeout(() => {
          document.getElementById('modal-layer').innerHTML = '';
          document.getElementById('modal-layer').style.pointerEvents = 'none';
        }, 400);
      },

      confirmCreateTrip() {
        const title = document.getElementById('new-trip-title').value;
        const start = document.getElementById('new-trip-start').value;
        const end = document.getElementById('new-trip-end').value;
        if (!title || !start || !end) return;

        DataManager.state.trips.unshift({
          id: AppUtils.generateId(),
          title, startDate: start, endDate: end,
          days: [{ id: AppUtils.generateId(), destination: '首站目的地', activities: [] }]
        });
        DataManager.save();
        this.closeModal();
        Renderer.render();
      }
    };

    App.init();
  </script>
</body>
</html>
