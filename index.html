<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Travel Log | 行程助手 🧳</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js" defer></script>
  <style>
    :root {
      --apple-bg: #f5f5f7;
      --apple-text: #1D1D1F; 
      --apple-secondary: #86868b;
      --apple-blue: #0071e3;
    }

    /* 修正 Bug 1: 消除背景撕裂與硬邊 */
    body {
      background: radial-gradient(circle at 10% 10%, #e8f0fe 0%, transparent 50%),
                  radial-gradient(circle at 90% 90%, #f6eef2 0%, transparent 50%),
                  radial-gradient(circle at 50% 50%, #f4f6f9 0%, transparent 50%),
                  var(--apple-bg);
      background-size: 400% 400%;
      background-attachment: fixed; /* 關鍵：固定背景防止滑動撕裂 */
      animation: ambientShift 30s ease-in-out infinite alternate;
      color: var(--apple-text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    @keyframes ambientShift { 0% { background-position: 0% 0%; } 100% { background-position: 100% 100%; } }

    /* 修正 Bug 3: 玻璃材質與按鈕 (移除所有邊框) */
    .liquid-glass {
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      box-shadow: inset 0 0 0 0.5px rgba(255, 255, 255, 0.4), 0 8px 32px rgba(0, 0, 0, 0.03);
    }
    
    .liquid-orb-wrapper {
      position: relative;
      border-radius: 50%;
      filter: drop-shadow(0 6px 12px rgba(0, 113, 227, 0.1));
    }
    .liquid-orb {
      background: linear-gradient(135deg, #f9feff 0%, #eefdff 100%);
      border-radius: 50%;
      width: 100%; height: 100%;
      position: relative;
      overflow: hidden;
      box-shadow: inset 4px 4px 12px rgba(255, 255, 255, 1);
    }
    .liquid-orb::after {
      content: ''; position: absolute; top: -20%; left: -20%; width: 140%; height: 140%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 50%);
      filter: blur(8px);
      animation: orbWobble 4s infinite ease-in-out alternate;
    }
    @keyframes orbWobble { 0% { transform: scale(1); } 100% { transform: scale(1.1) translate(4px, 6px); } }

    /* 修正 Bug 2: Modal 輸入框穩定性 */
    .input-std {
      height: 52px; border-radius: 16px; background: rgba(255, 255, 255, 0.65);
      box-shadow: inset 0 0 0 0.5px rgba(0, 0, 0, 0.04); padding: 0 16px; width: 100%;
      font-size: 16px; font-weight: 500; outline: none; transition: all 0.2s;
      box-sizing: border-box; display: flex; align-items: center;
    }
    .input-std:focus { background: rgba(255, 255, 255, 0.95); box-shadow: inset 0 0 0 0.5px var(--apple-blue); }

    /* 修正 Bug 5 & 6: 24H 預報與高亮 */
    .forecast-box {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(25px);
      box-shadow: inset 0 0 0 0.5px rgba(255, 255, 255, 0.2);
      height: 120px; /* 固定高度確上下對齊 */
      display: flex; align-items: center; 
    }
    .forecast-item { 
      flex-shrink: 0; width: 60px; height: 90px; /* 內部高度縮小，留出上下邊距 */
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      scroll-snap-align: center;
    }
    .forecast-item.current-hour {
      position: relative;
    }
    .forecast-item.current-hour::before {
      content: ''; position: absolute; inset: 0; border-radius: 16px;
      background: rgba(255, 255, 255, 0.3);
      box-shadow: inset 0 0 0 0.5px rgba(255, 255, 255, 0.5);
      z-index: -1;
    }

    /* 修正 Bug 7: 手風琴絲滑展開 */
    .accordion-grid {
      display: grid; grid-template-rows: 0fr;
      transition: grid-template-rows 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: grid-template-rows;
    }
    .accordion-grid.expanded { grid-template-rows: 1fr; }
    .accordion-inner { overflow: hidden; }

    /* 氣象粒子系統 */
    .particle-layer { position: absolute; inset: 0; pointer-events: none; }
    .rain { position: absolute; width: 1.5px; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.8)); animation: rainFall linear infinite; }
    @keyframes rainFall { 0% { transform: translateY(-50px); opacity: 0; } 20% { opacity: 1; } 100% { transform: translateY(600px); opacity: 0; } }
    
    .tap-scale { transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .tap-scale:active { transform: scale(0.95); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>

  <div id="app"></div>

  <!-- FAB -->
  <button id="btn-fab" class="fixed bottom-10 left-1/2 -translate-x-1/2 w-[64px] h-[64px] rounded-full tap-scale z-[90]">
     <div class="liquid-orb-wrapper w-full h-full">
       <div class="liquid-orb flex items-center justify-center text-[var(--apple-blue)]"><i class="fa-solid fa-plus text-2xl font-light"></i></div>
     </div>
  </button>

  <!-- Modal -->
  <div id="trip-modal" class="fixed inset-0 z-[100] hidden">
    <div id="modal-bg" class="absolute inset-0 bg-black/10 backdrop-blur-[5px]"></div>
    <div class="absolute bottom-0 left-0 w-full md:relative md:mx-auto md:mt-24 md:max-w-md liquid-glass rounded-t-[36px] md:rounded-[36px] p-8 pb-12 transition-transform duration-400 translate-y-full" id="modal-card">
      <h2 class="text-2xl font-bold mb-8 text-center tracking-tight text-[var(--apple-text)]">開始新的冒險</h2>
      <div class="space-y-5">
        <input id="in-title" type="text" class="input-std" placeholder="行程名稱" />
        <div class="grid grid-cols-2 gap-4 w-full">
          <input id="in-start" type="text" placeholder="起始日期" onfocus="(this.type='date')" onblur="if(!this.value)this.type='text'" class="input-std text-center" />
          <input id="in-end" type="text" placeholder="返程日期" onfocus="(this.type='date')" onblur="if(!this.value)this.type='text'" class="input-std text-center" />
        </div>
        <div class="relative">
          <input id="in-dests" type="text" class="input-std" placeholder="目的地城市" autocomplete="off" oninput="appEngine.searchCity(this, 'modal-sug', null)" />
          <div id="modal-sug" class="suggestion-box hidden absolute top-full left-0 w-full z-50 liquid-glass rounded-2xl mt-1 max-h-[150px] overflow-y-auto no-scrollbar"></div>
        </div>
      </div>
      <button id="btn-confirm-modal" class="w-full h-[52px] mt-8 rounded-2xl bg-[var(--apple-text)] text-white font-bold tap-scale shadow-lg">建立行程</button>
    </div>
  </div>

  <script>
    const GLOBAL_CITIES = ['北京', '台北', '首爾', '釜山', '東京', '大阪', '京都', '大連', '曼谷', '新加坡', '吉隆坡', '倫敦', '巴黎', '峇里島', '巴塞隆納', '紐約', '墨爾本', '悉尼', '羅馬', '柏林', '迪拜'];
    const STORAGE_KEY = "os1_master_v2";

    const appEngine = {
      state: { trips: [], activeId: null, view: 'home' },
      
      init() {
        const data = localStorage.getItem(STORAGE_KEY);
        if (data) this.state = JSON.parse(data);
        this.render();
        this.bindGlobal();
      },

      save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(this.state)); },

      async getWeather(cityName) {
        const cacheKey = `wx_${cityName}`;
        try {
          const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityName)}&count=1`);
          const geoData = await geoRes.json();
          if (!geoData.results?.length) throw new Error("Not Found");
          
          const { latitude, longitude, timezone } = geoData.results[0];
          const wxRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,weather_code,is_day&hourly=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min&timezone=${encodeURIComponent(timezone || 'auto')}`);
          const wxData = await wxRes.json();

          const code = wxData.current.weather_code;
          const isRainy = [51,53,55,61,63,65,80,81,82].includes(code);
          const isDay = wxData.current.is_day === 1;

          const forecast = wxData.hourly.time.slice(0, 24).map((t, i) => ({
            hour: new Date(t).getHours(),
            temp: Math.round(wxData.hourly.temperature_2m[i]),
            code: wxData.hourly.weather_code[i]
          }));

          const final = {
            temp: Math.round(wxData.current.temperature_2m),
            status: isRainy ? 'Rainy' : 'Clear',
            isRainy, isDay,
            high: Math.round(wxData.daily.temperature_2m_max[0]),
            low: Math.round(wxData.daily.temperature_2m_min[0]),
            forecast
          };
          localStorage.setItem(cacheKey, JSON.stringify(final));
          return final;
        } catch (e) {
          return JSON.parse(localStorage.getItem(cacheKey)) || { temp: 26, status: 'Clear', high: 30, low: 22, forecast: [] };
        }
      },

      searchCity(input, boxId, dayId) {
        const val = input.value.trim().toLowerCase();
        const box = document.getElementById(boxId);
        if(!val) { box.classList.add('hidden'); return; }
        const matches = GLOBAL_CITIES.filter(c => c.toLowerCase().includes(val));
        if(matches.length) {
          box.innerHTML = matches.map(m => `<div class="px-5 py-4 border-b border-black/5 font-semibold text-[var(--apple-text)] cursor-pointer" onclick="appEngine.selectCity('${m}', '${input.id}', '${boxId}', '${dayId}')">${m}</div>`).join('');
          box.classList.remove('hidden');
        } else box.classList.add('hidden');
      },

      selectCity(city, inputId, boxId, dayId) {
        document.getElementById(inputId).value = city;
        document.getElementById(boxId).classList.add('hidden');
        if(dayId && dayId !== 'null') {
          const trip = this.state.trips.find(t => t.id === this.state.activeId);
          const day = trip.days.find(d => d.id === dayId);
          if (day) day.destination = city;
          this.save(); this.renderEditor(true);
        }
      },

      render() {
        const app = document.getElementById('app');
        if (this.state.view === 'home') {
          document.getElementById('btn-fab').style.display = 'flex';
          app.innerHTML = `
            <div class="max-w-3xl mx-auto px-6 py-20">
              <h1 class="text-[34px] font-extrabold mb-10 tracking-tight">行程助手 🧳</h1>
              <div class="space-y-5">${this.state.trips.length ? this.state.trips.map(t => this.renderTripCard(t)).join('') : '<div class="py-24 text-center text-gray-400">準備好出發了嗎？</div>'}</div>
            </div>`;
          this.bindSwipe();
        } else this.renderEditor();
      },

      renderTripCard(trip) {
        return `
          <div class="swipe-container group" data-id="${trip.id}">
            <div class="swipe-actions bg-white/90 flex items-center justify-end px-8 text-rose-500 opacity-0"><i class="fa-solid fa-trash-can text-2xl"></i></div>
            <div class="swipe-card p-6 liquid-glass rounded-[28px] cursor-pointer" onclick="appEngine.openTrip('${trip.id}')">
              <div class="flex justify-between items-start mb-6">
                 <div class="liquid-orb-wrapper w-[46px] h-[46px]"><div class="liquid-orb flex items-center justify-center text-[var(--apple-blue)]"><i class="fa-solid fa-plane"></i></div></div>
                 <div class="flex flex-col items-end gap-1 mt-1 font-bold text-[13px] opacity-80"><span>${trip.startDate}</span><div class="w-[1px] h-2 bg-black/10 mr-1"></div><span>${trip.endDate}</span></div>
              </div>
              <h3 class="text-[22px] font-bold tracking-tight">${trip.title}</h3>
            </div>
          </div>`;
      },

      async renderEditor(isUpdate = false) {
        const trip = this.state.trips.find(t => t.id === this.state.activeId);
        const city = trip.days[0]?.destination || 'Kuala Lumpur';
        const w = await this.getWeather(city);
        
        const currentHour = new Date().getHours();
        const emojiMap = (c) => [51,53,55,61,63,65,80,81,82].includes(c) ? '🌧️' : ([1,2,3].includes(c) ? '☁️' : '☀️');

        const forecastHtml = w.forecast.map(f => {
           const isNow = f.hour === currentHour;
           return `<div id="${isNow?'now-node':''}" class="forecast-item ${isNow?'current-hour':''}">
                     <span class="text-[12px] font-semibold">${isNow?'Now':(f.hour>12?f.hour-12+'PM':(f.hour===0?12:f.hour)+'AM')}</span>
                     <span class="text-xl my-1.5">${emojiMap(f.code)}</span>
                     <span class="font-bold text-[16px]">${f.temp}°</span>
                   </div>`;
        }).join('');

        const rainParticles = w.isRainy ? Array(30).fill().map(() => `<div class="rain" style="left:${Math.random()*100}%; animation-delay:-${Math.random()}s; height:${30+Math.random()*40}px"></div>`).join('') : '';

        const html = `
          <div class="min-h-screen pb-24">
            <header class="weather-header h-[38vh] min-h-[350px] relative overflow-hidden flex flex-col justify-between px-6 pt-12 pb-6">
               <div class="absolute inset-0 bg-gradient-to-b ${w.isRainy?'from-[#3a4750] to-[#2c3e50]':'from-[#5cb0ff] to-[#80c6ff]'} opacity-90"></div>
               <div class="particle-layer">${rainParticles}</div>
               <nav class="relative z-10 flex justify-start"><button onclick="appEngine.goHome()" class="w-10 h-10 rounded-full liquid-glass flex items-center justify-center tap-scale"><i class="fa-solid fa-chevron-left ${w.isRainy?'text-white':'text-black'}"></i></button></nav>
               <div class="relative z-10 flex flex-col items-center text-center -mt-4 ${w.isRainy?'text-white':'text-black'}">
                  <h2 class="text-[32px] font-medium tracking-tight truncate w-full px-12">${city}</h2>
                  <div class="text-[84px] font-thin leading-none tracking-tighter my-0.5">${w.temp}°</div>
                  <p class="font-medium opacity-90 text-[15px] tracking-wide">${w.status} · H:${w.high}° L:${w.low}°</p>
               </div>
               <div id="scroll-wx" class="relative z-10 w-full forecast-box rounded-[24px] overflow-x-auto no-scrollbar snap-x snap-mandatory ${w.isRainy?'text-white':'text-black'}">${forecastHtml}</div>
            </header>
            <main class="max-w-3xl mx-auto px-6 mt-8 space-y-4 relative">
              <div class="absolute left-[27px] top-6 bottom-10 w-[2px] bg-black/5"></div>
              ${trip.days.map((day, idx) => `
                <div class="relative pl-20 pb-6">
                  <div class="absolute left-0 top-1 w-[56px] h-[56px] liquid-orb-wrapper"><div class="liquid-orb flex flex-col items-center justify-center text-[var(--apple-blue)]"><span class="text-[10px] font-black uppercase mt-1">Day</span><span class="text-xl font-bold -mt-0.5">${idx+1}</span></div></div>
                  <div class="cursor-pointer" onclick="appEngine.toggleAccordion('${day.id}')">
                    <div class="flex justify-between items-center liquid-glass rounded-[20px] px-5 py-4 tap-scale"><h4 class="text-[18px] font-bold tracking-tight">${day.destination}</h4><i id="icon-${day.id}" class="fa-solid fa-chevron-down text-xs text-gray-400"></i></div>
                    <div id="acc-${day.id}" class="accordion-grid mt-2"><div class="accordion-inner"><div class="liquid-glass rounded-[24px] p-5">
                       <input class="w-full bg-transparent border-b border-black/10 py-2 text-xl font-bold outline-none" value="${day.destination}" oninput="appEngine.searchCity(this, 'sug-${day.id}', '${day.id}')" onclick="event.stopPropagation()"/>
                       <div id="sug-${day.id}" class="suggestion-box hidden"></div>
                       <button onclick="appEngine.toggleTray(event, 'tray-${day.id}')" class="w-full py-4 mt-6 rounded-[16px] border border-dashed border-[var(--apple-blue)] text-sm font-bold text-[var(--apple-blue)] bg-blue-50/50">+ 添加行程</button>
                       <div id="tray-${day.id}" class="glass-tray hidden flex justify-between mt-4 p-2 bg-white/40 rounded-2xl">
                          <div class="flex flex-col items-center text-[10px] font-bold"><div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center mb-1"><i class="fa-solid fa-car text-blue-500"></i></div>交通</div>
                          <div class="flex flex-col items-center text-[10px] font-bold"><div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center mb-1"><i class="fa-solid fa-bed text-orange-500"></i></div>住宿</div>
                          <div class="flex flex-col items-center text-[10px] font-bold"><div class="w-10 h-10 bg-rose-100 rounded-full flex items-center justify-center mb-1"><i class="fa-solid fa-ticket text-rose-500"></i></div>遊玩</div>
                          <div class="flex flex-col items-center text-[10px] font-bold"><div class="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center mb-1"><i class="fa-solid fa-city text-purple-500"></i></div>城市</div>
                       </div>
                    </div></div></div>
                  </div>
                </div>`).join('')}
            </main>
          </div>`;
        
        document.getElementById('app').innerHTML = html;
        setTimeout(() => {
          const node = document.getElementById('now-node');
          const scroll = document.getElementById('scroll-wx');
          if(node && scroll) scroll.scrollTo({ left: node.offsetLeft - scroll.offsetWidth/2 + node.offsetWidth/2, behavior: 'smooth' });
        }, 100);
      },

      bindSwipe() {
        document.querySelectorAll('.swipe-card').forEach(card => {
          let startX = 0, currentX = 0, actions = card.parentElement.querySelector('.swipe-actions');
          card.ontouchstart = (e) => { startX = e.touches[0].clientX; card.style.transition = 'none'; };
          card.ontouchmove = (e) => {
            currentX = Math.max(e.touches[0].clientX - startX, -100);
            if(currentX < 0) { card.style.transform = `translateX(${currentX}px)`; actions.style.opacity = '1'; }
          };
          card.ontouchend = () => {
            card.style.transition = 'transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1)';
            if(currentX < -65) { card.style.transform = 'translateX(-120vw)'; setTimeout(() => { this.state.trips = this.state.trips.filter(t => t.id !== card.parentElement.dataset.id); this.save(); this.render(); }, 300); }
            else { card.style.transform = 'translateX(0)'; actions.style.opacity = '0'; }
            currentX = 0;
          };
        });
      },

      toggleAccordion(id) {
        const acc = document.getElementById(`acc-${id}`);
        const icon = document.getElementById(`icon-${id}`);
        const isExp = acc.classList.contains('expanded');
        document.querySelectorAll('.accordion-grid.expanded').forEach(c => { c.classList.remove('expanded'); document.getElementById('icon-'+c.id.split('-')[1]).style.transform = 'rotate(0deg)'; });
        if(!isExp) { acc.classList.add('expanded'); icon.style.transform = 'rotate(180deg)'; }
      },

      toggleTray(e, id) { e.stopPropagation(); document.getElementById(id).classList.toggle('hidden'); },

      bindGlobal() {
        document.body.onclick = () => { document.querySelectorAll('[id^="tray-"]').forEach(t => t.classList.add('hidden')); document.querySelectorAll('[id^="sug-"]').forEach(s => s.classList.add('hidden')); };
        const modal = document.getElementById('trip-modal'), card = document.getElementById('modal-card');
        document.getElementById('btn-fab').onclick = () => { modal.classList.remove('hidden'); setTimeout(() => card.classList.remove('translate-y-full'), 10); };
        document.getElementById('modal-bg').onclick = () => { card.classList.add('translate-y-full'); setTimeout(() => modal.classList.add('hidden'), 400); };
        document.getElementById('btn-confirm-modal').onclick = () => {
          const t = document.getElementById('in-title').value, s = document.getElementById('in-start').value, e = document.getElementById('in-end').value, d = document.getElementById('in-dests').value;
          if(t && s && e) { this.createTrip(t, s, e, d); modal.classList.add('hidden'); }
        };
      },

      openTrip(id) { this.state.activeId = id; this.state.view = 'editor'; this.render(); },
      goHome() { this.state.view = 'home'; this.render(); }
    };

    appEngine.init();
  </script>
</body>
</html>
