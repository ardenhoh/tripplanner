<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Travel Log | 旅行繪本</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js" defer></script>
  <style>
    :root {
      --apple-bg: #f5f5f7;
      --apple-text: #1d1d1f;
      --apple-secondary: #86868b;
      --apple-blue: #0071e3;
      --glass: rgba(255, 255, 255, 0.7);
    }

    body {
      background-color: var(--apple-bg);
      color: var(--apple-text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "PingFang TC", sans-serif;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.015em;
    }

    /* Apple 質感：極細邊框與層次 */
    .apple-glass {
      background: var(--glass);
      backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      border: 0.5px solid rgba(0, 0, 0, 0.1);
    }

    .card-shadow { box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04); }

    /* 平滑過渡 */
    .tap-scale { transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .tap-scale:active { transform: scale(0.97); }

    /* 隱藏滾動條 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* 精緻天氣卡片動效 */
    .weather-card {
      background: linear-gradient(160deg, #51a1ee 0%, #89c0f5 100%);
      color: white;
      position: relative;
      overflow: hidden;
    }
    .weather-card::after {
      content: "";
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 60%);
      animation: drift 10s infinite linear;
    }
    @keyframes drift {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    input, textarea {
      background: rgba(0, 0, 0, 0.03);
      border: 0.5px solid transparent;
      border-radius: 12px;
      transition: all 0.2s ease;
    }
    input:focus, textarea:focus {
      background: white;
      border-color: var(--apple-blue);
      box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
      outline: none;
    }
  </style>
</head>
<body>

  <!-- 主容器 -->
  <div id="app" class="min-h-screen"></div>

  <!-- 建立/編輯行程 Modal -->
  <div id="trip-modal" class="fixed inset-0 z-[100] hidden">
    <div class="absolute inset-0 bg-black/20 backdrop-blur-sm"></div>
    <div class="relative mx-auto mt-20 w-[90vw] max-w-lg apple-glass rounded-[28px] p-8 card-shadow">
      <h2 id="modal-title" class="text-2xl font-bold mb-6">開始新的冒險</h2>
      <div class="space-y-4">
        <div>
          <label class="text-xs font-bold text-[var(--apple-secondary)] ml-1">行程名稱</label>
          <input id="in-title" type="text" class="w-full px-4 py-3 mt-1" placeholder="例如：首爾五日慢遊" />
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="text-xs font-bold text-[var(--apple-secondary)] ml-1">開始日期</label>
            <input id="in-date" type="date" class="w-full px-4 py-3 mt-1" />
          </div>
          <div>
            <label class="text-xs font-bold text-[var(--apple-secondary)] ml-1">天數</label>
            <input id="in-days" type="number" min="1" max="60" class="w-full px-4 py-3 mt-1" value="5" />
          </div>
        </div>
        <div>
          <label class="text-xs font-bold text-[var(--apple-secondary)] ml-1">目的地路線 (用逗號分隔)</label>
          <textarea id="in-dests" rows="2" class="w-full px-4 py-3 mt-1" placeholder="首爾, 釜山, 濟州島"></textarea>
        </div>
      </div>
      <div class="flex gap-3 mt-8">
        <button id="btn-cancel-modal" class="flex-1 py-4 rounded-2xl bg-black/5 font-medium tap-scale">取消</button>
        <button id="btn-confirm-modal" class="flex-1 py-4 rounded-2xl bg-[var(--apple-text)] text-white font-medium tap-scale">建立行程</button>
      </div>
    </div>
  </div>

  <script>
    // --- 狀態管理 ---
    const STORAGE_KEY = "travel_log_v26_pro";
    let state = {
      trips: [],
      activeId: null,
      view: 'home' // 'home' | 'editor'
    };

    // --- 數據處理邏輯 ---
    function load() {
      const data = localStorage.getItem(STORAGE_KEY);
      if (data) state = JSON.parse(data);
      render();
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function createTrip(title, startDate, daysCount, destsInput) {
      const dests = destsInput.split(/[,，|]+/).map(s => s.trim()).filter(Boolean);
      const days = [];
      for (let i = 0; i < daysCount; i++) {
        const d = new Date(startDate);
        d.setDate(d.getDate() + i);
        days.push({
          id: crypto.randomUUID(),
          date: d.toISOString().split('T')[0],
          destination: dests[i] || dests[dests.length - 1] || "未設定地點",
          items: []
        });
      }
      const newTrip = {
        id: crypto.randomUUID(),
        title,
        startDate,
        daysCount,
        color: '#0071e3',
        days
      };
      state.trips.unshift(newTrip);
      state.activeId = newTrip.id;
      state.view = 'editor';
      save();
      render();
    }

    // --- UI 渲染組件 ---
    function render() {
      const app = document.getElementById('app');
      if (state.view === 'home') {
        app.innerHTML = `
          <div class="max-w-5xl mx-auto px-6 py-16">
            <header class="flex justify-between items-end mb-12">
              <div>
                <h1 class="text-4xl font-extrabold tracking-tight">旅行繪本</h1>
                <p class="text-[var(--apple-secondary)] mt-2">記錄每一段安靜而美好的旅程</p>
              </div>
              <button id="btn-add-trip" class="px-6 py-3 bg-[var(--apple-text)] text-white font-medium rounded-full tap-scale">
                <i class="fa-solid fa-plus mr-2"></i>新行程
              </button>
            </header>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
              ${state.trips.length ? state.trips.map(renderTripCard).join('') : renderEmpty()}
            </div>
          </div>
        `;
      } else {
        app.innerHTML = renderEditor();
      }
      bindEvents();
    }

    function renderEmpty() {
      return `
        <div class="col-span-full py-20 text-center apple-glass rounded-[32px]">
          <div class="text-5xl mb-4">✈️</div>
          <h3 class="text-xl font-bold">還沒有任何行程</h3>
          <p class="text-[var(--apple-secondary)] mt-1">點擊右上方按鈕開始你的第一場旅行</p>
        </div>
      `;
    }

    function renderTripCard(trip) {
      return `
        <div data-id="${trip.id}" class="trip-card apple-glass rounded-[28px] p-6 cursor-pointer tap-scale hover:border-[var(--apple-blue)] transition-colors">
          <div class="flex justify-between items-start mb-12">
            <div class="w-10 h-10 rounded-full shadow-inner" style="background:${trip.color}"></div>
            <span class="text-[10px] font-black uppercase tracking-widest text-[var(--apple-secondary)] bg-black/5 px-2 py-1 rounded-md">${trip.daysCount} DAYS</span>
          </div>
          <h3 class="text-xl font-bold truncate">${trip.title}</h3>
          <p class="text-[var(--apple-secondary)] text-sm mt-1">${trip.startDate} 出發</p>
        </div>
      `;
    }

    function renderEditor() {
      const trip = state.trips.find(t => t.id === state.activeId);
      if (!trip) return "";

      // 修正: 預先初始化 typeSums 避免 ReferenceError
      let typeSums = {}; 

      return `
        <div class="pb-20">
          <nav class="sticky top-0 z-50 apple-glass px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
              <button id="btn-back" class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-black/5 tap-scale">
                <i class="fa-solid fa-chevron-left"></i>
              </button>
              <div>
                <h2 class="text-sm font-bold leading-tight">${trip.title}</h2>
                <p class="text-[10px] text-[var(--apple-secondary)] uppercase tracking-widest">${trip.startDate} 起 · ${trip.daysCount} 天</p>
              </div>
            </div>
            <div class="flex gap-2">
               <button id="btn-delete-trip" class="w-10 h-10 rounded-full flex items-center justify-center text-rose-500 hover:bg-rose-50 tap-scale"><i class="fa-solid fa-trash-can"></i></button>
            </div>
          </nav>

          <main class="max-w-3xl mx-auto px-6 py-8">
            <!-- 天氣卡片區 (Apple 風格) -->
            <section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
              <div class="weather-card rounded-[22px] p-4 card-shadow tap-scale">
                <p class="text-[10px] font-bold opacity-80 uppercase">今日天氣</p>
                <div class="flex justify-between items-end mt-2">
                  <span class="text-3xl font-bold">24°</span>
                  <i class="fa-solid fa-cloud-sun text-xl"></i>
                </div>
              </div>
              <div class="apple-glass rounded-[22px] p-4 flex flex-col justify-center items-center opacity-40">
                <i class="fa-solid fa-plus text-xs mb-1"></i>
                <span class="text-[10px] font-bold">添加天氣卡片</span>
              </div>
            </section>

            <!-- 行程清單 -->
            <div class="space-y-6">
              ${trip.days.map((day, idx) => `
                <div class="apple-glass rounded-[32px] p-8 card-shadow relative">
                  <div class="flex justify-between items-start mb-6">
                    <div>
                      <span class="text-[10px] font-black text-[var(--apple-blue)] uppercase tracking-tighter">DAY ${idx + 1}</span>
                      <h3 class="text-2xl font-extrabold mt-1">${day.date}</h3>
                    </div>
                    <input 
                      type="text" 
                      placeholder="設定地點"
                      class="text-right font-medium py-2 px-4 w-1/2" 
                      value="${day.destination}" 
                      oninput="updateDayPlace('${day.id}', this.value)"
                    />
                  </div>
                  <div class="space-y-3">
                    <div class="h-[1px] bg-black/5 w-full"></div>
                    <p class="text-xs text-[var(--apple-secondary)] italic">目前還沒有詳細行程細項...</p>
                    <button class="w-full py-4 mt-2 border-[0.5px] border-dashed border-black/10 rounded-2xl text-sm font-medium text-[var(--apple-secondary)] hover:border-[var(--apple-blue)] hover:text-[var(--apple-blue)] transition-all">
                      + 添加行程項目
                    </button>
                  </div>
                </div>
              `).join('')}
            </div>
          </main>
        </div>
      `;
    }

    // --- 事件綁定 (委託與直接綁定) ---
    function bindEvents() {
      // 首頁按鈕
      const btnAdd = document.getElementById('btn-add-trip');
      if (btnAdd) btnAdd.onclick = () => document.getElementById('trip-modal').classList.remove('hidden');

      // Modal 按鈕
      document.getElementById('btn-cancel-modal').onclick = () => document.getElementById('trip-modal').classList.add('hidden');
      document.getElementById('btn-confirm-modal').onclick = () => {
        const title = document.getElementById('in-title').value;
        const date = document.getElementById('in-date').value;
        const days = document.getElementById('in-days').value;
        const dests = document.getElementById('in-dests').value;
        if (title && date) {
          createTrip(title, date, parseInt(days), dests);
          document.getElementById('trip-modal').classList.add('hidden');
        } else {
          alert('請填寫標題與日期');
        }
      };

      // 編輯器按鈕
      const btnBack = document.getElementById('btn-back');
      if (btnBack) btnBack.onclick = () => { state.view = 'home'; render(); };

      const btnDelete = document.getElementById('btn-delete-trip');
      if (btnDelete) btnDelete.onclick = () => {
        if(confirm('確定要刪除這份行程嗎？')) {
          state.trips = state.trips.filter(t => t.id !== state.activeId);
          state.view = 'home';
          save();
          render();
        }
      };

      // 行程卡片點擊
      document.querySelectorAll('.trip-card').forEach(card => {
        card.onclick = () => {
          state.activeId = card.dataset.id;
          state.view = 'editor';
          render();
        };
      });
    }

    // --- 局部更新函數 (防止 Focus 丟失) ---
    window.updateDayPlace = function(dayId, val) {
      const trip = state.trips.find(t => t.id === state.activeId);
      const day = trip.days.find(d => d.id === dayId);
      if (day) {
        day.destination = val;
        save(); // 靜默保存，不刷新頁面
      }
    };

    // 啟動
    load();
  </script>
</body>
</html>
