<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Travel Log | 行程助手</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js" defer></script>
  <style>
    :root {
      --apple-bg: #f5f5f7;
      --apple-text: #1d1d1f;
      --apple-blue: #0071e3;
      --orb-start: #f9feff;
      --orb-end: #eefdff;
    }

    body {
      background: radial-gradient(circle at 15% 50%, #e8f0fe, transparent 50%),
                  radial-gradient(circle at 85% 30%, #f6eef2, transparent 50%),
                  var(--apple-bg);
      background-size: 150% 150%;
      animation: ambientShift 20s ease-in-out infinite alternate;
      color: var(--apple-text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    @keyframes ambientShift { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

    /* Liquid Glass & Orb Evolution */
    .liquid-glass {
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 0.5px solid rgba(255, 255, 255, 0.5);
    }

    .liquid-orb {
      background: linear-gradient(135deg, var(--orb-start) 0%, var(--orb-end) 100%);
      filter: blur(0.5px);
      box-shadow: 
        inset 4px 4px 12px rgba(255, 255, 255, 0.8),
        inset -4px -4px 12px rgba(0, 0, 0, 0.05),
        0 4px 15px rgba(0, 0, 0, 0.03);
      position: relative;
    }

    /* Caustics Effect */
    .liquid-orb::before {
      content: ''; position: absolute; top: 15%; left: 15%; width: 40%; height: 40%;
      background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, transparent 80%);
      filter: blur(2px); transform: rotate(-20deg);
    }

    /* Swipe Logic: White BG, Red Icon */
    .swipe-container { position: relative; overflow: hidden; border-radius: 28px; background: white; }
    .swipe-actions {
      position: absolute; right: 0; top: 0; bottom: 0; width: 100px;
      background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center;
      color: #ff3b30; font-size: 22px; z-index: 0;
    }
    .swipe-card { position: relative; z-index: 1; transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); background: white; }

    /* Weather Canvas Components */
    .weather-header { height: 35vh; min-height: 320px; overflow: hidden; position: relative; }
    .cloud-particle {
      position: absolute; background: white; filter: blur(40px); opacity: 0.3;
      border-radius: 50%; animation: cloudFloat 30s infinite linear;
    }
    @keyframes cloudFloat { from { transform: translateX(-100px); } to { transform: translateX(100vw); } }
    
    /* Accordion Fix: CSS Grid */
    .accordion-grid {
      display: grid; grid-template-rows: 0fr;
      transition: grid-template-rows 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .accordion-grid.expanded { grid-template-rows: 1fr; }
    .accordion-inner { overflow: hidden; }

    /* Standard Input & Smart Search */
    .input-std {
      height: 52px; border-radius: 16px; background: rgba(255, 255, 255, 0.6);
      border: 0.5px solid rgba(0, 0, 0, 0.05); padding: 0 16px;
    }
    .suggestion-box {
      position: absolute; top: 100%; left: 0; width: 100%; z-index: 50;
      background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
      border-radius: 16px; margin-top: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    /* Floating Glass Tray Menu */
    .glass-tray {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
      display: flex; gap: 12px; padding: 12px; border-radius: 24px;
      opacity: 0; pointer-events: none; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .glass-tray.active { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
    .tray-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      width: 64px; font-size: 10px; font-weight: bold;
    }
  </style>
</head>
<body>

  <div id="app"></div>

  <!-- FAB Orb -->
  <button id="btn-fab" class="fixed bottom-10 left-1/2 -translate-x-1/2 w-16 h-16 rounded-full liquid-glass shadow-xl flex items-center justify-center z-[100] tap-scale">
     <div class="w-12 h-12 rounded-full liquid-orb flex items-center justify-center text-blue-500">
        <i class="fa-solid fa-plus text-xl"></i>
     </div>
  </button>

  <!-- Modal -->
  <div id="trip-modal" class="fixed inset-0 z-[110] hidden">
    <div id="modal-bg" class="absolute inset-0 bg-black/10 backdrop-blur-md"></div>
    <div class="absolute bottom-0 left-0 w-full liquid-glass rounded-t-[32px] p-8 transition-transform translate-y-full" id="modal-card">
      <h2 class="text-2xl font-bold mb-8 text-center">開始新的冒險</h2>
      <div class="space-y-6">
        <input id="in-title" type="text" class="w-full input-std" placeholder="行程名稱" />
        <div class="grid grid-cols-2 gap-4">
          <input id="in-start" type="date" class="w-full input-std text-center" />
          <input id="in-end" type="date" class="w-full input-std text-center" />
        </div>
        <div class="relative">
          <input id="in-dests" type="text" class="w-full input-std" placeholder="目的地城市" autocomplete="off" />
          <div id="modal-sug" class="suggestion-box hidden"></div>
        </div>
      </div>
      <div class="flex gap-4 mt-10">
        <button id="btn-confirm-modal" class="flex-1 h-[52px] rounded-2xl bg-black text-white font-bold tap-scale">建立行程</button>
      </div>
    </div>
  </div>

  <script>
    // --- 高級團隊核心模塊 ---
    const CITY_DB = ['北京', '台北', '首爾', '東京', '曼谷', '新加坡', '吉隆坡', '倫敦', '巴黎', '紐約'];
    const STORAGE_KEY = "itinerary_v27";
    let state = { trips: [], activeId: null, view: 'home' };

    function load() {
      const data = localStorage.getItem(STORAGE_KEY);
      if (data) state = JSON.parse(data);
      render();
    }

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

    // 天氣降級引擎
    async function fetchWeather(city) {
      const cacheKey = `weather_${city}`;
      try {
        // 模擬 API 呼叫
        const data = { temp: 27, status: 'Mostly Cloudy', h: 32, l: 25 };
        localStorage.setItem(cacheKey, JSON.stringify(data));
        return { type: 'live', data };
      } catch (e) {
        const cache = localStorage.getItem(cacheKey);
        return cache ? { type: 'cache', data: JSON.parse(cache) } : { type: 'fallback', data: { temp: 28, status: 'Sunny', h: 30, l: 24 } };
      }
    }

    // --- UI 渲染 ---
    function render() {
      const app = document.getElementById('app');
      if (state.view === 'home') {
        document.getElementById('btn-fab').style.display = 'flex';
        app.innerHTML = `
          <div class="max-w-4xl mx-auto px-6 py-16">
            <h1 class="text-4xl font-extrabold mb-10 tracking-tight px-2">行程助手</h1>
            <div class="space-y-6">
              ${state.trips.length ? state.trips.map(renderTripCard).join('') : `<div class="py-20 text-center opacity-30 font-bold">尚無旅程</div>`}
            </div>
          </div>
        `;
        bindHomeGestures();
      } else {
        document.getElementById('btn-fab').style.display = 'none';
        renderEditor();
      }
      bindGlobal();
    }

    function renderTripCard(trip) {
      return `
        <div class="swipe-container" data-id="${trip.id}">
          <div class="swipe-actions"><i class="fa-solid fa-trash-can"></i></div>
          <div class="swipe-card p-6 liquid-glass rounded-[28px] cursor-pointer" onclick="openTrip('${trip.id}')">
            <div class="flex justify-between items-center mb-10">
               <div class="w-12 h-12 rounded-full liquid-orb"></div>
               <div class="text-right">
                  <p class="text-[10px] font-black uppercase text-gray-400">Date Range</p>
                  <p class="text-xs font-bold">${trip.startDate} — ${trip.endDate}</p>
               </div>
            </div>
            <h3 class="text-2xl font-bold">${trip.title}</h3>
          </div>
        </div>
      `;
    }

    async function renderEditor() {
      const trip = state.trips.find(t => t.id === state.activeId);
      const weather = await fetchWeather(trip.days[0]?.destination || 'Kuala Lumpur');
      
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="min-h-screen pb-20">
          <header class="weather-header">
             <div class="absolute inset-0 bg-gradient-to-b from-[#2c3e50] to-[#4ca1af] opacity-90"></div>
             ${Array(15).fill().map(() => `<div class="cloud-particle" style="top:${Math.random()*60}%; width:${100+Math.random()*200}px; height:${60+Math.random()*40}px; animation-delay:${Math.random()*20}s"></div>`).join('')}
             
             <div class="relative z-10 px-8 py-16 flex flex-col items-center text-white">
                <button onclick="goHome()" class="absolute left-6 top-14 w-10 h-10 rounded-full liquid-glass flex items-center justify-center"><i class="fa-solid fa-chevron-left"></i></button>
                <h2 class="text-4xl font-bold mb-1">${trip.days[0]?.destination || '目的地'}</h2>
                <div class="text-7xl font-thin">${weather.data.temp}°</div>
                <p class="font-medium opacity-80">${weather.data.status} · H:${weather.data.h}° L:${weather.data.l}°</p>
                
                <!-- 24H Forecast inside Header -->
                <div class="w-full mt-10 liquid-glass rounded-2xl p-4 flex gap-6 overflow-x-auto no-scrollbar">
                   ${[...Array(8)].map((_, i) => `<div class="flex flex-col items-center gap-2 min-w-[50px]"><span class="text-[10px] font-bold">${i+9}PM</span><i class="fa-solid fa-cloud"></i><span class="font-bold">${27-i}°</span></div>`).join('')}
                </div>
             </div>
          </header>

          <main class="max-w-3xl mx-auto px-6 mt-8">
            <div class="space-y-6 relative">
              <div class="absolute left-6 top-10 bottom-0 w-[1px] bg-black/5"></div>
              ${trip.days.map((day, idx) => `
                <div class="relative pl-14">
                  <div class="absolute left-0 top-1 w-12 h-12 rounded-full liquid-orb flex flex-col items-center justify-center text-[10px] font-bold">
                    <span>SAT</span><span class="text-base">${17+idx}</span>
                  </div>
                  <div class="accordion-trigger cursor-pointer" onclick="toggleDay('${day.id}')">
                    <div class="flex justify-between items-center mb-2">
                       <h4 class="text-xl font-bold">${day.destination}</h4>
                       <i class="fa-solid fa-chevron-down text-xs opacity-30"></i>
                    </div>
                    <div id="acc-${day.id}" class="accordion-grid">
                       <div class="accordion-inner">
                          <div class="liquid-glass rounded-2xl p-4 mt-2">
                             <div class="relative">
                                <input type="text" class="w-full bg-transparent font-bold outline-none mb-4" value="${day.destination}" oninput="searchCity(this, '${day.id}')" />
                                <div class="suggestion-box hidden"></div>
                             </div>
                             <button onclick="showTray(event)" class="w-full py-3 rounded-xl border border-dashed border-black/10 text-xs font-bold text-gray-400">+ 添加行程</button>
                          </div>
                       </div>
                    </div>
                  </div>
                </div>
              `).join('')}
            </div>
          </main>

          <!-- Floating Tray -->
          <div id="add-tray" class="glass-tray liquid-glass shadow-2xl">
             <div class="tray-item"><i class="fa-solid fa-car text-blue-400"></i>交通</div>
             <div class="tray-item"><i class="fa-solid fa-hotel text-orange-400"></i>住宿</div>
             <div class="tray-item"><i class="fa-solid fa-map-location-dot text-green-400"></i>遊玩</div>
             <div class="tray-item"><i class="fa-solid fa-city text-purple-400"></i>城市</div>
          </div>
        </div>
      `;
    }

    // --- 互動引擎 ---
    function bindHomeGestures() {
      const cards = document.querySelectorAll('.swipe-card');
      cards.forEach(card => {
        let startX = 0;
        card.ontouchstart = (e) => { startX = e.touches[0].clientX; card.style.transition = 'none'; };
        card.ontouchmove = (e) => {
          const diff = e.touches[0].clientX - startX;
          if(diff < 0) card.style.transform = `translateX(${Math.max(diff, -100)}px)`;
        };
        card.ontouchend = (e) => {
          card.style.transition = 'transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1)';
          const diff = e.changedTouches[0].clientX - startX;
          card.style.transform = diff < -70 ? `translateX(-100px)` : `translateX(0)`;
        };
      });
    }

    window.searchCity = function(input, id) {
      const val = input.value;
      const box = input.nextElementSibling;
      const matches = CITY_DB.filter(c => c.includes(val) && val);
      if(matches.length) {
        box.innerHTML = matches.map(m => `<div class="p-4 border-b border-black/5 font-bold" onclick="selectCity('${m}', '${id}')">${m}</div>`).join('');
        box.classList.remove('hidden');
      } else {
        box.classList.add('hidden');
      }
    };

    window.selectCity = function(city, id) {
      const trip = state.trips.find(t => t.id === state.activeId);
      const day = trip.days.find(d => d.id === id);
      day.destination = city;
      save(); render();
    };

    window.toggleDay = (id) => {
      document.getElementById(`acc-${id}`).classList.toggle('expanded');
    };

    window.showTray = (e) => {
      e.stopPropagation();
      document.getElementById('add-tray').classList.add('active');
    };

    function bindGlobal() {
      document.body.onclick = () => document.getElementById('add-tray')?.classList.remove('active');
      
      const modal = document.getElementById('trip-modal');
      const card = document.getElementById('modal-card');
      
      document.getElementById('btn-fab').onclick = () => {
        modal.classList.remove('hidden');
        setTimeout(() => card.classList.remove('translate-y-full'), 10);
      };

      document.getElementById('modal-bg').onclick = () => {
        card.classList.add('translate-y-full');
        setTimeout(() => modal.classList.add('hidden'), 400);
      };

      // 智慧搜索於建立彈窗
      const inDests = document.getElementById('in-dests');
      inDests.oninput = () => searchCity(inDests, 'new');

      document.getElementById('btn-confirm-modal').onclick = () => {
        const title = document.getElementById('in-title').value;
        const start = document.getElementById('in-start').value;
        const end = document.getElementById('in-end').value;
        const dests = document.getElementById('in-dests').value;
        if(title && start && end) {
          createTrip(title, start, end, dests);
          modal.classList.add('hidden');
        }
      };
    }

    function createTrip(title, start, end, dest) {
      const daysCount = Math.ceil((new Date(end) - new Date(start)) / 86400000) + 1;
      const days = Array.from({length: daysCount}, (_, i) => ({ id: crypto.randomUUID(), destination: dest.split(',')[0] }));
      state.trips.unshift({ id: crypto.randomUUID(), title, startDate: start, endDate: end, daysCount, days });
      state.activeId = state.trips[0].id;
      state.view = 'editor';
      save(); render();
    }

    window.openTrip = (id) => { state.activeId = id; state.view = 'editor'; render(); };
    window.goHome = () => { state.view = 'home'; render(); };
    window.deleteTrip = (id) => { state.trips = state.trips.filter(t => t.id !== id); save(); render(); };

    load();
  </script>
</body>
</html>
