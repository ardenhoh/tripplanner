<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的旅行繪本 17.0</title>
    <link rel="icon" href="https://www.shutterstock.com/image-vector/airplane-vector-isolated-emoticon-emoji-600nw-2627946825.jpg">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    
    <style>
        /* ================= 17.0 全域 Arial & 質感主題 ================= */
        :root {
            --kr-cream: #F5F3EC; --kr-text: #4A4641; --kr-accent: #9A9283;
            --kr-glass: rgba(255, 255, 255, 0.4); --kr-glass-border: rgba(255, 255, 255, 0.8);
            --kr-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1); --kr-card-bg: rgba(255, 255, 255, 0.4);
        }

        body.theme-cream { --kr-cream: #F5F3EC; --kr-text: #4A4641; --kr-accent: #9A9283; --kr-bg-texture: radial-gradient(circle at 50% -20%, #ffffff 0%, transparent 80%); }
        body.theme-cement { --kr-cream: #D6D6D6; --kr-text: #2C3033; --kr-accent: #5A6066; --kr-bg-texture: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)" opacity="0.05"/></svg>'), linear-gradient(135deg, #E0E0E0, #C2C2C2); }
        body.theme-steel { --kr-cream: #AAB3BB; --kr-text: #1C2331; --kr-accent: #34425A; --kr-bg-texture: repeating-linear-gradient(90deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 1px, transparent 1px, transparent 3px), linear-gradient(160deg, #DCE2E6 0%, #A4AFB8 50%, #8895A1 100%); }

        * { font-family: Arial, sans-serif !important; }
        body { background: var(--kr-cream); background-image: var(--kr-bg-texture); color: var(--kr-text); background-attachment: fixed; -webkit-tap-highlight-color: transparent; transition: background 0.8s ease; min-height: 100vh; overflow-x: hidden; }

        .liquid-glass { background: var(--kr-card-bg); backdrop-filter: saturate(150%) blur(40px); -webkit-backdrop-filter: saturate(150%) blur(40px); border: 1px solid var(--kr-glass-border); border-radius: 24px; box-shadow: var(--kr-shadow); }

        .view-screen { display: none; min-height: 100vh; padding-bottom: 110px; animation: fadeIn 0.4s ease; }
        .view-screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 17.0 無陰影 Compact 小時天氣 */
        .day-btn, .hourly-item { box-shadow: none !important; border: 1px solid rgba(255,255,255,0.4); }
        .hourly-item { padding: 4px 0 !important; } /* Compact 化 */
        .day-btn.active, .hourly-item.active-hour { background: var(--kr-accent); color: white; border: none; }

        /* ================= 17.0 巔峰天氣渲染 (單向雲流 & 超強羽化) ================= */
        .weather-bg-container { position: absolute; inset: 0; overflow: hidden; border-radius: 24px; z-index: -1; }
        /* 晴天耀斑 */
        .anim-sun-flare { position: absolute; top: -100px; left: -80px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,240,150,0.5) 30%, transparent 70%); filter: blur(65px); animation: pulseFlare 6s infinite alternate; }
        .anim-sun-ripple { position: absolute; top: 20px; left: 20px; width: 100px; height: 100px; border-radius: 50%; box-shadow: 0 0 70px 40px rgba(255,255,255,0.6); animation: rippleEffect 3s linear infinite; }
        /* 雨天單向雲流 */
        .anim-one-way-cloud { position: absolute; background: rgba(100, 110, 125, 0.8); border-radius: 50%; filter: blur(15px); mix-blend-mode: multiply; }
        .cloud-1 { width: 300px; height: 120px; top: -20px; animation: linearDrift 18s linear infinite; }
        .cloud-2 { width: 200px; height: 80px; top: 40px; animation: linearDrift 25s linear infinite; animation-delay: -5s; }
        .anim-fine-rain { position: absolute; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.7)); width: 1px; height: 50px; animation: dropRain 0.4s linear infinite; }

        @keyframes pulseFlare { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.4); opacity: 0.9; } }
        @keyframes rippleEffect { 0% { transform: scale(0.6); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
        @keyframes linearDrift { from { transform: translateX(-120%); } to { transform: translateX(250%); } }
        @keyframes dropRain { 0% { transform: translateY(-50px) rotate(10deg); opacity: 0; } 100% { transform: translateY(250px) rotate(10deg); opacity: 0; } }

        /* ================= 17.0 Omni-FAB 彈射 & 智慧標籤 ================= */
        .omni-fab-container { position: fixed; bottom: 20px; right: 20px; z-index: 1500; display: flex; flex-direction: column-reverse; align-items: flex-end; }
        .omni-main-btn { background: var(--kr-text); color: white; width: 56px; height: 56px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.2); transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); border: 2px solid rgba(255,255,255,0.2); }
        .omni-main-btn.active { transform: rotate(45deg); background: var(--kr-accent); }
        
        .omni-menu { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; opacity: 0; pointer-events: none; transform: translateY(25px); transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); align-items: flex-end; }
        .omni-menu.active { opacity: 1; pointer-events: auto; transform: translateY(0); }
        
        .omni-label { 
            background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); 
            color: var(--kr-text); padding: 8px 16px; border-radius: 12px; font-size: 13px; font-weight: bold; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: center; 
            border: 1px solid rgba(255,255,255,0.7); transition: 0.5s ease;
        }
        .omni-menu.active .omni-label { animation: labelFadeOut 0.5s forwards; animation-delay: 3s; }
        @keyframes labelFadeOut { to { opacity: 0; filter: blur(10px); transform: scale(0.9); } }

        .omni-sub-btn { background: white; color: var(--kr-accent); width: 46px; height: 46px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 6px 20px rgba(0,0,0,0.1); font-size: 1.2rem; }

        /* 17.0 景點視覺細節 */
        .item-header img { width: 100%; height: 100%; object-fit: cover; }
        .landmark-index { position: absolute; top: 12px; left: 12px; width: 28px; height: 28px; background: rgba(154, 146, 131, 0.5); border-radius: 50%; backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 12px; }

        /* 17.0 全屏預覽 Pro */
        #fullscreen-viewer { display: none; position: fixed; inset: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.98); z-index: 4000; flex-direction: column; align-items: center; justify-content: center; }
        #fullscreen-viewer iframe, #fullscreen-viewer img { width: 100%; height: 100%; object-fit: contain; border: none; touch-action: none; }
        .fs-close-btn { position: fixed; top: 30px; right: 30px; width: 44px; height: 44px; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; z-index: 4010; cursor: pointer; }

        .react-btn:active { transform: scale(0.92); opacity: 0.8; }
        .bottom-nav { border-top: 1px solid rgba(0,0,0,0.05); }
    </style>
</head>
<body class="theme-cream">

    <div id="home-view" class="view-screen active px-5 pt-10">
        <h1 class="text-3xl font-bold mb-1 tracking-wider">My Travel Books ✈️</h1>
        <p class="text-gray-500 text-sm mb-8">選擇一本旅行繪本開始規劃</p>

        <div id="trip-list"></div>

        <div class="mt-8 liquid-glass p-5 border-dashed border-2 border-white">
            <h3 class="font-bold text-gray-700 mb-3 text-sm">✨ 創建新繪本</h3>
            <input type="text" id="new-trip-title" placeholder="輸入旅行名稱..." class="mb-4">
            <button class="btn-primary w-full react-btn" onclick="createNewTrip()">新增旅行</button>
        </div>

        <div class="omni-fab-container">
            <div class="omni-menu" id="home-omni-menu">
                <div class="flex items-center gap-4 react-btn" onclick="setTheme('steel');toggleHomeOmni()"><div class="omni-label">拉絲鋼鐵</div><div class="omni-sub-btn"><i class="fa-solid fa-gem"></i></div></div>
                <div class="flex items-center gap-4 react-btn" onclick="setTheme('cement');toggleHomeOmni()"><div class="omni-label">工業水泥</div><div class="omni-sub-btn"><i class="fa-solid fa-building"></i></div></div>
                <div class="flex items-center gap-4 react-btn" onclick="setTheme('cream');toggleHomeOmni()"><div class="omni-label">奶油奶油</div><div class="omni-sub-btn"><i class="fa-solid fa-ice-cream"></i></div></div>
            </div>
            <button class="omni-main-btn react-btn" id="home-omni-btn" onclick="toggleHomeOmni()"><i class="fa-solid fa-palette"></i></button>
        </div>
    </div>

    <div id="trip-view" class="view-screen">
        <header class="p-5 sticky top-0 z-50 liquid-glass rounded-none border-t-0 border-x-0 pb-3 mb-4">
            <div class="flex justify-between items-center">
                <button onclick="goHome()" class="text-gray-400 text-lg px-2 react-btn"><i class="fa-solid fa-chevron-left"></i></button>
                <input type="text" id="trip-title-input" class="text-xl font-bold tracking-widest text-center bg-transparent border-none p-0 w-2/3" onchange="updateTripTitle()">
                <div class="w-8"></div>
            </div>
        </header>

        <main class="max-w-md mx-auto px-4 relative">
            <div id="daily" class="tab-section active">
                <div class="h-scroll-container mb-2"><div class="h-scroll" id="day-selector"></div></div>
                <div id="weather-banner" class="liquid-glass p-5 mb-4 relative overflow-hidden"></div>
                <div id="daily-content" class="space-y-0"></div>
                
                <div class="omni-fab-container">
                    <div class="omni-menu" id="trip-omni-menu">
                        <div class="flex items-center gap-4 react-btn" onclick="openGMapApp()"><div class="omni-label">當日行程全覽</div><div class="omni-sub-btn"><i class="fa-solid fa-map-location-dot"></i></div></div>
                        <div class="flex items-center gap-4 react-btn" onclick="optimizeDailyRoute()"><div class="omni-label">優化路線</div><div class="omni-sub-btn"><i class="fa-solid fa-route"></i></div></div>
                        <div class="flex items-center gap-4 react-btn" onclick="addNewAttraction()"><div class="omni-label">添加景點</div><div class="omni-sub-btn"><i class="fa-solid fa-location-plus"></i></div></div>
                    </div>
                    <button class="omni-main-btn react-btn" id="trip-omni-btn" onclick="toggleTripOmni()"><i class="fa-solid fa-plus"></i></button>
                </div>
            </div>

            <div id="transport-stay" class="tab-section">
                <h2 class="text-xl font-bold mb-6 text-center">交通與住宿 🏨✈️</h2>
                <div class="liquid-glass p-5 mb-6"><div id="flight-content"></div><button onclick="addFlight()" class="w-full mt-4 py-3 bg-[rgba(255,255,255,0.4)] border-dashed border-2 border-white rounded-2xl text-gray-400 font-bold text-xs react-btn">+ 添加航班</button></div>
                <div class="liquid-glass p-5 mb-6"><div id="stay-content"></div><button onclick="addStay()" class="w-full mt-4 py-3 bg-[rgba(255,255,255,0.4)] border-dashed border-2 border-white rounded-2xl text-gray-400 font-bold text-xs react-btn">+ 添加住宿</button></div>
            </div>

            <div id="expenses" class="tab-section">
                <h2 class="text-xl font-bold mb-6 text-center">花費記帳 💰</h2>
                <div class="liquid-glass p-5 mb-4">
                    <div class="flex justify-between items-center mb-4"><h3 class="text-xs font-bold text-gray-400">消費分析</h3><div class="text-xs font-bold">預算 <input type="number" id="tripBudget" class="w-16 bg-transparent border-none text-right font-bold" value="0" onchange="updateBudget(this.value)"></div></div>
                    <div class="flex justify-around items-center">
                        <div class="donut-chart" id="expense-donut"></div>
                        <div class="budget-ring" id="budget-ring-el"><span class="font-bold text-lg" id="total-spent-display">0%</span></div>
                    </div>
                </div>
                <div id="expense-summary" class="space-y-3"></div>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active flex flex-col items-center react-btn" onclick="changeSection('daily', this)"><i class="fa-solid fa-calendar-day text-xl"></i><span class="text-[10px] mt-1">行程</span></button>
            <button class="nav-item flex flex-col items-center react-btn" onclick="changeSection('transport-stay', this)"><i class="fa-solid fa-plane text-xl"></i><span class="text-[10px] mt-1">交通住宿</span></button>
            <button class="nav-item flex flex-col items-center react-btn" onclick="changeSection('expenses', this)"><i class="fa-solid fa-wallet text-xl"></i><span class="text-[10px] mt-1">花費</span></button>
        </nav>
    </div>

    <div id="fullscreen-viewer" onclick="this.style.display='none'"><div class="fs-close-btn"><i class="fa-solid fa-xmark"></i></div><div id="fs-content" class="w-full h-full flex items-center justify-center"></div></div>
    
    <div id="ios-picker-modal">
        <div class="picker-container">
            <div class="flex justify-between items-center mb-4"><button onclick="closePicker()" class="text-gray-400 font-bold react-btn">取消</button><h3 class="font-bold">選擇日期</h3><button onclick="confirmPicker()" class="text-[var(--kr-accent)] font-bold react-btn">確認</button></div>
            <div class="picker-wheels"><div class="picker-selection-bar"></div><div class="wheel-col" id="wheel-year"></div><div class="wheel-col" id="wheel-month"></div><div class="wheel-col" id="wheel-day"></div></div>
        </div>
    </div>

    <script>
        let db; const dbName = "TravelBookDB_v17";
        const initDB = new Promise(resolve => {
            const req = indexedDB.open(dbName, 1);
            req.onupgradeneeded = e => { db = e.target.result; db.createObjectStore('trips', {keyPath: 'id'}); db.createObjectStore('files', {keyPath: 'id'}); };
            req.onsuccess = e => { db = e.target.result; resolve(); };
        });

        async function saveDB(store, id, data) { const tx = db.transaction(store, 'readwrite'); tx.objectStore(store).put({id, data}); }
        async function getDB(store, id) { return new Promise(r => { const req = db.transaction(store, 'readonly').objectStore(store).get(id); req.onsuccess = () => r(req.result ? req.result.data : null); }); }
        async function getAllDB(store) { return new Promise(r => { const req = db.transaction(store, 'readonly').objectStore(store).getAll(); req.onsuccess = () => r(req.result.map(x=>x.data)); }); }

        let allTrips = [], currentTrip = null, currentDayIdx = 0, exchangeRates = {};

        // 17.0 深度填充文案 (>= 50字)
        const deepIntro = "這是一個非常值得一訪的絕佳地點，融合了豐富的在地歷史文化底蘊與令人驚嘆的現代建築設計美學。無論是悠閒漫步在街道上感受獨特的氛圍，或是品嚐周邊道地的特色美食，都能讓您獲得前所未有的沉浸式旅行體驗。這裡從早到晚都有不同的迷人風貌，絕對是這趟行程中不可錯過的亮點之一。";
        const deepPos = "這裡的氛圍感真的超級棒！隨便找個角度拍照都非常出片，光線完美，濾鏡一加上去直接刷爆朋友圈。而且周邊的附屬設施非常齊全，不論是洗手間還是休息區都維持得很乾淨。服務人員態度親切專業，整體體驗遠超預期，性價比極高，強烈推薦大家一定要把這裡排進行程裡，絕對不會後悔！";
        const deepNeg = "唯一的缺點就是假日和旅遊旺季的時候人潮真的非常擁擠。如果沒有提早預訂或是避開人潮尖峰時段，光是在門口排隊就會耗掉大半天的寶貴時間，非常破壞整體的旅遊興致。此外，周邊的物價稍微偏高，尤其是特色紀念品和餐點，建議大家可以先在其他地方用餐後再過來，比較不會傷荷包。";

        function generate14DaysData() {
            let daily = [];
            const regions = ["吉隆坡","釜山","釜山","釜山-濟州","濟州島","濟州島","濟州島","濟州島","濟州島","濟州-首爾","首爾","首爾","首爾","首爾"];
            for(let i=0; i<14; i++) {
                let d = new Date(2026, 9, 29); d.setDate(d.getDate() + i);
                let dStr = `${d.getMonth()+1}/${d.getDate().toString().padStart(2,'0')}`;
                daily.push({ 
                    day: `Day ${i+1}`, date: dStr, dayName: ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()], region: regions[i],
                    items: [{ id:`d${i}_0`, time: "10:00", task: "探索"+regions[i], loc: regions[i]+"地標", lat: 35+i*0.1, lng: 129+i*0.1, intro: deepIntro, review: {pos: deepPos, neg: deepNeg}, img: "https://images.unsplash.com/photo-1514933651103-005eec06c04b?w=800", isAuto: false }]
                });
            }
            return daily;
        }

        async function init() {
            await initDB; allTrips = await getAllDB('trips');
            if(!allTrips.length) { 
                const defaultTrip = { id: Date.now().toString(), title: "2026 苦盡柑來 🍊", color: "#9A9283", users: ["我"], budget: 50000, flights: [], stays: [], expenses: [], packItems: [], daily: generate14DaysData() };
                await saveDB('trips', defaultTrip.id, defaultTrip); allTrips = [defaultTrip];
            }
            renderHome(); initPickerWheels(); fetchExchangeRateAPI();
        }

        // ================= 17.0 數據同步邏輯 (航班/住宿) =================
        async function syncDataLoop() {
            currentTrip.daily.forEach(d => d.items = d.items.filter(itm => !itm.isAuto));
            
            // 航班同步 (IATA 優先顯示)
            currentTrip.flights.forEach(f => {
                let day = currentTrip.daily.find(d => d.date === f.date);
                if(day) {
                    let displayLoc = (f.depIATA && f.arrIATA) ? `${f.depIATA} ✈️ ${f.arrIATA}` : "航班資訊";
                    day.items.push({ id:`f_${f.id}`, time:f.time, task:`航班 ${f.flight||''}`, loc:displayLoc, isAuto:true, img:"https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=800", intro:deepIntro });
                }
            });

            // 住宿同步 (入住/退房)
            currentTrip.stays.forEach(s => {
                let parts = s.date.split(' - ');
                if(parts.length === 2) {
                    let dIn = currentTrip.daily.find(d => d.date === parts[0]);
                    let dOut = currentTrip.daily.find(d => d.date === parts[1]);
                    if(dIn) dIn.items.push({ id:`s_in_${s.id}`, time:"15:00", task:`入住 ${s.name}`, loc:s.addr||s.name, isAuto:true, img:"https://images.unsplash.com/photo-1566073771259-6a8506099945?w=800", intro:deepIntro });
                    if(dOut) dOut.items.unshift({ id:`s_out_${s.id}`, time:"11:00", task:`離開 ${s.name}`, loc:s.addr||s.name, isAuto:true, img:"https://images.unsplash.com/photo-1566073771259-6a8506099945?w=800", intro:deepIntro });
                }
            });
            await saveDB('trips', currentTrip.id, currentTrip);
        }

        // ================= UI 控制 =================
        function setTheme(t) { document.body.className = `theme-${t}`; }
        function toggleHomeOmni() { document.getElementById('home-omni-btn').classList.toggle('active'); document.getElementById('home-omni-menu').classList.toggle('active'); }
        function toggleTripOmni() { document.getElementById('trip-omni-btn').classList.toggle('active'); document.getElementById('trip-omni-menu').classList.toggle('active'); }

        function renderHome() {
            document.getElementById('trip-view').classList.remove('active'); document.getElementById('home-view').classList.add('active');
            document.getElementById('trip-list').innerHTML = allTrips.map(t => `<div class="book-card react-btn" style="border-left-color: ${t.color}" onclick="openTrip('${t.id}')"><h2 class="text-2xl font-bold">${t.title}</h2><p class="text-xs text-gray-400 mt-2">${t.daily[0].date} 出發 · ${t.daily.length} 天</p></div>`).join('');
        }

        async function openTrip(id) {
            currentTrip = allTrips.find(t => t.id === id);
            document.documentElement.style.setProperty('--kr-accent', currentTrip.color);
            document.getElementById('home-view').classList.remove('active'); document.getElementById('trip-view').classList.add('active');
            document.getElementById('trip-title-input').value = currentTrip.title;
            await syncDataLoop(); renderDayNav(); renderDaily();
        }

        function renderDayNav() {
            document.getElementById('day-selector').innerHTML = currentTrip.daily.map((d, i) => `<div class="day-btn ${i===currentDayIdx?'active':''}" onclick="currentDayIdx=${i};renderDayNav();renderDaily()"><span class="text-xs font-bold">${d.day}</span><span class="text-[10px] opacity-70">${d.date}</span></div>`).join('');
        }

        async function renderDaily() {
            const d = currentTrip.daily[currentDayIdx];
            const isRainy = true; // 模擬天氣
            document.getElementById('weather-banner').innerHTML = `
                <div class="weather-bg-container ${isRainy?'weather-darken':''}">
                    ${isRainy ? '<div class="anim-one-way-cloud cloud-1"></div><div class="anim-one-way-cloud cloud-2"></div>'+Array(40).fill('<div class="anim-fine-rain" style="left:'+Math.random()*100+'%;animation-delay:'+Math.random()+'s"></div>').join('') : '<div class="anim-sun-flare"></div><div class="anim-sun-ripple"></div>'}
                </div>
                <div class="relative z-10 flex justify-between items-center ${isRainy?'text-white':'text-gray-700'}">
                    <div><div class="text-xs font-bold opacity-70">${d.region}</div><div class="text-2xl font-bold">18°C ${isRainy?'🌧️':'☀️'}</div></div>
                    <div class="h-scroll-container !p-0"><div class="h-scroll gap-2">${Array(24).fill('<div class="hourly-item px-3 flex flex-col items-center"><span class="text-[8px]">12PM</span><span class="text-xs">☀️</span><span class="text-xs">18°</span></div>').join('')}</div></div>
                </div>
            `;

            document.getElementById('daily-content').innerHTML = d.items.map((itm, i) => `
                <div class="liquid-glass overflow-hidden mb-8">
                    <div class="item-header h-40 relative">
                        <img src="${itm.img}">
                        <div class="landmark-index"><span>${itm.isAuto?'✈️':i+1}</span></div>
                    </div>
                    <div class="p-5">
                        <div class="flex justify-between items-center mb-2"><span class="text-xs font-bold text-[var(--kr-accent)]">${itm.time}</span>${itm.isAuto?'<span class="text-[10px] opacity-50">自動同步</span>':''}</div>
                        <h4 class="text-lg font-bold mb-1">${itm.task}</h4>
                        <p class="text-xs text-blue-500 mb-4 truncate"><i class="fa-solid fa-location-dot"></i> ${itm.loc}</p>
                        <div class="bg-white/40 p-3 rounded-xl text-[10px] leading-relaxed mb-3">${itm.intro}</div>
                        <div class="flex gap-2">
                            <button onclick="viewPDF('${itm.id}')" class="flex-1 py-2 bg-white/60 rounded-lg text-[10px] font-bold react-btn"><i class="fa-solid fa-file-pdf"></i> 附件檔案</button>
                            <button onclick="openGMapApp()" class="flex-1 py-2 bg-white/60 rounded-lg text-[10px] font-bold react-btn"><i class="fa-solid fa-paper-plane"></i> 導航</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ================= 17.0 數據編輯與 Picker (入住/退房修正) =================
        function renderTransportStay() {
            document.getElementById('flight-content').innerHTML = currentTrip.flights.map(f => `
                <div class="mb-4 p-4 bg-white/40 rounded-2xl">
                    <div class="flex justify-between items-center mb-2"><input value="${f.flight}" class="bg-transparent font-bold" onchange="handleFlightEdit('${f.id}', 'flight', this.value)"><button onclick="deleteFlight('${f.id}')" class="text-red-400">×</button></div>
                    <div class="flex gap-2 items-center text-xs">
                        <input value="${f.depIATA}" placeholder="出發" class="w-12 text-center" onchange="handleFlightEdit('${f.id}', 'depIATA', this.value)">
                        <i class="fa-solid fa-plane"></i>
                        <input value="${f.arrIATA}" placeholder="抵達" class="w-12 text-center" onchange="handleFlightEdit('${f.id}', 'arrIATA', this.value)">
                        <input value="${f.date}" class="flex-1 text-right" readonly onclick="openPicker('f_date_${f.id}')" onchange="handleFlightEdit('${f.id}', 'date', this.value)" id="f_date_${f.id}">
                    </div>
                </div>
            `).join('');

            document.getElementById('stay-content').innerHTML = currentTrip.stays.map(s => `
                <div class="mb-4 p-4 bg-white/40 rounded-2xl text-center">
                    <div class="flex justify-between mb-2"><input value="${s.name}" class="bg-transparent font-bold text-center w-full" onchange="handleStayEdit('${s.id}', 'name', this.value)"><button onclick="deleteStay('${s.id}')">×</button></div>
                    <div class="flex flex-col items-center gap-1">
                        <span class="text-[10px] text-gray-400 font-bold">入住 / 退房</span>
                        <div class="flex items-center gap-2 font-bold text-sm bg-white/50 px-4 py-2 rounded-xl">
                            <span onclick="openPicker('s_in_${s.id}')" id="s_in_${s.id}">${s.date.split(' - ')[0]}</span>
                            <span>-</span>
                            <span onclick="openPicker('s_out_${s.id}')" id="s_out_${s.id}">${s.date.split(' - ')[1]}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ================= 全屏預覽 Pro (雙指縮放模擬) =================
        function viewPDF(id) {
            document.getElementById('fs-content').innerHTML = `<iframe src="https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf"></iframe>`;
            document.getElementById('fullscreen-viewer').style.display = 'flex';
        }

        function openGMapApp() { window.open("https://maps.google.com", "_blank"); }

        // Picker 與其他功能
        function initPickerWheels() { 
            let h = ""; for(let i=1;i<=12;i++) h+=`<div class="wheel-item">${i.toString().padStart(2,'0')}</div>`;
            document.getElementById('wheel-month').innerHTML = h; document.getElementById('wheel-day').innerHTML = h;
        }
        function openPicker(id) { activePickerId = id; document.getElementById('ios-picker-modal').style.display='flex'; }
        function closePicker() { document.getElementById('ios-picker-modal').style.display='none'; }
        function confirmPicker() {
            const m = document.getElementById('wheel-month').children[Math.round(document.getElementById('wheel-month').scrollTop/40)].innerText;
            const d = document.getElementById('wheel-day').children[Math.round(document.getElementById('wheel-day').scrollTop/40)].innerText;
            const val = `${m}/${d}`;
            if(activePickerId.startsWith('s_in')) {
                let sid = activePickerId.replace('s_in_', ''); let s = currentTrip.stays.find(x=>x.id===sid);
                s.date = val + ' - ' + s.date.split(' - ')[1];
            } else if(activePickerId.startsWith('s_out')) {
                let sid = activePickerId.replace('s_out_', ''); let s = currentTrip.stays.find(x=>x.id===sid);
                s.date = s.date.split(' - ')[0] + ' - ' + val;
            } else {
                document.getElementById(activePickerId).value = val;
                document.getElementById(activePickerId).dispatchEvent(new Event('change'));
            }
            syncDataLoop().then(() => { renderTransportStay(); if(currentTrip) renderDaily(); });
            closePicker();
        }

        window.onload = init;
    </script>
</body>
</html>
