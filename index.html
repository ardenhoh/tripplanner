<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Travel OS 1.2 - Verification</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <style>
        :root {
            --os-height: 100dvh;
            --safe-top: env(safe-area-inset-top, 47px);
            --safe-bottom: env(safe-area-inset-bottom, 34px);
            --spring-fluid: cubic-bezier(0.23, 1, 0.32, 1);
            /* 吉隆坡 19:10 的环境色温 */
            --bg-start: #2d334a;
            --bg-end: #0f172a;
        }

        body, html {
            width: 100vw; height: var(--os-height);
            overflow: hidden; background-color: #000;
            font-family: -apple-system, "SF Pro Display", sans-serif;
            color: #fff;
        }

        /* 修复：全屏环境背景，确保永不黑屏 */
        .ambient-engine {
            position: fixed; inset: 0;
            background: linear-gradient(160deg, #3d4465 0%, #111827 100%);
            z-index: -1; transition: filter 0.8s var(--spring-fluid);
        }

        /* 亚克力铭牌：高度压缩 50% */
        .nameplate {
            position: relative; width: 100%;
            padding: 14px 20px; /* 极简内边距 */
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(30px) saturate(1.5);
            -webkit-backdrop-filter: blur(30px) saturate(1.5);
            border: 0.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px; margin-bottom: 10px;
            transition: all 0.5s var(--spring-fluid);
            z-index: 10;
        }

        /* 展开逻辑：符合 iPhone 宽度且全屏遮罩 */
        .nameplate.expanded {
            position: fixed; 
            inset: calc(var(--safe-top) + 20px) 16px auto 16px;
            width: calc(100% - 32px); height: 400px;
            background: rgba(255, 255, 255, 0.9);
            color: #000; z-index: 1000;
        }

        /* 点击外部关闭的影子蒙层 */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            z-index: 999; opacity: 0; pointer-events: none;
            transition: opacity 0.5s var(--spring-fluid);
        }
        .overlay.active { opacity: 1; pointer-events: auto; }

        .tag { font-size: 10px; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }
        .title { font-size: 18px; font-weight: 400; margin-top: 2px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [activeId, setActiveId] = useState(null);

            const close = () => setActiveId(null);

            return (
                <div style={{ height: '100%', position: 'relative' }}>
                    <div className={`ambient-engine ${activeId ? 'active' : ''}`} />
                    
                    {/* 点击外部关闭的热区 */}
                    <div className={`overlay ${activeId ? 'active' : ''}`} onClick={close} />

                    <main style={{ padding: 'calc(var(--safe-top) + 20px) 16px' }}>
                        <header style={{ marginBottom: '30px' }}>
                            <h1 style={{ fontWeight: 200, fontSize: '28px' }}>Kuala Lumpur</h1>
                            <p style={{ opacity: 0.4, fontSize: '14px' }}>19:12 · 旅程沉淀中</p>
                        </header>

                        {/* 铭牌 1 */}
                        <div className={`nameplate ${activeId === 1 ? 'expanded' : ''}`} onClick={() => setActiveId(1)}>
                            <div className="tag">Dining · 19:30</div>
                            <div className="title">KIWAMI Yakiniku</div>
                            {activeId === 1 && (
                                <div style={{ marginTop: '40px', animation: 'fadeIn 0.4s' }}>
                                    <p>详情内容已展开</p>
                                    <p style={{ marginTop: '20px', fontSize: '14px', opacity: 0.6 }}>
                                        这里是您的旅行陪伴空间。<br/>点击卡片以外的区域即可关闭。
                                    </p>
                                </div>
                            )}
                        </div>

                        {/* 铭牌 2 */}
                        <div className="nameplate" onClick={() => setActiveId(2)} style={{ opacity: activeId ? 0 : 1 }}>
                            <div className="tag">Flight · 09:00</div>
                            <div className="title">MH001 · 台北</div>
                        </div>
                    </main>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
