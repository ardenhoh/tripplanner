<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的旅行繪本</title>
    <link rel="icon" href="https://www.shutterstock.com/image-vector/airplane-vector-isolated-emoticon-emoji-600nw-2627946825.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    
    <style>
        :root {
            --kr-cream: #F5F3EC; --kr-text: #4A4641; --kr-accent: #9A9283;
            --kr-glass: rgba(255, 255, 255, 0.4); --kr-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
        }
        body.theme-cream { --kr-cream: #F5F3EC; --kr-text: #4A4641; --kr-accent: #9A9283; }
        body.theme-cement { --kr-cream: #D6D6D6; --kr-text: #2C3033; --kr-accent: #5A6066; }
        body.theme-steel { --kr-cream: #AAB3BB; --kr-text: #1C2331; --kr-accent: #34425A; }

        /* 嚴格保留全域 Arial 字體 */
        body, input, textarea, select, button { font-family: Arial, sans-serif !important; }
        body { background: var(--kr-cream); color: var(--kr-text); min-height: 100vh; -webkit-tap-highlight-color: transparent; transition: 0.3s; }

        .liquid-glass { background: var(--kr-glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.6); box-shadow: var(--kr-shadow); border-radius: 24px; position: relative; }
        
        .view-screen, .tab-section { display: none; }
        .view-screen.active, .tab-section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(245,243,236,0.9); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 12px 0 25px 0; border-top: 1px solid rgba(255,255,255,0.5); z-index: 1000; }
        .nav-item { color: #C2BCB3; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--kr-text); transform: translateY(-4px); }

        .h-scroll-container { overflow-x: auto; scrollbar-width: none; scroll-behavior: smooth; margin: 0 -5px; padding: 0 5px; }
        .h-scroll-container::-webkit-scrollbar { display: none; }
        .day-btn { flex: 0 0 auto; min-width: 75px; height: 60px; border-radius: 12px; background: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.8); color: #777; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; margin-right: 8px; }
        .day-btn.active { background: var(--kr-accent); color: white; border-color: transparent; }

        /* 天氣實時排版 (12AM-11PM) */
        .hourly-item { flex: 0 0 50px; height: 65px; border-radius: 12px; background: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.3); display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 0.7rem; margin-right: 8px; }
        .hourly-item.active-hour { background: var(--kr-accent); color: white; transform: scale(1.05); font-weight: bold; }

        /* OmniFab 蘋果級交互 */
        .omni-fab-container { position: fixed; bottom: 85px; right: 20px; z-index: 1050; display: flex; flex-direction: column; align-items: flex-end; gap: 15px; pointer-events: none; }
        .omni-main-btn { width: 56px; height: 56px; border-radius: 50%; background: var(--kr-text); color: white; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 25px rgba(0,0,0,0.3); transition: 0.3s; pointer-events: auto; }
        .omni-main-btn.active { transform: rotate(45deg); background: var(--kr-accent); }
        .omni-menu { display: flex; flex-direction: column-reverse; gap: 12px; align-items: flex-end; position: absolute; bottom: 70px; right: 0; opacity: 0; pointer-events: none; transition: 0.3s; }
        .omni-menu.active { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .omni-item { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .omni-label { background: rgba(255,255,255,0.4); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 0.5px solid rgba(255,255,255,0.6); color: var(--kr-text); padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: bold; transition: opacity 0.5s ease; opacity: 1; }
        .omni-label.faded { opacity: 0; pointer-events: none; }
        .omni-icon { width: 44px; height: 44px; border-radius: 50%; background: white; color: var(--kr-accent); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        /* 極簡 Bauhaus 彈窗 (純霧面，無白框，支援鍵盤居中) */
        .bauhaus-modal { display: none; position: fixed; inset: 0; height: 100dvh; background: rgba(245,243,236,0.3); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); z-index: 6000; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; padding: 20px; }
        .bauhaus-modal.active { display: flex; opacity: 1; }
        .bauhaus-grid { display: flex; flex-direction: column; gap: 30px; align-items: center; }
        .bauhaus-circle { width: 72px; height: 72px; border-radius: 50%; background: var(--kr-accent); color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); transition: 0.2s; }
        .bauhaus-circle:active { transform: scale(0.9); }
        .form-box { background: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.8); border-radius: 24px; padding: 24px; width: 100%; max-width: 340px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        
        /* 城市進度條 (合併邏輯) */
        #city-progress-wrapper { overflow-x: auto; scrollbar-width: none; margin: 10px 0; border-radius: 8px; background: rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.5); }
        #city-progress-wrapper::-webkit-scrollbar { display: none; }
        #city-progress-bar { display: flex; height: 28px; min-width: max-content; }
        .city-seg { display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: var(--kr-text); border-right: 2px solid white; position: relative; overflow: hidden; }
        .city-seg:last-child { border-right: none; }
        .city-seg::before { content:''; position:absolute; inset:0; background:var(--kr-accent); opacity:0.1; }

        input, select, textarea { width: 100%; padding: 10px; border-radius: 12px; border: none; background: rgba(255,255,255,0.8); font-size: 14px; color: var(--kr-text); margin-bottom: 10px; outline: none; }
        .btn-primary { background: var(--kr-accent); color: white; padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; border: none; }
        
        .smart-suggestion { position: absolute; top: 100%; left: 0; right: 0; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 7000; overflow: hidden; }
        .suggestion-item { padding: 10px 15px; border-bottom: 1px solid #f0f0f0; font-size: 13px; cursor: pointer; }
    </style>
</head>
<body class="theme-cream">

    <!-- 首頁 -->
    <div id="home-view" class="view-screen active px-5 pt-10">
        <h1 class="text-3xl font-bold mb-6 tracking-tight">My Travel Books ✈️</h1>
        <div id="trip-list"></div>
        <div class="liquid-glass p-5 mt-8 border-dashed">
            <h3 class="font-bold text-gray-700 mb-3 text-sm">✨ 創建新繪本</h3>
            <input type="text" id="new-trip-title" placeholder="輸入旅行名稱...">
            <button class="btn-primary" onclick="initDefaultTrip()">新增旅行</button>
        </div>
    </div>

    <!-- 行程頁面 -->
    <div id="trip-view" class="view-screen">
        <header class="p-5 flex justify-between items-center sticky top-0 z-50 bg-[#F5F3EC]/90 backdrop-blur">
            <button onclick="goHome()" class="text-gray-400"><i class="fa-solid fa-chevron-left text-xl"></i></button>
            <span class="font-bold text-lg" id="trip-title-display"></span>
            <div class="w-6"></div>
        </header>

        <main class="max-w-md mx-auto px-4">
            <!-- Tab 1: 行程 -->
            <div id="daily" class="tab-section active">
                <div class="h-scroll-container"><div class="flex" id="day-selector"></div></div>
                
                <!-- 城市進度條 -->
                <div id="city-progress-wrapper"><div id="city-progress-bar"></div></div>
                
                <!-- 左側天氣實時排版 -->
                <div id="weather-banner" class="liquid-glass p-5 mb-4 overflow-hidden"></div>
                
                <div id="daily-content" class="space-y-4"></div>
            </div>

            <!-- Tab 2: 交通住宿 -->
            <div id="trans-stay" class="tab-section">
                <h2 class="text-xl font-bold mb-4 text-center">交通與住宿 🏨✈️</h2>
                <div id="stay-content" class="space-y-3 mb-6"></div>
                <div id="flight-content" class="space-y-3"></div>
            </div>

            <!-- Tab 3: 花費 -->
            <div id="expenses" class="tab-section">
                <h2 class="text-xl font-bold mb-4 text-center">花費記帳 💰</h2>
                <div class="liquid-glass p-5 mb-4 text-center"><div class="text-xs text-gray-400 mb-2">預算</div><input type="number" id="tripBudget" class="text-center font-bold text-xl bg-transparent" value="50000" onchange="calcBudget()"></div>
                <div class="liquid-glass p-5 mb-4">
                    <h3 class="text-sm font-bold mb-2">實時匯率計算</h3>
                    <div class="flex gap-2 mb-2"><select id="curFrom" class="w-1/3"></select><input type="number" id="curAmount" value="100" class="w-2/3" oninput="convertCur()"></div>
                    <div class="flex gap-2"><select id="curTo" class="w-1/3"></select><input type="text" id="curResult" class="w-2/3 bg-white" readonly></div>
                </div>
                <div class="liquid-glass p-5"><h3 class="text-sm font-bold mb-2">新增花費</h3><input type="text" id="expName" placeholder="花費名稱"><div class="flex gap-2"><input type="number" id="expAmt" placeholder="金額"><select id="expCur"></select></div><button class="btn-primary mt-2" onclick="addExp()">新增</button></div>
                <div id="expense-list" class="mt-4 space-y-2"></div>
            </div>

            <!-- Tab 4: 行李 -->
            <div id="packing" class="tab-section">
                <h2 class="text-xl font-bold mb-4 text-center">行李清單 🎒</h2>
                <div class="liquid-glass p-5 mb-4"><div class="flex gap-2"><select id="packCat" class="w-1/3"><option>📄 證件</option><option>👕 衣物</option><option>🔌 點子</option></select><input type="text" id="packName" class="w-2/3" placeholder="物品..."><button class="bg-[var(--kr-accent)] text-white px-3 rounded-xl" onclick="addPack()"><i class="fa-solid fa-plus"></i></button></div></div>
                <div id="pack-list" class="space-y-3"></div>
            </div>

            <!-- Tab 5: 翻譯 OCR -->
            <div id="translate" class="tab-section">
                <h2 class="text-xl font-bold mb-4 text-center">即時翻譯與 OCR 🗣️</h2>
                <div class="liquid-glass p-5 space-y-3">
                    <div class="flex gap-2 items-center"><select id="langFrom"><option value="zh">中文</option></select><i class="fa-solid fa-arrow-right"></i><select id="langTo"><option value="ko">韓文</option><option value="ja">日文</option><option value="en">英文</option></select></div>
                    <textarea id="transIn" rows="3" placeholder="輸入文字..."></textarea>
                    <div class="flex gap-2"><button class="btn-primary flex-1" onclick="doTranslate()">翻譯</button><label class="bg-white border flex-1 rounded-xl flex items-center justify-center cursor-pointer"><i class="fa-solid fa-camera text-[var(--kr-accent)]"></i><input type="file" accept="image/*" class="hidden" onchange="doOCR(this)"></label></div>
                    <p id="ocrStat" class="text-xs text-center text-[var(--kr-accent)] hidden">辨識中...</p>
                    <div class="relative"><textarea id="transOut" rows="3" readonly></textarea><button onclick="speakOut()" class="absolute bottom-4 right-4 text-gray-500"><i class="fa-solid fa-volume-high"></i></button></div>
                </div>
            </div>
        </main>

        <!-- 底部導航 -->
        <nav class="bottom-nav">
            <button class="nav-item active" onclick="switchTab('daily', this)"><i class="fa-solid fa-map-location-dot text-xl"></i><span class="text-[10px]">行程</span></button>
            <button class="nav-item" onclick="switchTab('trans-stay', this)"><i class="fa-solid fa-plane text-xl"></i><span class="text-[10px]">住宿</span></button>
            <button class="nav-item" onclick="switchTab('expenses', this)"><i class="fa-solid fa-wallet text-xl"></i><span class="text-[10px]">花費</span></button>
            <button class="nav-item" onclick="switchTab('packing', this)"><i class="fa-solid fa-suitcase text-xl"></i><span class="text-[10px]">行李</span></button>
            <button class="nav-item" onclick="switchTab('translate', this)"><i class="fa-solid fa-language text-xl"></i><span class="text-[10px]">翻譯</span></button>
        </nav>

        <!-- OmniFab (蘋果級交互) -->
        <div class="omni-fab-container">
            <div class="omni-menu" id="omni-menu">
                <div class="omni-item" onclick="openBauhausModal()">
                    <span class="omni-label">添加項目</span>
                    <div class="omni-icon"><i class="fa-solid fa-plus"></i></div>
                </div>
            </div>
            <button class="omni-main-btn" id="omni-btn" onclick="toggleOmni()"><i class="fa-solid fa-plus"></i></button>
        </div>
    </div>

    <!-- Bauhaus 項目選擇 (純霧面背景，點擊外部關閉) -->
    <div id="bauhaus-modal" class="bauhaus-modal" onclick="closeModal('bauhaus-modal')">
        <div class="bauhaus-grid" onclick="event.stopPropagation()">
            <div class="flex flex-col items-center gap-2 cursor-pointer" onclick="openForm('city')"><div class="bauhaus-circle"><i class="fa-solid fa-city"></i></div><span class="font-bold text-gray-800 text-sm">城市</span></div>
            <div class="flex flex-col items-center gap-2 cursor-pointer" onclick="openForm('trans')"><div class="bauhaus-circle"><i class="fa-solid fa-train"></i></div><span class="font-bold text-gray-800 text-sm">交通</span></div>
            <div class="flex flex-col items-center gap-2 cursor-pointer" onclick="openForm('play')"><div class="bauhaus-circle"><i class="fa-solid fa-star"></i></div><span class="font-bold text-gray-800 text-sm">遊玩</span></div>
            <div class="flex flex-col items-center gap-2 cursor-pointer" onclick="openForm('stay')"><div class="bauhaus-circle"><i class="fa-solid fa-bed"></i></div><span class="font-bold text-gray-800 text-sm">住宿</span></div>
        </div>
    </div>

    <!-- 數據表單模態框 -->
    <div id="form-modal" class="bauhaus-modal" onclick="closeModal('form-modal')">
        <div class="form-box" id="form-content" onclick="event.stopPropagation()"></div>
    </div>

    <script>
        // ================= 14 天完整深度 JSON =================
        const DEEP_INTRO = "身為對空間數據極度敏感的分析師，我必須說這處場域是包浩斯風格與工業結構美學的極致體現。幾何對稱性與不鏽鋼材質在自然光下形成的張力數據矩陣，停留兩小時仔細觀察是基本尊重。";
        const DEEP_POS = "動線規劃完美適配人體工學數據。採光層次感極強，隨手拍攝皆是具有工業秩序美感的構圖，情感溢價極高。";
        const DEEP_NEG = "週末人流量會產生嚴重的噪聲干擾，建議在非高峰時段前往。周邊餐飲定價存在顯著的觀光客溢價，建議預先規劃用餐。";

        let currentTrip = null;
        let currentDayIdx = 0;
        let exRates = {};

        function initDefaultTrip() {
            currentTrip = {
                id: Date.now(), title: "2026 苦盡柑來 🍊", budget: 50000,
                daily: Array.from({length: 14}, (_, i) => ({
                    date: `2026/10/${29 + i}`, region: i < 3 ? "吉隆坡" : (i < 8 ? "釜山" : "首爾"),
                    items: [{ id: Date.now()+i, time: "10:00", task: "數據美學探索", loc: "藝術園區", intro: DEEP_INTRO, review: {pos: DEEP_POS, neg: DEEP_NEG}, isAuto: false }]
                })),
                stays: [], flights: [], expenses: [], packs: [{c:"📄 證件", n:"護照正本"}]
            };
            document.getElementById('home-view').classList.remove('active');
            document.getElementById('trip-view').classList.add('active');
            document.getElementById('trip-title-display').innerText = currentTrip.title;
            renderAll(); initAPI();
        }

        function renderAll() { renderDayNav(); renderCityProgress(); renderDaily(); renderTransStay(); renderExp(); renderPack(); }

        // ================= OmniFab & Modals =================
        function toggleOmni() {
            const menu = document.getElementById('omni-menu');
            const btn = document.getElementById('omni-btn');
            const label = menu.querySelector('.omni-label');
            menu.classList.toggle('active'); btn.classList.toggle('active');
            if(menu.classList.contains('active')) {
                label.classList.remove('faded');
                setTimeout(() => label.classList.add('faded'), 3000);
            }
        }

        function openBauhausModal() { toggleOmni(); document.getElementById('bauhaus-modal').classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        const CITY_DB = ["吉隆坡", "吉林", "釜山", "首爾", "台北", "東京"];
        function recCity(val) {
            const box = document.getElementById('city-sug');
            if(!val) return box.classList.add('hidden');
            const match = CITY_DB.filter(c => c.includes(val));
            if(match.length) { box.innerHTML = match.map(c => `<div class="suggestion-item" onclick="selCity('${c}')">${c}</div>`).join(''); box.classList.remove('hidden'); }
            else box.classList.add('hidden');
        }
        function selCity(c) { document.getElementById('f-city').value = c; document.getElementById('city-sug').classList.add('hidden'); }

        function openForm(type) {
            closeModal('bauhaus-modal');
            const m = document.getElementById('form-modal'); const c = document.getElementById('form-content');
            m.classList.add('active');
            
            if(type === 'city') {
                c.innerHTML = `<h3 class="font-bold mb-4 text-center">📍 設置城市</h3><div class="relative"><input id="f-city" placeholder="城市名 (如: 吉)" oninput="recCity(this.value)"><div id="city-sug" class="smart-suggestion hidden"></div></div><div class="flex gap-2"><input id="f-c-in" placeholder="前往 YYYY/MM/DD"><input id="f-c-out" placeholder="離開 YYYY/MM/DD"></div><button class="btn-primary mt-4" onclick="syncCity()">確認新增</button>`;
            } else if(type === 'stay') {
                c.innerHTML = `<h3 class="font-bold mb-4 text-center">🏨 設置住宿</h3><input id="f-s-name" placeholder="酒店名稱"><div class="flex gap-2"><input id="f-s-in" placeholder="入住 YYYY/MM/DD"><input id="f-s-out" placeholder="退房 YYYY/MM/DD"></div><button class="btn-primary mt-4" onclick="syncStay()">自動生成行程</button>`;
            } else if(type === 'trans') {
                c.innerHTML = `<h3 class="font-bold mb-4 text-center">🚀 設置交通</h3><select id="f-t-type"><option>飞机</option><option>火车</option><option>地铁</option><option>巴士</option><option>自驾</option></select><input id="f-t-num" placeholder="班次編號"><div class="flex gap-2"><input id="f-t-dep" placeholder="出發地"><input id="f-t-arr" placeholder="目的地"></div><div class="flex gap-2"><input id="f-t-date" placeholder="日期 YYYY/MM/DD"><input id="f-t-time" type="time"></div><button class="btn-primary mt-4" onclick="syncTrans()">確認同步</button>`;
            } else if(type === 'play') {
                c.innerHTML = `<h3 class="font-bold mb-4 text-center">🔍 搜尋景點</h3><input id="f-p-name" placeholder="輸入景點..."><button class="btn-primary mt-4" onclick="syncPlay()">確認添加</button>`;
            }
        }

        // ================= 智能數據同步 (閉環) =================
        function getDateArr(s, e) { let d=[]; let c=new Date(s); let l=new Date(e); while(c<=l){ d.push(`${c.getFullYear()}/${(c.getMonth()+1).toString().padStart(2,'0')}/${c.getDate().toString().padStart(2,'0')}`); c.setDate(c.getDate()+1); } return d; }

        function syncStay() {
            const n = document.getElementById('f-s-name').value; const s = document.getElementById('f-s-in').value; const e = document.getElementById('f-s-out').value;
            if(!n||!s||!e) return alert("資訊不全");
            currentTrip.stays.push({n, date: `${s} - ${e}`});
            
            getDateArr(s, e).forEach(dStr => {
                let d = currentTrip.daily.find(x => x.date === dStr);
                if(d) {
                    if(dStr === s) d.items.push({ id:Date.now(), time:"15:00", task:`入住 ${n}`, loc:n, intro:DEEP_INTRO, review:{pos:DEEP_POS, neg:DEEP_NEG}, isAuto:true });
                    else d.items.unshift({ id:Date.now(), time:"09:00", task: dStr===e ? `退房 ${n}` : `從 ${n} 出發`, loc:n, intro:DEEP_INTRO, review:{pos:DEEP_POS, neg:DEEP_NEG}, isAuto:true });
                }
            });
            closeModal('form-modal'); renderAll();
        }

        function syncCity() {
            const c = document.getElementById('f-city').value; const s = document.getElementById('f-c-in').value; const e = document.getElementById('f-c-out').value;
            getDateArr(s, e).forEach(dStr => { let d = currentTrip.daily.find(x => x.date === dStr); if(d) d.region = c; });
            closeModal('form-modal'); renderAll();
        }

        function syncTrans() {
            const ty = document.getElementById('f-t-type').value; const no = document.getElementById('f-t-num').value;
            const dStr = document.getElementById('f-t-date').value; const tm = document.getElementById('f-t-time').value;
            const dep = document.getElementById('f-t-dep').value; const arr = document.getElementById('f-t-arr').value;
            
            if(!['地铁','巴士'].includes(ty)) currentTrip.flights.push({title: `${ty} ${no}`, date: dStr, time:tm, route:`${dep}➔${arr}`});
            let d = currentTrip.daily.find(x => x.date === dStr);
            if(d) d.items.push({ id:Date.now(), time:tm, task:`${ty} ${no}`, loc:`${dep}➔${arr}`, intro:DEEP_INTRO, review:{pos:DEEP_POS, neg:DEEP_NEG}, isAuto:true });
            closeModal('form-modal'); renderAll();
        }

        function syncPlay() {
            const n = document.getElementById('f-p-name').value || "自定義景點";
            currentTrip.daily[currentDayIdx].items.push({ id:Date.now(), time:"12:00", task:n, loc:"地址待補", intro:DEEP_INTRO, review:{pos:DEEP_POS, neg:DEEP_NEG}, isAuto:false });
            closeModal('form-modal'); renderAll();
        }

        function deleteItem(idx) { if(confirm("刪除？")) { currentTrip.daily[currentDayIdx].items.splice(idx,1); renderDaily(); } }
        function deleteStay(idx) { currentTrip.stays.splice(idx,1); renderTransStay(); }
        function deleteFlight(idx) { currentTrip.flights.splice(idx,1); renderTransStay(); }

        // ================= UI 渲染 =================
        function renderDayNav() {
            document.getElementById('day-selector').innerHTML = currentTrip.daily.map((d, i) => `<div class="day-btn ${i===currentDayIdx?'active':''}" onclick="setDay(${i})"><div class="font-bold">Day ${i+1}</div><div class="text-[10px]">${d.date.substring(5)}</div></div>`).join('');
        }

        function renderCityProgress() {
            const bar = document.getElementById('city-progress-bar'); bar.innerHTML = '';
            let grps = [];
            currentTrip.daily.forEach(d => {
                if(grps.length===0 || grps[grps.length-1].name !== d.region) grps.push({name: d.region, c: 1});
                else grps[grps.length-1].c++;
            });
            grps.forEach(g => {
                let seg = document.createElement('div'); seg.className = 'city-seg';
                seg.style.width = (g.c * 83) + 'px'; // 配合上方按鈕寬度
                seg.innerText = g.name; bar.appendChild(seg);
            });
            document.querySelector('.h-scroll-container').addEventListener('scroll', function() { document.getElementById('city-progress-wrapper').scrollLeft = this.scrollLeft; });
        }

        function setDay(i) { currentDayIdx = i; renderDayNav(); renderDaily(); }

        function renderDaily() {
            const d = currentTrip.daily[currentDayIdx];
            
            // 左側實時天氣 + 12AM-11PM
            const hHour = new Date().getHours();
            let hHtml = Array.from({length:24}, (_,i)=>{
                let ampm = i>=12?'PM':'AM'; let h12 = i%12||12; let act = i===hHour?'active-hour':'';
                return `<div class="hourly-item ${act}"><div>${h12}${ampm}</div><div class="text-lg">☀️</div><div class="font-bold">28°</div></div>`;
            }).join('');
            
            document.getElementById('weather-banner').innerHTML = `
                <div class="flex justify-between items-center mb-3">
                    <div><div class="text-[10px] font-bold text-gray-400 mb-1"><i class="fa-solid fa-location-dot"></i> ${d.region}</div><div class="text-2xl font-bold">28°C ☀️</div></div>
                </div>
                <div class="flex overflow-x-auto scrollbar-hide">${hHtml}</div>
            `;

            document.getElementById('daily-content').innerHTML = d.items.map((itm, i) => `
                <div class="liquid-glass p-5">
                    <div class="flex justify-between items-center mb-2"><span class="text-xs font-bold text-[var(--kr-accent)]">${itm.time} ${itm.isAuto?'(自動)':''}</span><button onclick="deleteItem(${i})" class="text-gray-300"><i class="fa-solid fa-trash"></i></button></div>
                    <h4 class="font-bold text-lg mb-1">${itm.task}</h4>
                    <p class="text-[10px] text-gray-500 mb-2"><i class="fa-solid fa-map-pin"></i> ${itm.loc}</p>
                    <div class="text-xs text-gray-600 leading-relaxed bg-white/50 p-3 rounded-xl border border-white">${itm.intro}</div>
                </div>
            `).join('');
        }

        function renderTransStay() {
            document.getElementById('stay-content').innerHTML = currentTrip.stays.map((s,i) => `<div class="liquid-glass p-4"><div class="flex justify-between"><div class="font-bold"><i class="fa-solid fa-bed text-[var(--kr-accent)]"></i> ${s.n}</div><button onclick="deleteStay(${i})" class="text-red-400"><i class="fa-solid fa-trash"></i></button></div><div class="text-xs text-gray-500 mt-2">${s.date}</div></div>`).join('');
            document.getElementById('flight-content').innerHTML = currentTrip.flights.map((f,i) => `<div class="liquid-glass p-4"><div class="flex justify-between"><div class="font-bold"><i class="fa-solid fa-plane text-[var(--kr-accent)]"></i> ${f.title}</div><button onclick="deleteFlight(${i})" class="text-red-400"><i class="fa-solid fa-trash"></i></button></div><div class="text-xs mt-2">${f.date} ${f.time} | ${f.route}</div></div>`).join('');
        }

        // ================= 100% 保留：花費、行李、OCR =================
        async function initAPI() {
            try { let r = await fetch("https://open.er-api.com/v6/latest/USD"); let d = await r.json(); exRates = d.rates; 
                let o = Object.keys(exRates).slice(0,20).map(k=>`<option value="${k}">${k}</option>`).join('');
                document.getElementById('curFrom').innerHTML=o; document.getElementById('curTo').innerHTML=o; document.getElementById('expCur').innerHTML=o;
                document.getElementById('curFrom').value="MYR"; document.getElementById('curTo').value="KRW"; document.getElementById('expCur').value="KRW";
            } catch(e) {}
        }
        function convertCur() { let f=document.getElementById('curFrom').value; let t=document.getElementById('curTo').value; let a=document.getElementById('curAmount').value; if(exRates[f]&&exRates[t]) document.getElementById('curResult').value = ((a/exRates[f])*exRates[t]).toFixed(2); }
        function addExp() { let n=document.getElementById('expName').value; let a=document.getElementById('expAmt').value; let c=document.getElementById('expCur').value; if(n&&a) { currentTrip.expenses.push({n,a,c}); renderExp(); } }
        function renderExp() { document.getElementById('expense-list').innerHTML = currentTrip.expenses.map((e,i)=>`<div class="flex justify-between bg-white/50 p-2 rounded-lg text-sm border border-white"><span>${e.n}</span><span class="font-bold font-mono">${e.a} ${e.c} <i class="fa-solid fa-trash ml-2 text-red-300 cursor-pointer" onclick="currentTrip.expenses.splice(${i},1);renderExp()"></i></span></div>`).join(''); }
        
        function addPack() { let c=document.getElementById('packCat').value; let n=document.getElementById('packName').value; if(n){ currentTrip.packs.push({c,n}); renderPack(); } }
        function renderPack() { document.getElementById('pack-list').innerHTML = currentTrip.packs.map((p,i)=>`<div class="flex items-center gap-2 bg-white/50 p-2 rounded-lg text-sm border border-white"><input type="checkbox"><span>[${p.c}] ${p.n}</span><i class="fa-solid fa-trash ml-auto text-red-300 cursor-pointer" onclick="currentTrip.packs.splice(${i},1);renderPack()"></i></div>`).join(''); }

        async function doTranslate() { const i=document.getElementById('transIn').value; const t=document.getElementById('langTo').value; document.getElementById('transOut').value="翻譯中..."; try { const r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(i)}&langpair=zh|${t}`); const d=await r.json(); document.getElementById('transOut').value=d.responseData.translatedText; } catch(e){} }
        async function doOCR(i) { if(!i.files[0])return; document.getElementById('ocrStat').classList.remove('hidden'); try { const res=await Tesseract.recognize(i.files[0], 'eng+kor+chi_tra'); document.getElementById('transIn').value=res.data.text.trim(); document.getElementById('ocrStat').classList.add('hidden'); doTranslate(); }catch(e){} }
        function speakOut() { let u = new SpeechSynthesisUtterance(document.getElementById('transOut').value); u.lang = document.getElementById('langTo').value==='ko'?'ko-KR':'en-US'; window.speechSynthesis.speak(u); }

        function switchTab(id, btn) { document.querySelectorAll('.tab-section').forEach(s=>s.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active')); document.getElementById(id).classList.add('active'); btn.classList.add('active'); }
        function goHome() { document.getElementById('trip-view').classList.remove('active'); document.getElementById('home-view').classList.add('active'); }
    </script>
</body>
</html>
