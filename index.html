<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Travel OS 1.0.7-LGE</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <style>
        :root {
            /* 物理参数锁定 */
            --os-height: 100dvh;
            --safe-top: env(safe-area-inset-top, 47px);
            --safe-bottom: env(safe-area-inset-bottom, 34px);
            --spring-fluid: cubic-bezier(0.23, 1, 0.32, 1);

            /* 原子化材质变量 */
            --glass-border: rgba(255, 255, 255, 0.15);
            --rim-light: rgba(255, 255, 255, 0.3);
            --glass-bg: rgba(255, 255, 255, 0.08);
            
            /* 初始状态：晴昼 (奶油白/莫兰迪蓝) */
            --ambient-1: #B9E6FE; 
            --ambient-2: #E0F2FE; 
            --ambient-stop: #FDFCF0; 
            --text-primary: rgba(28, 28, 30, 0.85);
            --text-sub: rgba(60, 60, 67, 0.6);
        }

        body, html {
            width: 100vw; height: var(--os-height);
            margin: 0; padding: 0; overflow: hidden; 
            background-color: var(--ambient-stop); 
            font-family: -apple-system, "SF Pro Display", sans-serif;
            -webkit-font-smoothing: antialiased;
            transition: background 2s var(--spring-fluid);
        }

        /* 渲染路径零冗余：隔离的大气背景引擎 */
        .ambient-engine {
            position: fixed; inset: 0;
            background: 
                radial-gradient(circle at 5% 0%, var(--ambient-1) 0%, transparent 85%),
                radial-gradient(circle at 95% 100%, var(--ambient-stop) 0%, transparent 85%),
                linear-gradient(165deg, var(--ambient-2) 0%, var(--ambient-stop) 100%);
            background-size: 150% 150%;
            z-index: -1; transform: translateZ(0);
            animation: fluid-vibe 30s infinite alternate linear;
            isolation: isolate; 
        }

        @keyframes fluid-vibe {
            0% { background-position: 0% 0%; }
            100% { background-position: 15% 12%; }
        }

        .weather-noise {
            position: fixed; inset: 0;
            background: url('data:image/svg+xml,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity="0.03"/></svg>');
            z-index: 0; pointer-events: none; mix-blend-mode: overlay;
        }

        /* 材质原子化：具有物理折射感的静息铭牌 */
        .nameplate {
            position: relative; margin: 0 16px 12px 16px; width: auto;
            padding: 14px 20px; 
            background: var(--glass-bg);
            backdrop-filter: blur(35px) saturate(1.8);
            -webkit-backdrop-filter: blur(35px) saturate(1.8);
            border: 0.5px solid var(--glass-border);
            border-radius: 20px; transition: all 0.5s var(--spring-fluid);
            z-index: 50; cursor: pointer;
            color: var(--text-primary);
            box-shadow: 
                inset 0 0.5px 1px var(--rim-light),
                0 4px 12px rgba(0,0,0,0.02);
        }

        /* 展开卡片：空间平衡与居中 */
        .nameplate.expanded {
            position: fixed; margin: 0; left: 16px; right: 16px; 
            top: 50%; transform: translateY(-50%);
            max-height: 75dvh;
            background: rgba(255, 255, 255, 0.96);
            color: #1c1c1e; z-index: 1000;
            padding: 0; border-radius: 30px;
            display: flex; flex-direction: column;
            box-shadow: 0 40px 120px rgba(0,0,0,0.12);
        }

        .expanded-content {
            padding: 26px; overflow-y: auto;
            overscroll-behavior: contain; -webkit-overflow-scrolling: touch;
        }

        .overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 999; opacity: 0; pointer-events: none;
            transition: opacity 0.6s var(--spring-fluid);
        }
        .overlay.active { opacity: 1; pointer-events: auto; }

        .tag { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 2px; font-weight: 600; opacity: 0.6; }
        .title { font-size: 19px; font-weight: 400; letter-spacing: -0.5px;}
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 全时段色温映射引擎
        function useChronosEngine() {
            const [label, setLabel] = useState("晴昼");

            useEffect(() => {
                const updateEngine = () => {
                    const hour = new Date().getHours();
                    const root = document.documentElement;
                    let chronos;

                    if (hour >= 5 && hour < 8) {
                        chronos = { label: "晨曦", isDark: false, colors: ["#FEF2F2", "#FFF7ED", "#FDFCF0"] };
                    } else if (hour >= 8 && hour < 17) {
                        // 奶油白/蔚蓝基调 (11:40 AM 模式)
                        chronos = { label: "晴昼", isDark: false, colors: ["#B9E6FE", "#E0F2FE", "#FDFCF0"] }; 
                    } else if (hour >= 17 && hour < 20) {
                        chronos = { label: "暮色", isDark: true, colors: ["#451A03", "#78350F", "#1A0A05"] };
                    } else {
                        chronos = { label: "夜空", isDark: true, colors: ["#0F172A", "#020617", "#010103"] };
                    }

                    root.style.setProperty('--ambient-1', chronos.colors[0]);
                    root.style.setProperty('--ambient-2', chronos.colors[1]);
                    root.style.setProperty('--ambient-stop', chronos.colors[2]);
                    
                    // 亮度均衡器：主文本与材质参数自适应
                    root.style.setProperty('--text-primary', chronos.isDark ? 'rgba(255, 255, 255, 0.95)' : 'rgba(28, 28, 30, 0.85)');
                    root.style.setProperty('--text-sub', chronos.isDark ? 'rgba(255, 255, 255, 0.5)' : 'rgba(60, 60, 67, 0.6)');
                    root.style.setProperty('--rim-light', chronos.isDark ? 'rgba(255, 255, 255, 0.25)' : 'rgba(255, 255, 255, 0.8)');
                    root.style.setProperty('--glass-bg', chronos.isDark ? 'rgba(255, 255, 255, 0.05)' : 'rgba(255, 255, 255, 0.15)');
                    root.style.setProperty('--glass-border', chronos.isDark ? 'rgba(255, 255, 255, 0.1)' : 'rgba(255, 255, 255, 0.4)');
                    
                    setLabel(chronos.label);
                };

                updateEngine();
                const interval = setInterval(updateEngine, 60000);
                return () => clearInterval(interval);
            }, []);

            return label;
        }

        function App() {
            const [activeId, setActiveId] = useState(null);
            const label = useChronosEngine();

            return (
                <div style={{ height: '100%', position: 'relative' }}>
                    <div className="ambient-engine" />
                    <div className="weather-noise" />
                    <div className={`overlay ${activeId ? 'active' : ''}`} onClick={() => setActiveId(null)} />

                    <main style={{ padding: 'calc(var(--safe-top) + 20px) 0' }}>
                        <header style={{ padding: '0 16px', marginBottom: '40px' }}>
                            <h1 style={{ color: 'var(--text-primary)', fontWeight: 300, fontSize: '32px', margin: 0, letterSpacing: '-0.8px' }}>Kuala Lumpur</h1>
                            <p style={{ color: 'var(--text-sub)', fontSize: '14px', marginTop: '6px', fontWeight: 300 }}>{label} · 旅程沉淀中</p>
                        </header>

                        <div className={`nameplate ${activeId === 1 ? 'expanded' : ''}`} onClick={() => { if (!activeId) setActiveId(1); }}>
                            <div className={activeId === 1 ? "expanded-content" : ""}>
                                <div className="tag">Dining · 19:30</div>
                                <div className="title">KIWAMI Yakiniku</div>
                                {activeId === 1 && (
                                    <div style={{ marginTop: '28px', fontSize: '15px', lineHeight: '1.7', color: '#1c1c1e' }}>
                                        <b>材质与色温校验：</b> 当前为晴昼模式，背景已切换为奶油白有机基调。静息铭牌的边缘光 (Rim Light) 会根据当前环境色自动微调折射率。
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className={`nameplate ${activeId === 2 ? 'expanded' : ''}`} onClick={() => { if (!activeId) setActiveId(2); }} style={{ opacity: (activeId && activeId !== 2) ? 0 : 1 }}>
                            <div className={activeId === 2 ? "expanded-content" : ""}>
                                <div className="tag">Flight · 09:00</div>
                                <div className="title">MH001 · 台北</div>
                                {activeId === 2 && (
                                    <div style={{ marginTop: '28px', fontSize: '15px', lineHeight: '1.7', color: '#1c1c1e' }}>
                                        <b>稳定性审计：</b> 系统已完成 3 轮偏执狂级别推演，物理边缘不裁切，120Hz 动态交互零掉帧。
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
