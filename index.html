<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Travel OS - Liquid Glass POC</title>
    <style>
        :root {
            /* 初始环境参数 - 模拟晨雾色调 */
            --ambient-bg-1: #e0e7ff;
            --ambient-bg-2: #f8fafc;
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-color: #1e293b;
            --motion-ease: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
            background: linear-gradient(135deg, var(--ambient-bg-1), var(--ambient-bg-2));
            transition: background 2s var(--motion-ease);
        }

        /* 环境光影动画 */
        .ambient-glow {
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.8) 0%, transparent 60%);
            filter: blur(80px);
            animation: drift 20s infinite alternate linear;
            z-index: 0;
        }

        @keyframes drift {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }

        /* Liquid Glass 卡片 */
        .glass-card {
            position: relative;
            z-index: 10;
            width: 85%;
            max-width: 340px;
            padding: 32px;
            border-radius: 42px; /* 大圆角 */
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(40px) saturate(120%);
            -webkit-backdrop-filter: blur(40px) saturate(120%);
            border: 0.5px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.02);
            text-align: left;
            transform: translateZ(0); /* 开启 GPU 加速 */
            transition: transform 0.6s var(--motion-ease);
        }

        .glass-card:active {
            transform: scale(0.98) translateZ(0);
        }

        .label {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.4;
            margin-bottom: 8px;
        }

        .time {
            font-size: 48px;
            font-weight: 200;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .mood {
            font-size: 16px;
            line-height: 1.6;
            font-weight: 300;
            opacity: 0.8;
        }

        /* 悬浮触控岛 */
        .dock {
            position: absolute;
            bottom: 40px;
            width: 60px;
            height: 6px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <div class="glass-card" id="mainCard">
        <div class="label" id="locationLabel">Kuala Lumpur</div>
        <div class="time" id="clock">17:19</div>
        <div class="mood" id="quote">正在感知光影，准备启程...</div>
    </div>

    <div class="dock"></div>

    <script>
        // 1. 实时时钟逻辑
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').innerText = `${h}:${m}`;
            
            // 模拟环境感应：根据小时改变色温
            const hour = now.getHours();
            const root = document.documentElement;
            if (hour >= 17 || hour <= 6) {
                root.style.setProperty('--ambient-bg-1', '#2d334a'); // 暮色/深夜
                root.style.setProperty('--ambient-bg-2', '#0f172a');
                root.style.setProperty('--text-color', '#f8fafc');
                root.style.setProperty('--glass-border', 'rgba(255, 255, 255, 0.1)');
                document.getElementById('quote').innerText = "夜色温柔，适合沉淀思绪。";
            } else {
                root.style.setProperty('--ambient-bg-1', '#e0e7ff'); // 日间
                root.style.setProperty('--ambient-bg-2', '#ffffff');
                root.style.setProperty('--text-color', '#1e293b');
                root.style.setProperty('--glass-border', 'rgba(255, 255, 255, 0.4)');
                document.getElementById('quote').innerText = "阳光正好，捕捉旅途的每一刻。";
            }
        }

        setInterval(updateClock, 1000);
        updateClock();

        // 2. 简单的陀螺仪视差预演 (需要用户在 iPhone 授权，此处先用触摸模拟)
        const card = document.getElementById('mainCard');
        window.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.clientX) / 25;
            const y = (window.innerHeight / 2 - e.clientY) / 25;
            card.style.transform = `rotateY(${x}deg) rotateX(${y}deg) translateZ(0)`;
        });

        // 模拟手势：上滑 Dock 的逻辑占位
        let startY = 0;
        document.addEventListener('touchstart', (e) => { startY = e.touches[0].clientY; });
        document.addEventListener('touchend', (e) => {
            const endY = e.changedTouches[0].clientY;
            if (startY - endY > 100) {
                alert("进入行程库 (流体转场触发)");
            }
        });
    </script>
</body>
</html>
