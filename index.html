<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Travel OS 1.0.5-S</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <style>
        :root {
            --os-height: 100dvh;
            --safe-top: env(safe-area-inset-top, 47px);
            --safe-bottom: env(safe-area-inset-bottom, 34px);
            --spring-fluid: cubic-bezier(0.23, 1, 0.32, 1);
        }

        body, html {
            width: 100vw; height: var(--os-height);
            margin: 0; padding: 0;
            overflow: hidden; 
            background-color: #0f172a; /* 物理兜底底色，阻断纯黑屏机率 */
            font-family: -apple-system, "SF Pro Display", sans-serif;
            color: #fff;
            -webkit-font-smoothing: antialiased;
        }

        /* 修复一：硬件加速且隔离的环境背景层，解决 Safari 复合层崩溃导致的黑屏 */
        .ambient-engine {
            position: fixed; inset: 0;
            background: linear-gradient(160deg, #3d4465 0%, #111827 100%);
            z-index: -1;
            transform: translateZ(0);
            will-change: transform;
            isolation: isolate;
        }

        /* 亚克力铭牌：静息状态 */
        .nameplate {
            position: relative; width: 100%;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(30px) saturate(1.5);
            -webkit-backdrop-filter: blur(30px) saturate(1.5);
            border: 0.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px; margin-bottom: 12px;
            transition: all 0.5s var(--spring-fluid);
            z-index: 10;
        }

        /* 修复二 & 三：展开状态（绝对对称留白 + 防溢出内部滚动） */
        .nameplate.expanded {
            position: fixed; 
            /* 使用 inset 进行物理约束，确保左右严格 16px 间距，不切边 */
            inset: calc(var(--safe-top) + 20px) 16px auto 16px;
            /* 限制最大高度，防止卡片撑破屏幕 */
            max-height: calc(var(--os-height) - var(--safe-top) - var(--safe-bottom) - 40px);
            background: rgba(255, 255, 255, 0.95);
            color: #000; z-index: 1000;
            padding: 0; /* padding 移交内部滚动区 */
            display: flex; flex-direction: column;
            box-shadow: 0 40px 100px rgba(0,0,0,0.3);
        }

        /* 内部滚动区：吸收超量内容 */
        .expanded-content {
            padding: 24px;
            overflow-y: auto;
            overscroll-behavior: contain; /* 防止滚动穿透到 body */
            -webkit-overflow-scrolling: touch;
        }

        /* 点击外部关闭的影子蒙层 */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 999; opacity: 0; pointer-events: none;
            transition: opacity 0.5s var(--spring-fluid);
        }
        .overlay.active { opacity: 1; pointer-events: auto; }

        .tag { font-size: 10px; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }
        .title { font-size: 18px; font-weight: 400; margin-top: 2px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [activeId, setActiveId] = useState(null);

            const close = (e) => {
                if (e) e.stopPropagation();
                setActiveId(null);
            };

            return (
                <div style={{ height: '100%', position: 'relative' }}>
                    <div className="ambient-engine" />
                    
                    <div className={`overlay ${activeId ? 'active' : ''}`} onClick={close} />

                    <main style={{ padding: 'calc(var(--safe-top) + 20px) 16px' }}>
                        <header style={{ marginBottom: '30px' }}>
                            <h1 style={{ fontWeight: 200, fontSize: '28px' }}>Kuala Lumpur</h1>
                            <p style={{ opacity: 0.4, fontSize: '14px' }}>旅程沉淀中</p>
                        </header>

                        {/* 铭牌 1 */}
                        <div 
                            className={`nameplate ${activeId === 1 ? 'expanded' : ''}`} 
                            onClick={() => { if (!activeId) setActiveId(1); }}
                        >
                            {activeId !== 1 ? (
                                // 静息状态内容
                                <React.Fragment>
                                    <div className="tag">Dining · 19:30</div>
                                    <div className="title">KIWAMI Yakiniku</div>
                                </React.Fragment>
                            ) : (
                                // 展开状态内容 (带内部滚动)
                                <div className="expanded-content">
                                    <div style={{ fontSize: '12px', opacity: 0.5, textTransform: 'uppercase', letterSpacing: '1px' }}>Dining · 19:30</div>
                                    <div style={{ fontSize: '24px', fontWeight: 500, marginTop: '4px' }}>KIWAMI Yakiniku</div>
                                    
                                    <div style={{ marginTop: '24px', animation: 'fadeIn 0.4s' }}>
                                        <p style={{ fontSize: '15px', lineHeight: '1.6', color: '#333' }}>
                                            确认号: #PR7788<br/>
                                            地点: 东京特别区<br/>
                                            备注: 高密度内容测试。系统已锚定内部滚动区域，无论添加多少文字或内容，卡片外壳都将稳固于屏幕中央，不会发生溢屏。
                                        </p>
                                        {/* 模拟长内容以测试滚动 */}
                                        <div style={{ height: '150px', background: 'rgba(0,0,0,0.03)', borderRadius: '12px', marginTop: '16px' }}></div>
                                        <div style={{ height: '150px', background: 'rgba(0,0,0,0.03)', borderRadius: '12px', marginTop: '16px' }}></div>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* 铭牌 2 */}
                        <div 
                            className="nameplate" 
                            onClick={() => { if (!activeId) setActiveId(2); }} 
                            style={{ opacity: activeId ? 0 : 1 }}
                        >
                            <div className="tag">Flight · 09:00</div>
                            <div className="title">MH001 · 台北</div>
                        </div>
                    </main>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
