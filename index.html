<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Travel Log | Titanium S-III</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js" defer></script>
  <style>
    /* ==========================================================================
       OS 1.0.5-S Titanium S-III (Industrial Flagship)
       Apple iOS 26 Liquid Glass Environment
       ========================================================================== */
    :root {
      --apple-ease: cubic-bezier(0.32, 0.72, 0, 1);
      --apple-blue: #0071e3;
      --glass-bg: rgba(255, 255, 255, 0.45);
      --glass-subtle: rgba(255, 255, 255, 0.15);
    }

    body {
      margin: 0; padding: 0; background-color: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      -webkit-font-smoothing: antialiased; overflow: hidden; overscroll-behavior: none;
      width: 100vw; height: 100dvh; position: fixed; /* Safari 物理防護 */
    }

    .font-rounded { font-family: "SF Pro Rounded", "Arial Rounded MT Bold", sans-serif; }

    /* ----------------------------------------------------
       三明治渲染架構 (Sandwich Layering)
       ---------------------------------------------------- */
    #background-layer {
      position: absolute; inset: -20%; z-index: -10; pointer-events: none;
      background: radial-gradient(circle at 15% 15%, #e8f0fe 0%, transparent 50%),
                  radial-gradient(circle at 85% 85%, #f6eef2 0%, transparent 50%);
      background-size: 200% 200%; filter: blur(100px); will-change: transform;
      transition: background 1s var(--apple-ease);
      animation: ambientShift 30s ease-in-out infinite alternate;
    }
    @keyframes ambientShift { 0% { background-position: 0% 0%; } 100% { background-position: 100% 100%; } }

    /* 粒子層：置於背景之上，內容之下 */
    #weather-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 38vh; min-height: 350px;
      z-index: 10; pointer-events: none; opacity: 0; transition: opacity 0.6s var(--apple-ease);
      transform: translateZ(0); contain: strict; 
    }

    #content-layer {
      position: absolute; inset: 0; z-index: 20; overflow-y: auto; overflow-x: hidden;
      padding-bottom: calc(env(safe-area-inset-bottom) + 90px);
      -webkit-overflow-scrolling: touch; scroll-behavior: smooth;
    }

    /* ----------------------------------------------------
       Apple 極簡天氣看板 v3 (Aesthetic Overhaul)
       ---------------------------------------------------- */
    .weather-header { height: 38vh; min-height: 350px; position: relative; color: #FFFFFF; }
    
    .forecast-mask-wrapper { 
      width: 100%; position: relative; z-index: 30;
      -webkit-mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
      mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
      pointer-events: none; 
    }
    .forecast-slot { 
      display: flex; overflow-x: auto; height: 110px; align-items: center; gap: 12px;
      pointer-events: auto; scrollbar-width: none;
    }
    .forecast-slot::-webkit-scrollbar { display: none; }
    
    .forecast-item { 
      flex: 0 0 64px; display: flex; flex-direction: column; align-items: center; justify-content: center;
      scroll-snap-align: center; text-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    /* ----------------------------------------------------
       Liquid Glass & UI 元素
       ---------------------------------------------------- */
    .liquid-glass {
      background: var(--glass-bg); backdrop-filter: blur(25px) saturate(180%);
      -webkit-backdrop-filter: blur(25px) saturate(180%);
      border-radius: 28px; box-shadow: inset 0 0 0 0.5px rgba(255,255,255,0.4), 0 12px 40px rgba(0,0,0,0.05);
      transition: all 0.4s var(--apple-ease);
    }
    .theme-dark .liquid-glass { --glass-bg: rgba(0,0,0,0.25); color: #FFF; }

    /* 導航列 (Tab Bar) */
    .tab-bar {
      position: absolute; bottom: 0; left: 0; width: 100%; z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
      background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      border-top: 0.5px solid rgba(0,0,0,0.1);
      display: flex; justify-content: space-around; align-items: center; height: 84px;
      transition: transform 0.4s var(--apple-ease);
    }
    .tab-bar.keyboard-active { transform: translateY(100%); } /* 鍵盤避讓 */

    /* Push View 全螢幕推入表單 */
    .push-view {
      position: absolute; inset: 0; z-index: 200; background: #f5f5f7;
      transform: translateX(100%); transition: transform 0.4s var(--apple-ease);
      overflow-y: auto; padding-bottom: env(safe-area-inset-bottom);
    }
    .push-view.active { transform: translateX(0); }

    /* ----------------------------------------------------
       Bauhaus 行李清單 & 記帳特化
       ---------------------------------------------------- */
    .inventory-card summary { list-style: none; display: flex; align-items: center; justify-content: space-between; outline: none; }
    .inventory-card summary::-webkit-details-marker { display: none; }
    .progress-bar-sticky { position: sticky; top: 0; z-index: 50; background: rgba(245,245,247,0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }

    .inplace-input { background: rgba(0,0,0,0.04); border-radius: 14px; padding: 14px 18px; width: 100%; border: none; outline: none; font-size: 16px; transition: 0.2s; }
    .inplace-input:focus { background: rgba(0,0,0,0.08); }

    /* 物理雨滴矩陣 */
    .rain { width: 1px; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.6)); position: absolute; animation: rainFall linear infinite; }
    @keyframes rainFall { 0% { transform: rotate(15deg) translate3d(0, -50px, 0); opacity: 0; } 100% { transform: rotate(15deg) translate3d(0, 800px, 0); opacity: 0; } }

    .snap-active { scroll-snap-type: x mandatory; scroll-snap-stop: always; }
    .tap-scale:active { transform: scale(0.96); opacity: 0.8; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="theme-light">

  <div id="background-layer"></div>
  <div id="weather-overlay"></div>
  
  <div id="content-layer" class="no-scrollbar"></div>

  <nav class="tab-bar" id="main-tab-bar" style="display: none;">
    <div class="flex flex-col items-center tap-scale text-[var(--apple-blue)] w-1/4" data-tab="log">
      <i class="fa-solid fa-map-location-dot text-xl mb-1"></i><span class="text-[10px] font-bold">行程</span>
    </div>
    <div class="flex flex-col items-center tap-scale opacity-40 w-1/4 transition-opacity" data-tab="vault">
      <i class="fa-solid fa-briefcase text-xl mb-1"></i><span class="text-[10px] font-bold">保險箱</span>
    </div>
    <div class="flex flex-col items-center tap-scale opacity-40 w-1/4 transition-opacity" data-tab="expense">
      <i class="fa-solid fa-wallet text-xl mb-1"></i><span class="text-[10px] font-bold">記帳</span>
    </div>
    <div class="flex flex-col items-center tap-scale opacity-40 w-1/4 transition-opacity" data-tab="inventory">
      <i class="fa-solid fa-list-check text-xl mb-1"></i><span class="text-[10px] font-bold">行李</span>
    </div>
  </nav>

  <div id="push-view-layer" class="push-view no-scrollbar"></div>

  <script>
    // ==========================================================================
    // Titanium S-III Core Engine
    // ==========================================================================

    const AppUtils = {
      genId: () => 'id-' + Math.random().toString(36).substr(2, 9),
      getLocalToday: () => new Date(Date.now() - new Date().getTimezoneOffset() * 60000).toISOString().split('T')[0],
      formatDate: (s) => new Intl.DateTimeFormat('zh-Hant', { month: 'short', day: 'numeric', weekday: 'short' }).format(new Date(s)),
      getDiffDays: (s, e) => {
        if(!s || !e) return 0;
        const [y1,m1,d1] = s.split('-'); const [y2,m2,d2] = e.split('-');
        return Math.floor((new Date(y2,m2-1,d2) - new Date(y1,m1-1,d1)) / 86400000) + 1;
      },
      // 級聯刪除：確保 0 內存洩漏
      cascadeDelete: (tripId) => {
        ['trip_fin_', 'trip_inv_', 'trip_vault_'].forEach(prefix => localStorage.removeItem(prefix + tripId));
      },
      vibrate: () => { if (navigator.vibrate) navigator.vibrate(10); }
    };

    const DataManager = {
      key: 'OS_S3_TITANIUM',
      state: { trips: [], activeId: null, currentTab: 'log' },
      init() {
        const raw = localStorage.getItem(this.key);
        if (raw) this.state = JSON.parse(raw);
        this.state.view = 'home'; this.state.activeId = null;
        this.save();
      },
      save() { localStorage.setItem(this.key, JSON.stringify(this.state)); }
    };

    // --- 雙引擎天氣 & 時空感應 ---
    const WeatherEngine = {
      async getCoords(city) {
        try {
          const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=zh`);
          const d = await res.json(); if (d.results) return d.results[0];
          const fRes = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(city)}&format=json&limit=1`);
          const fd = await fRes.json(); return fd.length ? { latitude: fd[0].lat, longitude: fd[0].lon, name: city } : null;
        } catch(e) { return null; }
      },
      async fetch24H(city) {
        const c = await this.getCoords(city); if (!c) return null;
        const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${c.latitude}&longitude=${c.longitude}&current_weather=true&hourly=temperature_2m,weathercode&daily=temperature_2m_max,temperature_2m_min&timezone=auto`);
        const d = await r.json(); const cur = d.current_weather;
        const isRainy = [51,53,55,61,63,65,80,81,82,95].includes(cur.weathercode);
        return {
          temp: Math.round(cur.temperature), high: Math.round(d.daily.temperature_2m_max[0]), low: Math.round(d.daily.temperature_2m_min[0]),
          status: isRainy ? '雨' : '晴朗', isRain: isRainy, city: c.name,
          gradient: isRainy ? 'from-[#3a4750] to-[#2c3e50]' : 'from-[#5cb0ff] to-[#80c6ff]', theme: isRainy ? 'theme-dark' : 'theme-light',
          hourly: d.hourly.time.slice(0, 24).map((t, i) => ({
            hour: new Date(t).getHours(), temp: Math.round(d.hourly.temperature_2m[i]),
            icon: [51,53,55,61,63,65,80,81,82,95].includes(d.hourly.weathercode[i]) ? '🌧️' : '☀️'
          }))
        };
      }
    };

    // --- 三明治粒子引擎 ---
    const ParticleEngine = {
      _id: null,
      dispose() { const o = document.getElementById('weather-overlay'); if(o) { o.style.opacity = "0"; setTimeout(() => o.innerHTML='', 600); } this._id = null; },
      init(isRain, id) {
        if(this._id === id) return; this._id = id;
        const o = document.getElementById('weather-overlay'); if(!o) return;
        if(isRain) {
          o.innerHTML = Array(40).fill().map(() => `<div class="rain" style="left:${Math.random()*100}%; animation-duration:${0.6+Math.random()*0.4}s; animation-delay:-${Math.random()}s; height:${12+Math.random()*8}px"></div>`).join('');
          requestAnimationFrame(() => o.style.opacity = "1");
        }
      }
    };

    // --- 核心渲染器 (單例監聽防護) ---
    const Renderer = {
      _resizeTimer: null, _resizeHandler: null, _lastW: 0, _reqId: null,

      render() {
        const c = document.getElementById('content-layer');
        if (!DataManager.state.activeId) {
          document.getElementById('main-tab-bar').style.display = 'none';
          c.innerHTML = this.tempHome(); ParticleEngine.dispose(); document.body.className = 'theme-light';
          document.getElementById('background-layer').className = '';
          if (this._resizeHandler) { window.removeEventListener('resize', this._resizeHandler); this._resizeHandler = null; }
        } else {
          document.getElementById('main-tab-bar').style.display = 'flex';
          this.switchTab(DataManager.state.currentTab || 'log');
        }
      },

      tempHome() {
        return `
          <div class="max-w-3xl mx-auto px-6 py-20">
            <h1 class="text-[34px] font-extrabold mb-10 tracking-tight">我的行程 🧳</h1>
            <div class="space-y-6">
              ${DataManager.state.trips.map(t => `
                <div class="relative overflow-hidden rounded-[28px] group" data-id="${t.id}">
                  <div class="absolute right-0 inset-y-0 w-20 bg-[#FF3B30] flex items-center justify-center text-white tap-scale" data-action="delete-trip" data-id="${t.id}"><i class="fa-solid fa-trash"></i></div>
                  <div class="liquid-glass p-6 tap-scale relative z-10 transition-transform duration-300 swipe-card" data-action="open-trip" data-id="${t.id}">
                    <div class="text-[22px] font-bold">${t.title}</div>
                    <div class="text-[13px] opacity-50">${t.destination} · ${t.days.length} 天</div>
                  </div>
                </div>
              `).join('')}
              <button class="w-full h-16 liquid-glass flex items-center justify-center text-[var(--apple-blue)] font-bold tap-scale" data-action="open-create-modal">+ 新建行程</button>
            </div>
          </div>`;
      },

      async switchTab(tab) {
        DataManager.state.currentTab = tab; DataManager.save();
        document.querySelectorAll('#main-tab-bar > div').forEach(el => {
          el.classList.toggle('opacity-40', el.dataset.tab !== tab);
          el.classList.toggle('text-[var(--apple-blue)]', el.dataset.tab === tab);
        });
        
        const trip = DataManager.state.trips.find(t => t.id === DataManager.state.activeId);
        if (!trip) return;

        if (tab === 'log') await this.renderLog(trip);
        else if (tab === 'inventory') this.renderInventory(trip);
        else if (tab === 'expense') this.renderExpense(trip);
        else if (tab === 'vault') this.renderVault(trip);
      },

      // --- 行程與天氣 ---
      async renderLog(trip) {
        const c = document.getElementById('content-layer');
        const rid = AppUtils.genId(); this._reqId = rid;
        
        // 字體度量級防跳動：H/L 預設佔位
        c.innerHTML = `
          <header class="weather-header">
            <div id="bg-slot" class="absolute inset-0 bg-gray-300 opacity-80 transition-all duration-1000"></div>
            <div class="relative z-20 pt-12 flex flex-col items-center h-full justify-between pb-4">
              <div class="w-full px-6"><button data-action="go-home" class="w-10 h-10 liquid-glass rounded-full flex items-center justify-center tap-scale"><i class="fa-solid fa-chevron-left text-white"></i></button></div>
              <div class="text-center w-full">
                <h2 id="city-title" class="text-2xl font-bold mb-1">${trip.destination}</h2>
                <div id="temp-val" class="text-[84px] font-thin leading-none tracking-tighter">--</div>
                <div class="flex flex-col items-center">
                   <p id="weather-status" class="font-medium text-[15px]">氣象同步中...</p>
                   <p id="hl-val" class="text-[13px] transition-opacity" aria-hidden="true" style="opacity:0; pointer-events:none;">H:-- L:--</p>
                </div>
              </div>
              <div class="forecast-mask-wrapper"><div id="forecast-slot" class="forecast-slot"></div></div>
            </div>
          </header>
          <div class="max-w-3xl mx-auto px-6 mt-12 space-y-10 pb-10" id="timeline-box">
             ${trip.days.map((d, i) => `
               <div class="day-section relative pl-[64px] min-h-[80px]">
                 <div class="absolute left-0 top-0 w-12 h-12 rounded-full bg-white shadow-sm flex flex-col items-center justify-center z-10 text-[var(--apple-blue)] theme-dark:bg-[#1c1c1e]"><span class="text-[9px] font-black mt-1">DAY</span><span class="text-xl font-bold leading-none">${i+1}</span></div>
                 <div class="absolute left-[23px] top-[56px] bottom-[-16px] w-[1.5px] bg-gradient-to-b from-[var(--apple-blue)] to-transparent opacity-30"></div>
                 <div class="flex flex-col items-start mb-6"><span class="text-[12px] font-bold text-[var(--text-sec)] mb-1 uppercase">${d.dateString}</span><h3 class="text-2xl font-bold">${trip.destination}</h3></div>
                 <div id="act-${d.id}" class="space-y-4">
                    ${this.renderVirtualNodes(trip, d)}
                    ${this.tempActivities(d.activities)}
                 </div>
                 <button class="mt-4 text-[var(--apple-blue)] font-bold text-[14px] tap-scale flex items-center gap-2" data-action="open-add-push" data-day="${d.id}"><i class="fa-solid fa-plus-circle"></i> 添加活動</button>
               </div>
             `).join('')}
          </div>`;

        const w = await WeatherEngine.fetch24H(trip.destination);
        if (this._reqId !== rid) return;

        const ts = document.getElementById('temp-val'), ss = document.getElementById('weather-status'), hl = document.getElementById('hl-val');
        if (w) {
          document.body.className = w.theme;
          document.getElementById('background-layer').className = `bg-gradient-to-b ${w.gradient}`;
          document.getElementById('bg-slot').className = 'absolute inset-0 opacity-0'; // 讓全域背景透出
          ts.innerText = w.temp + '°'; ss.innerText = w.status; 
          hl.innerText = `H:${w.high}° L:${w.low}°`; hl.style.opacity = '0.7'; hl.removeAttribute('aria-hidden'); hl.style.pointerEvents = 'auto';
          this.renderHourly(w.hourly); ParticleEngine.init(w.isRain, rid);
        } else {
          ss.innerText = '天氣離線 ☁️'; hl.style.opacity = '0'; hl.setAttribute('aria-hidden', 'true'); hl.style.pointerEvents = 'none';
        }
      },

      tempActivities(acts) {
        if(!acts || !acts.length) return '';
        return acts.map(a => `<div class="relative mb-4"><div class="absolute left-[-45px] top-[22px] w-2 h-2 rounded-full bg-[var(--apple-blue)]"></div><div class="liquid-glass p-4 font-bold text-[17px]">${a.title}</div></div>`).join('');
      },

      renderVirtualNodes(trip, day) {
        // 虛擬注入：數據 0 污染
        const vault = JSON.parse(localStorage.getItem('trip_vault_' + trip.id) || '[]');
        const stays = vault.filter(v => v.type === 'stay' && v.date === day.dateString);
        return stays.map(s => `<div class="relative mb-4"><div class="absolute left-[-45px] top-[22px] w-2 h-2 rounded-full bg-orange-400"></div><div class="liquid-glass p-4 border-l-4 border-orange-400"><div class="text-[12px] opacity-60 mb-1">入住房源</div><div class="font-bold text-[17px]">${s.name}</div></div></div>`).join('');
      },

      renderHourly(f) {
        const slot = document.getElementById('forecast-slot'); if (!slot) return;
        const curH = new Date().getHours();
        slot.innerHTML = f.map(h => {
          const isNow = h.hour === curH;
          return `<div id="${isNow ? 'now-node' : ''}" class="forecast-item ${isNow ? 'font-bold' : 'opacity-80'}">
            <span class="text-[11px] mb-2 opacity-80">${isNow ? 'Now' : h.hour+':00'}</span>
            <span class="text-[24px] mb-2">${h.icon}</span>
            <span class="text-[17px]">${h.temp}°</span>
          </div>`;
        }).join('');

        // Safari 寬度鎖與亞像素置中
        const updatePad = () => {
          if (window.innerWidth === this._lastW) return; this._lastW = window.innerWidth;
          clearTimeout(this._resizeTimer);
          slot.classList.remove('snap-active'); slot.style.scrollSnapType = 'none';
          
          const titleL = document.getElementById('city-title').getBoundingClientRect().left;
          slot.style.paddingLeft = `${titleL}px`; slot.style.paddingRight = `${titleL}px`;
          
          this._resizeTimer = setTimeout(() => {
             const now = document.getElementById('now-node');
             if (now) {
               const cR = slot.getBoundingClientRect(), nR = now.getBoundingClientRect();
               slot.scrollLeft += (nR.left - cR.left) - (cR.width/2) + (nR.width/2);
             }
             setTimeout(() => slot.classList.add('snap-active'), 50);
          }, 150);
        };

        if (this._resizeHandler) window.removeEventListener('resize', this._resizeHandler);
        this._resizeHandler = updatePad; window.addEventListener('resize', this._resizeHandler);
        this._lastW = 0; updatePad();
      },

      // --- 行李清單 (Inventory) ---
      renderInventory(trip) {
        const c = document.getElementById('content-layer'); ParticleEngine.dispose(); document.body.className='theme-light'; document.getElementById('background-layer').className='';
        const key = 'trip_inv_' + trip.id;
        const data = JSON.parse(localStorage.getItem(key) || '[]');
        const cats = ["行前事項", "衣服", "褲子", "外套", "睡衣", "飾品", "鞋子", "個人護理", "醫療用品", "數碼產品", "機場裝備", "隨身包包", "自定義"];
        
        c.innerHTML = `
          <div class="max-w-3xl mx-auto px-6 py-12">
            <div class="progress-bar-sticky py-4 mb-6"><div class="h-1.5 bg-black/5 rounded-full overflow-hidden"><div id="inv-progress" class="h-full bg-[var(--apple-blue)] transition-all duration-500" style="width: 0%"></div></div></div>
            <h1 class="text-3xl font-bold mb-8 tracking-tight">行李清單</h1>
            <div class="space-y-4 pb-10">
              ${cats.map(cat => {
                const items = data.filter(i => i.cat === cat);
                return `
                <details class="inventory-card liquid-glass p-5" ${items.length ? 'open' : ''}>
                  <summary class="font-bold text-lg select-none">${cat} <i class="fa-solid fa-chevron-down text-[12px] opacity-30"></i></summary>
                  <div class="mt-5 space-y-4" id="inv-items-${cat}">
                    ${items.map(i => `
                      <div class="flex items-center justify-between opacity-90" data-id="${i.id}">
                        <label class="flex items-center gap-4 cursor-pointer w-full"><input type="checkbox" class="w-5 h-5 rounded border-gray-300 text-[var(--apple-blue)] focus:ring-0" ${i.done ? 'checked' : ''} onchange="InventoryEngine.toggle('${trip.id}', '${i.id}', this.checked)"> <span class="text-[16px] ${i.done?'line-through opacity-40':''}">${i.name}</span></label>
                        <i class="fa-solid fa-xmark opacity-20 p-2 tap-scale cursor-pointer" onclick="InventoryEngine.del('${trip.id}', '${i.id}')"></i>
                      </div>
                    `).join('')}
                    <input class="inplace-input text-[15px] mt-2" placeholder="+ 新增物品 (按 Enter 保存)" onkeydown="if(event.key==='Enter') InventoryEngine.add('${trip.id}', '${cat}', this)">
                  </div>
                </details>`;
              }).join('')}
            </div>
          </div>`;
        InventoryEngine.updateProgress(trip.id);
      },

      // --- 財務管家 (Expense) ---
      renderExpense(trip) {
        const c = document.getElementById('content-layer'); ParticleEngine.dispose(); document.body.className='theme-light'; document.getElementById('background-layer').className='';
        const data = JSON.parse(localStorage.getItem('trip_fin_' + trip.id) || '[]');
        const totalMYR = data.reduce((s, i) => s + parseFloat(i.myrAmount || 0), 0);
        
        c.innerHTML = `
          <div class="max-w-3xl mx-auto px-6 py-12">
            <div class="liquid-glass p-8 text-center mb-10">
              <div class="text-[13px] font-bold opacity-50 uppercase tracking-widest mb-1">總支出 (MYR)</div>
              <div class="text-[48px] font-black tracking-tighter font-rounded">RM ${totalMYR.toFixed(2)}</div>
            </div>
            <h2 class="text-xl font-bold mb-6">消費明細</h2>
            <div class="space-y-4 pb-10" id="expense-list">
              ${data.length === 0 ? `<div class="text-center opacity-40 py-10">暫無記錄</div>` : data.map(i => `
                <div class="liquid-glass p-5 flex justify-between items-center">
                  <div><div class="font-bold text-[17px] mb-1">${i.title}</div><div class="text-[12px] text-[#9A9283] font-rounded">${i.currency} ${parseFloat(i.amount).toFixed(2)}</div></div>
                  <div class="font-black text-xl font-rounded">RM ${parseFloat(i.myrAmount).toFixed(2)}</div>
                </div>
              `).join('')}
              <button class="w-full h-14 border-2 border-dashed border-black/10 rounded-[20px] font-bold opacity-50 tap-scale text-[15px]" data-action="open-expense-push">+ 記錄一筆消費</button>
            </div>
          </div>`;
      },

      // --- 保險箱 (Vault) ---
      renderVault(trip) {
        const c = document.getElementById('content-layer'); ParticleEngine.dispose(); document.body.className='theme-light'; document.getElementById('background-layer').className='';
        const data = JSON.parse(localStorage.getItem('trip_vault_' + trip.id) || '[]');
        const transits = data.filter(i => i.type === 'transit');
        const stays = data.filter(i => i.type === 'stay');
        
        c.innerHTML = `
          <div class="max-w-3xl mx-auto px-6 py-12">
            <h1 class="text-3xl font-bold mb-8 tracking-tight">旅行保險箱 🛡️</h1>
            <div class="space-y-8 pb-10">
              <section>
                <h3 class="text-[13px] font-bold uppercase tracking-wider opacity-50 mb-4">跨城交通</h3>
                ${transits.length ? transits.map(i => `
                  <div class="liquid-glass p-5 mb-4 flex items-center gap-4">
                    <div class="w-12 h-12 bg-blue-50 rounded-[16px] flex items-center justify-center text-blue-500 text-xl"><i class="fa-solid fa-plane"></i></div>
                    <div><div class="font-bold text-[17px] mb-0.5">${i.name}</div><div class="text-[13px] opacity-50">${i.date}</div></div>
                  </div>
                `).join('') : '<div class="opacity-30 text-[14px]">暫無交通記錄</div>'}
              </section>
              <section>
                <h3 class="text-[13px] font-bold uppercase tracking-wider opacity-50 mb-4">住宿預訂</h3>
                ${stays.length ? stays.map(i => `
                  <div class="liquid-glass p-5 mb-4 flex items-center gap-4">
                    <div class="w-12 h-12 bg-orange-50 rounded-[16px] flex items-center justify-center text-orange-500 text-xl"><i class="fa-solid fa-hotel"></i></div>
                    <div><div class="font-bold text-[17px] mb-0.5">${i.name}</div><div class="text-[13px] opacity-50">${i.date} 入住</div></div>
                  </div>
                `).join('') : '<div class="opacity-30 text-[14px]">暫無住宿記錄</div>'}
              </section>
            </div>
          </div>`;
      }
    };

    // --- 獨立模組引擎 ---
    const InventoryEngine = {
      save(id, d) { localStorage.setItem('trip_inv_' + id, JSON.stringify(d)); },
      get(id) { return JSON.parse(localStorage.getItem('trip_inv_' + id) || '[]'); },
      add(tId, cat, input) {
        const val = input.value.trim(); if(!val) return;
        const d = this.get(tId); d.push({ id: AppUtils.genId(), cat, name: val, done: false });
        this.save(tId, d); input.value = ''; Renderer.renderInventory(DataManager.state.trips.find(t=>t.id===tId));
      },
      toggle(tId, iId, done) {
        const d = this.get(tId); const item = d.find(i => i.id === iId); if(item) { item.done = done; this.save(tId, d); }
        this.updateProgress(tId);
        const el = document.querySelector(`[data-id="${iId}"] span`);
        if(el) { el.classList.toggle('line-through', done); el.classList.toggle('opacity-40', done); }
      },
      del(tId, iId) {
        let d = this.get(tId); d = d.filter(i => i.id !== iId); this.save(tId, d);
        Renderer.renderInventory(DataManager.state.trips.find(t=>t.id===tId));
      },
      updateProgress(tId) {
        const d = this.get(tId); const prog = d.length ? (d.filter(i => i.done).length / d.length) * 100 : 0;
        const el = document.getElementById('inv-progress'); if (el) el.style.width = prog + '%';
        AppUtils.vibrate();
      }
    };

    const FinanceEngine = {
      _rateTimer: null,
      openForm() {
        const trip = DataManager.state.trips.find(t=>t.id===DataManager.state.activeId);
        // 智慧幣種引路：根據目的地簡單判斷
        let recCur = 'MYR'; const dest = trip.destination;
        if(dest.includes('東京') || dest.includes('大阪') || dest.includes('日本')) recCur = 'JPY';
        else if(dest.includes('首爾') || dest.includes('釜山') || dest.includes('韓國')) recCur = 'KRW';
        else if(dest.includes('台北') || dest.includes('台灣')) recCur = 'TWD';

        const layer = document.getElementById('push-view-layer');
        layer.innerHTML = `
          <div class="h-[100dvh] flex flex-col pt-14 px-6 bg-white relative z-20">
            <div class="flex justify-between items-center mb-8"><button class="text-[var(--apple-blue)] font-bold text-lg" data-action="close-push">取消</button><h2 class="font-bold text-lg">記錄消費</h2><div class="w-10"></div></div>
            <div class="space-y-6">
              <input id="fin-title" class="inplace-input text-lg" placeholder="消費項目 (例: 晚餐拉麵)">
              <div class="flex gap-4">
                <select id="fin-cur" class="inplace-input w-1/3 text-center font-bold" onchange="FinanceEngine.calc()">
                  <option value="MYR" ${recCur==='MYR'?'selected':''}>MYR</option><option value="JPY" ${recCur==='JPY'?'selected':''}>JPY</option><option value="KRW" ${recCur==='KRW'?'selected':''}>KRW</option><option value="TWD" ${recCur==='TWD'?'selected':''}>TWD</option><option value="USD" ${recCur==='USD'?'selected':''}>USD</option>
                </select>
                <input id="fin-amt" type="number" class="inplace-input w-2/3 font-rounded font-bold text-lg" placeholder="金額" oninput="FinanceEngine.debounceCalc()">
              </div>
              <div class="text-center"><span id="fin-res" class="text-[32px] font-black font-rounded">RM 0.00</span><div class="text-[11px] text-[#9A9283] mt-1 font-rounded">離線匯率快照</div></div>
            </div>
            <button class="w-full h-14 bg-[var(--apple-blue)] text-white rounded-[20px] font-bold mt-auto mb-10 tap-scale" data-action="save-expense">儲存</button>
          </div>`;
        layer.classList.add('active');
      },
      debounceCalc() { clearTimeout(this._rateTimer); this._rateTimer = setTimeout(() => this.calc(), 500); },
      calc() {
        const amt = parseFloat(document.getElementById('fin-amt').value || 0);
        const cur = document.getElementById('fin-cur').value;
        // Mock 匯率快照
        const rates = { MYR: 1, JPY: 0.03, KRW: 0.0034, TWD: 0.15, USD: 4.7 };
        const myr = amt * (rates[cur] || 1);
        document.getElementById('fin-res').innerText = 'RM ' + myr.toFixed(2);
      },
      save() {
        const t = document.getElementById('fin-title').value.trim();
        const amt = parseFloat(document.getElementById('fin-amt').value || 0);
        if(!t || amt <= 0) return;
        const cur = document.getElementById('fin-cur').value;
        const rates = { MYR: 1, JPY: 0.03, KRW: 0.0034, TWD: 0.15, USD: 4.7 };
        const myr = amt * (rates[cur] || 1);
        
        const trip = DataManager.state.trips.find(t=>t.id===DataManager.state.activeId);
        const data = JSON.parse(localStorage.getItem('trip_fin_' + trip.id) || '[]');
        data.push({ id: AppUtils.genId(), title: t, currency: cur, amount: amt, myrAmount: myr });
        localStorage.setItem('trip_fin_' + trip.id, JSON.stringify(data));
        
        document.getElementById('push-view-layer').classList.remove('active');
        Renderer.renderExpense(trip);
      }
    };

    // --- 四維智慧表單 ---
    const FormEngine = {
      openAddActivity(dayId) {
        const layer = document.getElementById('push-view-layer');
        const trip = DataManager.state.trips.find(t=>t.id===DataManager.state.activeId);
        const day = trip.days.find(d=>d.id===dayId);
        layer.innerHTML = `
          <div class="h-[100dvh] flex flex-col pt-14 px-6 bg-white relative z-20">
            <div class="flex justify-between items-center mb-8"><button class="text-[var(--apple-blue)] font-bold text-lg" data-action="close-push">取消</button><h2 class="font-bold text-lg">添加至 ${day.dateString}</h2><div class="w-10"></div></div>
            <div class="space-y-4">
              <select id="act-type" class="inplace-input font-bold" onchange="FormEngine.toggleFields()">
                <option value="play">🎟️ 遊玩景點</option><option value="transit">✈️ 跨城交通</option><option value="stay">🏨 住宿預訂</option>
              </select>
              <input id="act-title" class="inplace-input" placeholder="名稱 (例: 清水寺 / 航班 MH70 / 希爾頓)">
              <div id="act-detail-box" style="display:none;"><input id="act-detail" class="inplace-input" placeholder="備註細節 (例: 14:00 出發 / 訂單號)"></div>
            </div>
            <button class="w-full h-14 bg-[var(--apple-blue)] text-white rounded-[20px] font-bold mt-auto mb-10 tap-scale" onclick="FormEngine.save('${trip.id}', '${dayId}')">保存並同步</button>
          </div>`;
        layer.classList.add('active');
      },
      toggleFields() {
        const t = document.getElementById('act-type').value;
        document.getElementById('act-detail-box').style.display = (t === 'transit' || t === 'stay') ? 'block' : 'none';
      },
      save(tripId, dayId) {
        const type = document.getElementById('act-type').value;
        const title = document.getElementById('act-title').value.trim();
        const detail = document.getElementById('act-detail') ? document.getElementById('act-detail').value.trim() : '';
        if(!title) return;

        const trip = DataManager.state.trips.find(t=>t.id===tripId);
        const day = trip.days.find(d=>d.id===dayId);

        if (type === 'play') {
          day.activities.push({ id: AppUtils.genId(), title });
          DataManager.save();
        } else {
          // 同步至 Vault (虛擬注入來源)
          const vData = JSON.parse(localStorage.getItem('trip_vault_' + trip.id) || '[]');
          vData.push({ id: AppUtils.genId(), type, name: title, date: day.dateString, detail });
          localStorage.setItem('trip_vault_' + trip.id, JSON.stringify(vData));
        }
        document.getElementById('push-view-layer').classList.remove('active');
        Renderer.renderLog(trip);
      }
    };

    const UI = {
      openCreateModal() {
        const l = document.getElementById('modal-layer'); l.style.pointerEvents = 'auto';
        const d = AppUtils.getLocalToday();
        l.innerHTML = `<div class="absolute inset-0 bg-black/20 backdrop-blur-md" data-action="close-modal"></div><div id="modal-card" class="absolute bottom-0 left-0 w-full liquid-glass rounded-t-[40px] p-8 pb-12 transition-transform duration-500 translate-y-full pointer-events-auto"><h2 class="text-2xl font-bold mb-8 text-center">新的冒險 ☁️</h2><div class="space-y-4"><input id="new-trip-title" class="inplace-input" placeholder="行程名稱" oninput="UI.validate()"><input id="new-trip-dest" class="inplace-input" placeholder="首站城市 (例: 東京)" oninput="UI.validate()"><div class="flex gap-4"><input id="new-trip-start" type="date" class="inplace-input" value="${d}" onchange="UI.validate()"><input id="new-trip-end" type="date" class="inplace-input" value="${d}" onchange="UI.validate()"></div></div><button id="btn-confirm-create" data-action="confirm-create" class="w-full h-14 bg-[#1D1D1F] text-white rounded-2xl font-bold mt-8 opacity-30 transition-opacity" disabled>建立行程</button></div>`;
        setTimeout(() => document.getElementById('modal-card').classList.remove('translate-y-full'), 10);
      },
      validate() {
        const t = document.getElementById('new-trip-title').value, d = document.getElementById('new-trip-dest').value, s = document.getElementById('new-trip-start').value, e = document.getElementById('new-trip-end').value;
        const btn = document.getElementById('btn-confirm-create'); const diff = AppUtils.getDiffDays(s, e);
        const valid = t.trim() && d.trim() && diff >= 1; btn.disabled = !valid; btn.style.opacity = valid ? "1" : "0.3";
      },
      confirmCreateTrip() {
        const t = document.getElementById('new-trip-title').value, d = document.getElementById('new-trip-dest').value, s = document.getElementById('new-trip-start').value, e = document.getElementById('new-trip-end').value;
        const diff = AppUtils.getDiffDays(s, e); const [y, m, day] = s.split('-'); let curr = new Date(y, m-1, day);
        let days = []; for(let i=0; i<diff; i++) { days.push({ id: AppUtils.genId(), dateString: AppUtils.formatDate(curr), activities: [] }); curr.setDate(curr.getDate() + 1); }
        DataManager.state.trips.unshift({ id: AppUtils.genId(), title: t, destination: d, startDate: s, endDate: e, days });
        DataManager.save(); document.getElementById('modal-layer').innerHTML = ''; document.getElementById('modal-layer').style.pointerEvents = 'none'; Renderer.render();
      }
    };

    const App = {
      init() { DataManager.init(); Renderer.render(); this.bind(); this.bindKeyboardAvoidance(); },
      bind() {
        document.addEventListener('click', e => {
          const tAct = e.target.closest('[data-tab]'); if(tAct) Renderer.switchTab(tAct.dataset.tab);
          const act = e.target.closest('[data-action]')?.dataset.action;
          if (act === 'open-trip') { DataManager.state.activeId = e.target.closest('[data-id]').dataset.id; DataManager.state.currentTab='log'; Renderer.render(); }
          else if (act === 'go-home') { clearTimeout(Renderer._resizeTimer); DataManager.state.activeId = null; Renderer.render(); }
          else if (act === 'open-create-modal') UI.openCreateModal();
          else if (act === 'confirm-create') UI.confirmCreateTrip();
          else if (act === 'close-modal') { document.getElementById('modal-layer').innerHTML=''; document.getElementById('modal-layer').style.pointerEvents='none'; }
          else if (act === 'open-add-push') FormEngine.openAddActivity(e.target.closest('[data-day]').dataset.day);
          else if (act === 'close-push') document.getElementById('push-view-layer').classList.remove('active');
          else if (act === 'open-expense-push') FinanceEngine.openForm();
          else if (act === 'save-expense') FinanceEngine.save();
          else if (act === 'delete-trip') {
            const id = e.target.closest('[data-id]').dataset.id;
            DataManager.state.trips = DataManager.state.trips.filter(t=>t.id!==id); DataManager.save();
            AppUtils.cascadeDelete(id); Renderer.render();
          }
        });
      },
      bindKeyboardAvoidance() {
        // iOS Safari 物理鎖：防止鍵盤跳動
        window.addEventListener('focusin', (e) => { if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT') document.getElementById('main-tab-bar').classList.add('keyboard-active'); });
        window.addEventListener('focusout', () => document.getElementById('main-tab-bar').classList.remove('keyboard-active'));
      }
    };

    App.init();
  </script>
</body>
</html>
