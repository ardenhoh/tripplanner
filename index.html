<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的旅行繪本 27.0 架構重構版</title>
    <link rel="icon" href="https://www.shutterstock.com/image-vector/airplane-vector-isolated-emoticon-emoji-600nw-2627946825.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    
    <style>
        /* ================= 核心變數與字體 ================= */
        :root {
            --kr-cream: #F5F3EC; --kr-text: #4A4641; --kr-accent: #9A9283;
            --kr-glass: rgba(255, 255, 255, 0.4); --kr-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
        }

        body, input, textarea, select, button, .hand-drawn { font-family: Arial, sans-serif !important; }
        body { background: var(--kr-cream); color: var(--kr-text); transition: 0.3s; margin: 0; min-height: 100vh; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

        .liquid-glass { background: var(--kr-glass); backdrop-filter: saturate(150%) blur(40px); -webkit-backdrop-filter: saturate(150%) blur(40px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: var(--kr-shadow); border-radius: 24px; position: relative; }

        /* ================= 視圖與導航 ================= */
        .view-screen, .tab-section { display: none; }
        .view-screen.active, .tab-section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(245, 243, 236, 0.9); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 12px 0 25px 0; border-top: 1px solid rgba(255, 255, 255, 0.5); z-index: 1000; }
        .nav-item { color: #C2BCB3; transition: 0.3s; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: var(--kr-text); transform: translateY(-4px); }

        /* ================= 實時天氣與進度條 ================= */
        .hourly-item { flex: 0 0 52px; height: 65px; border-radius: 12px; background: rgba(255, 255, 255, 0.4); display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 0.7rem; margin-right: 8px; border: 1px solid rgba(255, 255, 255, 0.3); }
        .hourly-item.active-hour { background: var(--kr-accent); color: white; transform: scale(1.05); border: none; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); }
        
        #city-progress-wrapper { height: 32px; background: rgba(255, 255, 255, 0.3); border: 1px solid rgba(255, 255, 255, 0.6); border-radius: 8px; margin: 10px 0; overflow: hidden; display: flex; }
        .city-seg { display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: var(--kr-text); border-right: 2px solid white; position: relative; }
        .city-seg:last-child { border-right: none; }
        .city-seg::after { content: ''; position: absolute; inset: 0; background: var(--kr-accent); opacity: 0.1; pointer-events: none; }

        /* ================= 27.0 OmniFab ================= */
        .omni-fab-container { position: fixed; bottom: 85px; right: 20px; z-index: 1050; display: flex; flex-direction: column; align-items: flex-end; gap: 15px; pointer-events: none; }
        .omni-main-btn { width: 56px; height: 56px; border-radius: 50%; background: var(--kr-text); color: white; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3); transition: 0.3s; pointer-events: auto; cursor: pointer; }
        .omni-main-btn.active { transform: rotate(45deg); background: var(--kr-accent); }
        .omni-menu { display: flex; flex-direction: column-reverse; gap: 12px; align-items: flex-end; opacity: 0; pointer-events: none; transition: 0.3s; }
        .omni-menu.active { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .omni-label { background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 0.5px solid rgba(255, 255, 255, 0.6); color: var(--kr-text); padding: 6px 14px; border-radius: 12px; font-size: 13px; font-weight: bold; transition: opacity 0.8s ease; opacity: 1; }
        .omni-label.faded { opacity: 0; pointer-events: none; }
        .omni-icon-circle { width: 48px; height: 48px; border-radius: 50%; background: white; color: var(--kr-accent); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); cursor: pointer; pointer-events: auto; }

        /* ================= 27.0 Bauhaus 全屏物理居中模態框 ================= */
        .bauhaus-modal { display: none; position: fixed; inset: 0; height: 100dvh; background: rgba(0, 0, 0, 0.15); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); z-index: 6000; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; cursor: pointer; }
        .bauhaus-modal.active { display: flex; opacity: 1; }
        .project-grid { display: flex; flex-direction: column; gap: 35px; align-items: center; cursor: default; width: 100%; }
        .circle-btn-group { display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; }
        .bauhaus-circle { width: 75px; height: 75px; border-radius: 50%; background: var(--kr-accent); color: white; display: flex; align-items: center; justify-content: center; font-size: 26px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15); transition: 0.2s; }
        .bauhaus-circle:active { transform: scale(0.9); }
        .bauhaus-label { font-size: 14px; font-weight: bold; color: var(--kr-text); letter-spacing: 1px; }

        /* 表單與輸入元件 */
        .form-box { background: rgba(255, 255, 255, 0.7); border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 28px; padding: 30px; width: 90%; max-width: 350px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1); cursor: default; max-height: 90vh; overflow-y: auto; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 14px; border: none; background: rgba(255, 255, 255, 0.8); font-size: 15px; color: var(--kr-text); margin-bottom: 12px; outline: none; box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02); font-weight: bold; }
        .btn-primary { background: var(--kr-accent); color: white; padding: 14px; border-radius: 16px; font-weight: bold; width: 100%; border: none; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1); transition: 0.2s; cursor: pointer; }
        .btn-primary:active { transform: scale(0.95); }
        
        /* 智慧推薦下拉框 */
        .smart-suggestion { position: absolute; top: 100%; left: 0; right: 0; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); z-index: 7000; overflow: hidden; margin-top: -10px; border: 1px solid #eee; }
        .suggestion-item { padding: 12px 15px; border-bottom: 1px solid #f5f5f5; font-size: 14px; font-weight: bold; cursor: pointer; }

        /* 預覽與全屏 */
        #fullscreen-preview { display: none; position: fixed; inset: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.95); z-index: 8000; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        #preview-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .close-fullscreen { position: fixed; top: 25px; right: 25px; background: rgba(255, 255, 255, 0.3); color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; z-index: 8100; cursor: pointer; }
    </style>
</head>
<body class="theme-cream">

    <!-- 首頁視圖 -->
    <div id="home-view" class="view-screen active px-5 pt-10">
        <h1 class="text-3xl font-bold mb-6 tracking-tight">My Travel Books ✈️</h1>
        <div id="trip-list" class="space-y-4"></div>
        <div class="liquid-glass p-6 mt-8 border-dashed border-2">
            <h3 class="font-bold text-gray-700 mb-3 text-sm">✨ 創建新繪本</h3>
            <input type="text" id="new-trip-title" placeholder="輸入行程名稱...">
            <button class="btn-primary" onclick="initNewTrip()">新增旅行</button>
        </div>
    </div>

    <!-- 行程管理視圖 -->
    <div id="trip-view" class="view-screen">
        <header class="p-5 flex justify-between items-center sticky top-0 z-50 bg-[#F5F3EC]/90 backdrop-blur">
            <button onclick="goHome()" class="text-gray-400 text-xl"><i class="fa-solid fa-chevron-left"></i></button>
            <input type="text" id="trip-title-input" class="text-lg font-bold bg-transparent border-none text-center w-2/3" onchange="updateTripTitle()">
            <div class="w-6"></div>
        </header>

        <main class="max-w-md mx-auto px-4">
            
            <!-- Tab 1: 每日行程 -->
            <div id="daily" class="tab-section active">
                <div class="overflow-x-auto scrollbar-hide mb-2"><div class="flex gap-2" id="day-selector"></div></div>
                <!-- 27.0 城市進度條 -->
                <div id="city-progress-wrapper"><div id="city-progress-bar" class="w-full h-full flex"></div></div>
                <!-- 12AM-11PM 天氣區塊 -->
                <div id="weather-banner" class="liquid-glass p-5 mb-4 overflow-hidden min-h-[120px]"></div>
                <!-- 行程卡片區塊 -->
                <div id="daily-content" class="space-y-4 pb-10"></div>
            </div>

            <!-- Tab 2: 交通與住宿 -->
            <div id="trans-stay" class="tab-section">
                <h2 class="text-xl font-bold mb-6 text-center">交通與住宿 🏨✈️</h2>
                <div id="stay-content" class="space-y-4 mb-8"></div>
                <div id="flight-content" class="space-y-4 pb-10"></div>
            </div>

            <!-- Tab 3: 花費 -->
            <div id="expenses" class="tab-section">
                <h2 class="text-xl font-bold mb-6 text-center">花費記帳 💰</h2>
                <div class="liquid-glass p-5 mb-4"><div class="text-xs text-gray-400 mb-2">總預算設定</div><input type="number" id="tripBudget" class="text-center font-bold text-2xl bg-transparent" onchange="updateBudget(this.value)"></div>
                <div id="expense-summary" class="mb-4"></div>
                <div class="liquid-glass p-5 mb-6"><h3 class="text-sm font-bold mb-3">實時匯率計算</h3><div class="flex gap-2 mb-2"><select id="curFrom"></select><input type="number" id="curAmount" value="100" class="w-2/3" oninput="convertCur()"></div><div class="flex gap-2"><select id="curTo"></select><input type="text" id="curResult" class="w-2/3 bg-white" readonly></div></div>
                <div class="liquid-glass p-5 mb-6"><h3 class="text-sm font-bold mb-3">新增花費</h3><input type="text" id="expName" placeholder="花費項目名稱"><div class="flex gap-2"><select id="expType" class="w-1/3"><option>🍽️ 餐飲</option><option>🚕 交通</option><option>🎫 門票</option><option>🏨 住宿</option><option>🛍️ 購物</option></select><select id="expCur" class="w-1/3"></select><input type="number" id="expAmt" placeholder="金額" class="w-1/3 text-right"></div><button class="btn-primary mt-2" onclick="addExpense()">新增紀錄</button></div>
                <div id="expense-list" class="space-y-3 pb-10"></div>
            </div>

            <!-- Tab 4: 行李 -->
            <div id="packing" class="tab-section">
                <h2 class="text-xl font-bold mb-6 text-center">行李清單 🎒</h2>
                <div class="liquid-glass p-5 mb-6"><div class="flex gap-2"><select id="packCat" class="w-1/3"><option>📄 證件</option><option>👕 衣物</option><option>🔌 電子</option><option>🧴 保養</option></select><input type="text" id="packName" class="w-2/3" placeholder="物品名稱..."><button class="btn-primary w-auto px-4" onclick="addPack()"><i class="fa-solid fa-plus"></i></button></div></div>
                <div id="pack-list" class="space-y-3 pb-10"></div>
            </div>

            <!-- Tab 5: OCR 翻譯 -->
            <div id="translate" class="tab-section">
                <h2 class="text-xl font-bold mb-6 text-center">即時翻譯與 OCR 🗣️</h2>
                <div class="liquid-glass p-5 space-y-4">
                    <div class="flex justify-between items-center gap-2"><select id="langFrom"></select><i class="fa-solid fa-arrow-right text-gray-400"></i><select id="langTo"></select></div>
                    <textarea id="transIn" rows="3" placeholder="輸入要翻譯的文字..."></textarea>
                    <div class="flex gap-2"><button class="btn-primary flex-1" onclick="doTranslate()">翻譯</button><label class="bg-white border flex-1 rounded-xl flex flex-col items-center justify-center cursor-pointer text-xs font-bold text-gray-500"><i class="fa-solid fa-camera text-[var(--kr-accent)] mb-1 text-lg"></i>拍照翻譯<input type="file" accept="image/*" class="hidden" onchange="doOCR(this)"></label></div>
                    <div class="relative"><textarea id="transOut" rows="4" readonly class="bg-white/50"></textarea><button onclick="speakOut()" class="absolute bottom-4 right-4 bg-white shadow-md rounded-full w-10 h-10 text-gray-600"><i class="fa-solid fa-volume-high"></i></button></div>
                </div>
            </div>
        </main>

        <!-- 底部導航 -->
        <nav class="bottom-nav">
            <button class="nav-item active" onclick="switchTab('daily', this)"><i class="fa-solid fa-map-location-dot text-xl"></i><span class="text-[10px] mt-1">行程</span></button>
            <button class="nav-item" onclick="switchTab('trans-stay', this)"><i class="fa-solid fa-plane text-xl"></i><span class="text-[10px] mt-1">住宿</span></button>
            <button class="nav-item" onclick="switchTab('expenses', this)"><i class="fa-solid fa-wallet text-xl"></i><span class="text-[10px] mt-1">花費</span></button>
            <button class="nav-item" onclick="switchTab('packing', this)"><i class="fa-solid fa-suitcase text-xl"></i><span class="text-[10px] mt-1">行李</span></button>
            <button class="nav-item" onclick="switchTab('translate', this)"><i class="fa-solid fa-language text-xl"></i><span class="text-[10px] mt-1">翻譯</span></button>
        </nav>

        <!-- 27.0 OmniFab Apple 質感重構 -->
        <div class="omni-fab-container">
            <div class="omni-menu" id="omni-menu">
                <div class="omni-item" onclick="openBauhausModal()">
                    <span class="omni-label">添加項目</span>
                    <div class="omni-icon-circle"><i class="fa-solid fa-plus"></i></div>
                </div>
            </div>
            <button class="omni-main-btn" id="omni-btn" onclick="toggleOmni()"><i class="fa-solid fa-plus"></i></button>
        </div>
    </div>

    <!-- 27.0 Bauhaus 極簡項目選擇 (點擊背景關閉) -->
    <div id="bauhaus-modal" class="bauhaus-modal" onclick="closeModal('bauhaus-modal')">
        <div class="project-grid" onclick="event.stopPropagation()">
            <div class="circle-btn-group" onclick="openFormModal('city')"><div class="bauhaus-circle"><i class="fa-solid fa-city"></i></div><span class="bauhaus-label">城市</span></div>
            <div class="circle-btn-group" onclick="openFormModal('trans')"><div class="bauhaus-circle"><i class="fa-solid fa-train"></i></div><span class="bauhaus-label">交通</span></div>
            <div class="circle-btn-group" onclick="openFormModal('stay')"><div class="bauhaus-circle"><i class="fa-solid fa-bed"></i></div><span class="bauhaus-label">住宿</span></div>
            <div class="circle-btn-group" onclick="openFormModal('play')"><div class="bauhaus-circle"><i class="fa-solid fa-star"></i></div><span class="bauhaus-label">遊玩</span></div>
        </div>
    </div>

    <!-- 四維智慧表單 -->
    <div id="form-modal" class="bauhaus-modal" style="background: rgba(0,0,0,0.5);" onclick="closeModal('form-modal')">
        <div class="form-box relative" id="form-content" onclick="event.stopPropagation()"></div>
    </div>

    <!-- 預覽視窗 -->
    <div id="fullscreen-preview" onclick="closePreview()"><div class="close-fullscreen" onclick="event.stopPropagation(); closePreview()"><i class="fa-solid fa-xmark"></i></div><img id="preview-img" src=""></div>

    <script>
        // ==========================================
        // 核心架構：IndexedDB 數據庫模組
        // ==========================================
        const dbName = "TravelBookDB_v27"; 
        let db;
        
        const initDB = new Promise((resolve) => {
            const req = indexedDB.open(dbName, 1);
            req.onupgradeneeded = (e) => {
                db = e.target.result;
                if (!db.objectStoreNames.contains('trips')) db.createObjectStore('trips', { keyPath: 'id' });
            };
            req.onsuccess = (e) => {
                db = e.target.result;
                resolve();
            };
        });

        async function saveDB(store, id, data) {
            await initDB;
            return new Promise((resolve) => {
                const tx = db.transaction(store, 'readwrite');
                tx.objectStore(store).put({ id, data });
                tx.oncomplete = resolve;
            });
        }

        async function getAllDB(store) {
            await initDB;
            return new Promise((resolve) => {
                const tx = db.transaction(store, 'readonly');
                const req = tx.objectStore(store).getAll();
                req.onsuccess = () => resolve(req.result.map(x => x.data));
            });
        }

        // ==========================================
        // 全域變數與 14 天深度點評 JSON
        // ==========================================
        let allTrips = []; 
        let currentTrip = null; 
        let currentDayIdx = 0; 
        let exchangeRates = {};

        const DEEP_ANALYSIS = {
            intro: "身為數據分析師，我觀察到這處空間的幾何結構與包浩斯『形式追隨功能』的教條高度契合。不鏽鋼骨架與大面積玻璃帷幕的折射率經過精確計算，在不同時段呈現出的光影矩陣具有極高的數據美學價值，停留兩小時是獲取感官邊際效益最大化的最優解。",
            pos: "空間動線規劃完美符合流體力學數據，採光層次分明且不冰冷，展現了極致的結構美學。每一個轉角皆是黃金比例的構圖，對於追求秩序感的靈魂而言，這裡提供了無與倫比的情緒溢價與感官數據反饋。",
            neg: "週末人流量會產生顯著的噪聲數據噪音，嚴重干擾對幾何空間的沉浸式解構。周邊餐飲定價存在明顯的觀光客溢價，其性價比曲線極度陡峭，建議將預算集中於更能產生價值的情緒體驗，避開非理性的溢價消費。"
        };

        function generate14DaysData() {
            const regions = ["吉隆坡","吉隆坡","吉隆坡","釜山","釜山","釜山","釜山","釜山","首爾","首爾","首爾","首爾","首爾","首爾"];
            let daily = [];
            for(let i = 0; i < 14; i++) {
                let dateObj = new Date(2026, 9, 29); // 2026/10/29
                dateObj.setDate(dateObj.getDate() + i);
                let dateString = `${dateObj.getFullYear()}/${(dateObj.getMonth()+1).toString().padStart(2,'0')}/${dateObj.getDate().toString().padStart(2,'0')}`;
                
                daily.push({
                    date: dateString,
                    region: regions[i],
                    items: [{
                        id: Date.now() + i,
                        time: "10:00",
                        task: `${regions[i]} 幾何街區探索`,
                        loc: `${regions[i]} 藝術中心`,
                        intro: DEEP_ANALYSIS.intro,
                        review: { pos: DEEP_ANALYSIS.pos, neg: DEEP_ANALYSIS.neg },
                        img: "https://images.unsplash.com/photo-1514933651103-005eec06c04b?w=600",
                        isAuto: false,
                        lat: 35.1,
                        lng: 129.0
                    }]
                });
            }
            return daily;
        }

        // ==========================================
        // 生命週期與視圖導航
        // ==========================================
        window.onload = async function() {
            await initDB;
            allTrips = await getAllDB('trips');
            if (allTrips.length === 0) {
                const defaultTrip = {
                    id: Date.now().toString(),
                    title: "2026 苦盡柑來 🍊",
                    budget: 50000,
                    daily: generate14DaysData(),
                    stays: [],
                    flights: [],
                    expenses: [],
                    packs: [{c: "📄 證件", n: "護照正本"}]
                };
                await saveDB('trips', defaultTrip.id, defaultTrip);
                allTrips = [defaultTrip];
            }
            fetchExchangeRates();
            initTranslationLanguages();
            renderHome();
        };

        function renderHome() {
            document.getElementById('home-view').classList.add('active');
            document.getElementById('trip-view').classList.remove('active');
            
            const listHTML = allTrips.map(trip => `
                <div class="liquid-glass p-5 border-l-8 border-[var(--kr-accent)] cursor-pointer" onclick="openTrip('${trip.id}')">
                    <div class="flex justify-between items-start">
                        <h2 class="text-2xl font-bold">${trip.title}</h2>
                        <button class="text-gray-400" onclick="event.stopPropagation(); deleteTrip('${trip.id}')">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                    <p class="text-xs text-gray-500 mt-2">${trip.daily.length} 天行程 | 出發: ${trip.daily[0].date}</p>
                </div>
            `).join('');
            
            document.getElementById('trip-list').innerHTML = listHTML;
        }

        async function initNewTrip() {
            const titleInput = document.getElementById('new-trip-title').value || '未命名行程';
            const newTrip = {
                id: Date.now().toString(),
                title: titleInput,
                budget: 50000,
                daily: generate14DaysData(),
                stays: [], flights: [], expenses: [], packs: []
            };
            await saveDB('trips', newTrip.id, newTrip);
            allTrips.push(newTrip);
            document.getElementById('new-trip-title').value = '';
            renderHome();
        }

        async function deleteTrip(id) {
            if (confirm("確定要刪除這趟旅行嗎？")) {
                allTrips = allTrips.filter(t => t.id !== id);
                await saveDB('trips', id, null);
                renderHome();
            }
        }

        function goHome() {
            document.getElementById('trip-view').classList.remove('active');
            document.getElementById('home-view').classList.add('active');
        }

        async function openTrip(id) {

        // ==========================================
        // 27.0 數據分發閉環邏輯 (Smart Sync)
        // ==========================================
        function getDatesInRange(startDate, endDate) {
            let dateArray = [];
            let currentDate = new Date(startDate);
            let lastDate = new Date(endDate);
            while (currentDate <= lastDate) {
                dateArray.push(`${currentDate.getFullYear()}/${(currentDate.getMonth() + 1).toString().padStart(2, '0')}/${currentDate.getDate().toString().padStart(2, '0')}`);
                currentDate.setDate(currentDate.getDate() + 1);
            }
            return dateArray;
        }

        async function smartSyncData() {
            // 清理過往自動生成的連動卡片
            currentTrip.daily.forEach(day => {
                day.items = day.items.filter(item => !item.isAuto);
            });

            // 處理住宿連動：首站插入邏輯
            currentTrip.stays.forEach(stay => {
                const dateRange = getDatesInRange(stay.in, stay.out);
                dateRange.forEach((dateString, index) => {
                    let dayObj = currentTrip.daily.find(d => d.date === dateString);
                    if (dayObj) {
                        if (index === 0) {
                            dayObj.items.push({
                                id: `stay_in_${stay.id}`, time: "15:00", task: `入住 ${stay.name}`, loc: stay.name,
                                isAuto: true, intro: DEEP_ANALYSIS.intro, review: { pos: DEEP_ANALYSIS.pos, neg: DEEP_ANALYSIS.neg }, img: "https://images.unsplash.com/photo-1566073771259-6a8506099945?w=600"
                            });
                        } else {
                            // 首站強制設置為從飯店出發
                            dayObj.items.unshift({
                                id: `stay_out_${stay.id}_${index}`, time: "09:00", task: `從 ${stay.name} 出發`, loc: stay.name,
                                isAuto: true, intro: DEEP_ANALYSIS.intro, review: { pos: DEEP_ANALYSIS.pos, neg: DEEP_ANALYSIS.neg }, img: "https://images.unsplash.com/photo-1566073771259-6a8506099945?w=600"
                            });
                        }
                    }
                });
            });

            // 處理長途交通連動
            currentTrip.flights.forEach(flight => {
                let dayObj = currentTrip.daily.find(d => d.date === flight.date);
                if (dayObj) {
                    dayObj.items.push({
                        id: `flight_${flight.id}`, time: flight.time, task: flight.title, loc: flight.route,
                        isAuto: true, intro: DEEP_ANALYSIS.intro, review: { pos: DEEP_ANALYSIS.pos, neg: DEEP_ANALYSIS.neg }, img: "https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=600"
                    });
                }
            });

            await saveDB('trips', currentTrip.id, currentTrip);
        }

        // ==========================================
        // 天氣 API、Haversine 距離與主視圖渲染
        // ==========================================
        function getWMOWestIcon(code) {
            if ([0].includes(code)) return '☀️';
            if ([1, 2, 3].includes(code)) return '☁️';
            if ([51, 61, 80].includes(code)) return '🌧️';
            return '🌥️';
        }

        function calculateHaversineDistance(lat1, lon1, lat2, lon2) {
            if (!lat1 || !lon1 || !lat2 || !lon2) return 0;
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

            const itemsHTML = currentDayData.items.map((item, index) => {

                let cardHTML = `

        // 匯率與記帳邏輯
        async function fetchExchangeRates() {
            try {
                const response = await fetch("https://open.er-api.com/v6/latest/USD");
                const data = await response.json();
                exchangeRates = data.rates;
                const optionsHTML = ["MYR", "KRW", "TWD", "JPY", "USD"].map(cur => `<option value="${cur}">${cur}</option>`).join('');
                document.getElementById('curFrom').innerHTML = optionsHTML;
                document.getElementById('curTo').innerHTML = optionsHTML;
                document.getElementById('expCur').innerHTML = optionsHTML;
                document.getElementById('curFrom').value = "MYR";
                document.getElementById('curTo').value = "KRW";
                document.getElementById('expCur').value = "KRW";
                convertCur();
            } catch (e) {
                console.warn("匯率 API 載入失敗");
            }
        }

        function convertCur() {
            const fromCur = document.getElementById('curFrom').value;
            const toCur = document.getElementById('curTo').value;
            const amount = document.getElementById('curAmount').value;
            if (exchangeRates[fromCur] && exchangeRates[toCur]) {
                document.getElementById('curResult').value = ((amount / exchangeRates[fromCur]) * exchangeRates[toCur]).toFixed(2);
            }
        }

            const currency = document.getElementById('expCur').value;

        function renderExpenses() {
            let totalMYR = 0;
            document.getElementById('tripBudget').value = currentTrip.budget;
            
            const listHTML = currentTrip.expenses.map((expense, index) => {
                if (exchangeRates[expense.c] && exchangeRates["MYR"]) {
                    totalMYR += (expense.a / exchangeRates[expense.c]) * exchangeRates["MYR"];
                }
                return `
                    <div class="bg-white/60 p-3 rounded-xl border border-white shadow-sm flex justify-between items-center">
                        <div class="font-bold text-sm text-gray-800">${expense.t} - ${expense.n}</div>
                        <div class="font-mono text-[var(--kr-accent)] font-bold">
                            ${expense.a} ${expense.c}
                            <button onclick="deleteExpenseItem(${index})" class="text-red-400 ml-2"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('expense-list').innerHTML = listHTML;
            
            const budgetSetting = currentTrip.budget || 1;
            const percentage = (totalMYR / budgetSetting) * 100;
            
            document.getElementById('expense-summary').innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="w-full bg-white rounded-full h-2 shadow-inner">
                        <div class="bg-[var(--kr-accent)] h-2 rounded-full" style="width: ${Math.min(percentage, 100)}%"></div>
                    </div>
                    <span class="font-bold text-xs ${percentage > 100 ? 'text-red-500' : 'text-gray-500'}">${percentage.toFixed(1)}%</span>
                </div>
            `;
        }

        }

        // 行李清單
        async function addPack() {
            const category = document.getElementById('packCat').value;
            const itemName = document.getElementById('packName').value;
            if (itemName) {
                currentTrip.packs.push({ c: category, n: itemName });
                await saveDB('trips', currentTrip.id, currentTrip);
                document.getElementById('packName').value = '';
                renderPackList();
            }
        }

        function renderPackList() {
            const listHTML = currentTrip.packs.map((packItem, index) => `
                <div class="flex items-center gap-3 bg-white/60 p-3 rounded-xl border border-white shadow-sm">
                    <input type="checkbox" class="w-5 h-5 accent-[var(--kr-accent)]">
                    <span class="font-bold text-sm text-gray-800 flex-1">${packItem.c} - ${packItem.n}</span>
                    <button onclick="deletePackItem(${index})" class="text-red-400"><i class="fa-solid fa-trash"></i></button>
                </div>
            `).join('');
            document.getElementById('pack-list').innerHTML = listHTML;
        }

        async function deletePackItem(index) {
            currentTrip.packs.splice(index, 1);
            await saveDB('trips', currentTrip.id, currentTrip);
            renderPackList();
        }

        // ==========================================
        // OCR 與即時翻譯 API
        // ==========================================
        function initTranslationLanguages() {
            const languageMap = { "zh": "中文", "ko": "韓文", "ja": "日文", "en": "英文" };
            const optionsHTML = Object.keys(languageMap).map(code => `<option value="${code}">${languageMap[code]}</option>`).join('');
            document.getElementById('langFrom').innerHTML = optionsHTML;
            document.getElementById('langFrom').value = 'zh';
            document.getElementById('langTo').innerHTML = optionsHTML;
            document.getElementById('langTo').value = 'ko';
        }

        async function doTranslate() {
            const inputText = document.getElementById('transIn').value;
            const targetLang = document.getElementById('langTo').value;
            if (!inputText) return;
            
            document.getElementById('transOut').value = "翻譯計算中...";
            try {
                const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(inputText)}&langpair=zh|${targetLang}`);
                const data = await response.json();
                document.getElementById('transOut').value = data.responseData.translatedText;
            } catch (e) {
                document.getElementById('transOut').value = "翻譯失敗，請檢查網路。";
            }
        }

        async function doOCR(inputElement) {
            if (!inputElement.files[0]) return;
            document.getElementById('transIn').value = "讀取圖像特徵中...";
            try {
                const result = await Tesseract.recognize(inputElement.files[0], 'eng+kor+chi_tra');
                document.getElementById('transIn').value = result.data.text.trim();
                doTranslate();
            } catch (e) {
                document.getElementById('transIn').value = "圖像解析失敗。";
            }
        }

        function speakOut() {
            const textToSpeak = document.getElementById('transOut').value;
            const targetLang = document.getElementById('langTo').value;
            let utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = targetLang === 'ko' ? 'ko-KR' : (targetLang === 'ja' ? 'ja-JP' : 'en-US');
            window.speechSynthesis.speak(utterance);
        }

        // ==========================================
        // 全屏預覽交互 (Fullscreen Image Preview)
        // ==========================================
        function closePreview() {
            document.getElementById('fullscreen-preview').style.display = 'none';
        }
    </script>
</body>
</html>
