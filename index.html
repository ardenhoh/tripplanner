<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Travel Log | 行程助手</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js" defer></script>
  <style>
    :root {
      --apple-text: #1d1d1f;
      --apple-secondary: #86868b;
      --apple-blue: #0071e3;
    }

    /* 動態流體背景 (Mesh Gradient) */
    body {
      background: radial-gradient(circle at 15% 50%, #eef2f9, transparent 40%),
                  radial-gradient(circle at 85% 30%, #f6eef2, transparent 50%),
                  radial-gradient(circle at 50% 80%, #f0f0f5, transparent 50%),
                  #f5f5f7;
      background-size: 150% 150%;
      animation: ambientShift 15s ease-in-out infinite alternate;
      color: var(--apple-text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.015em;
    }

    @keyframes ambientShift {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    /* iOS 26 Liquid Glass 核心材質 */
    .liquid-glass {
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(50px) saturate(200%);
      -webkit-backdrop-filter: blur(50px) saturate(200%);
      border: 0.5px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
    }

    /* 統一輸入框標準: 高度 52px, 圓角 16px */
    .input-std {
      height: 52px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.55);
      border: 0.5px solid rgba(255, 255, 255, 0.8);
      padding: 0 16px;
      font-size: 16px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      appearance: none;
      -webkit-appearance: none;
    }
    .input-std:focus {
      background: rgba(255, 255, 255, 0.9);
      border-color: var(--apple-blue);
      box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
      outline: none;
    }

    /* 原生感滾輪選擇器 */
    .wheel-container {
      height: 156px; /* 3 個 item，每個 52px */
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }
    .wheel-item {
      height: 52px;
      scroll-snap-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* 隱藏滾動條 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* 交互手勢過渡 */
    .tap-scale { transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
    .tap-scale:active { transform: scale(0.94); }
  </style>
</head>
<body class="selection:bg-blue-100">

  <div id="app" class="min-h-screen pb-32"></div>

  <!-- 懸浮玻璃按鈕 (Floating Action Button) -->
  <button id="btn-fab" class="fixed bottom-10 left-1/2 -translate-x-1/2 w-[64px] h-[64px] rounded-full liquid-glass flex items-center justify-center text-3xl tap-scale z-[90] text-[var(--apple-text)]">
    <i class="fa-solid fa-plus font-light"></i>
  </button>

  <!-- 建立/編輯行程 Modal -->
  <div id="trip-modal" class="fixed inset-0 z-[100] hidden transition-opacity duration-300">
    <div id="modal-bg" class="absolute inset-0 bg-black/10 backdrop-blur-[2px]"></div>
    <!-- 增加上邊距，確保留白 -->
    <div class="absolute bottom-0 left-0 w-full md:relative md:mx-auto md:mt-24 md:w-[90vw] md:max-w-md liquid-glass md:rounded-[32px] rounded-t-[32px] p-8 pb-12 shadow-2xl transition-transform duration-300 translate-y-full md:translate-y-0" id="modal-card">
      
      <h2 class="text-2xl font-bold mb-8 text-center">開始新的冒險</h2>
      
      <div class="space-y-6">
        <div>
          <label class="block text-[11px] font-bold text-[var(--apple-secondary)] ml-1 mb-2">行程名稱</label>
          <input id="in-title" type="text" class="w-full input-std" placeholder="例如：首爾五日慢遊" />
        </div>
        
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-[11px] font-bold text-[var(--apple-secondary)] ml-1 mb-2">起始日期</label>
            <input id="in-date" type="date" class="w-full input-std text-center" />
          </div>
          <div>
            <label class="block text-[11px] font-bold text-[var(--apple-secondary)] ml-1 mb-2">天數</label>
            <!-- 模擬 iOS 滾輪選擇器 -->
            <div class="relative w-full input-std !p-0 !h-[156px] overflow-hidden bg-white/40">
              <div class="absolute top-1/2 left-0 w-full h-[52px] -translate-y-1/2 bg-black/5 pointer-events-none rounded-[12px]"></div>
              <div id="days-wheel" class="wheel-container no-scrollbar relative z-10 py-[52px]">
                <!-- JS 動態生成 -->
              </div>
            </div>
          </div>
        </div>

        <div class="relative">
          <label class="block text-[11px] font-bold text-[var(--apple-secondary)] ml-1 mb-2">目的地城市</label>
          <input id="in-dests" type="text" class="w-full input-std" placeholder="例如：首爾, 釜山" autocomplete="off" />
          <!-- 智慧推薦折射卡片 -->
          <div id="dest-suggestions" class="absolute bottom-full left-0 w-full mb-2 liquid-glass rounded-[16px] hidden z-[110] max-h-[160px] overflow-y-auto no-scrollbar shadow-xl">
             <!-- JS 動態填充 -->
          </div>
        </div>
      </div>

      <div class="flex gap-3 mt-10">
        <button id="btn-cancel-modal" class="flex-1 h-[52px] rounded-[16px] bg-black/5 font-semibold text-[var(--apple-secondary)] tap-scale">取消</button>
        <button id="btn-confirm-modal" class="flex-1 h-[52px] rounded-[16px] bg-[var(--apple-text)] text-white font-semibold tap-scale shadow-md">建立</button>
      </div>
    </div>
  </div>

  <script>
    // --- 狀態與核心邏輯 (不動) ---
    const STORAGE_KEY = "travel_log_v26_pro";
    let state = {
      trips: [],
      activeId: null,
      view: 'home' 
    };

    function load() {
      const data = localStorage.getItem(STORAGE_KEY);
      if (data) state = JSON.parse(data);
      render();
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function createTrip(title, startDate, daysCount, destsInput) {
      const dests = destsInput.split(/[,，|]+/).map(s => s.trim()).filter(Boolean);
      const days = [];
      for (let i = 0; i < daysCount; i++) {
        const d = new Date(startDate);
        d.setDate(d.getDate() + i);
        days.push({
          id: crypto.randomUUID(),
          date: d.toISOString().split('T')[0],
          destination: dests[i] || dests[dests.length - 1] || "未設定地點",
          items: []
        });
      }
      const newTrip = {
        id: crypto.randomUUID(),
        title,
        startDate,
        daysCount,
        color: '#0071e3', // 使用 Apple Blue 作為主色調
        days
      };
      state.trips.unshift(newTrip);
      state.activeId = newTrip.id;
      state.view = 'editor';
      save();
      render();
    }

    // --- UI 渲染 (套用 Liquid Glass 美學) ---
    function render() {
      const app = document.getElementById('app');
      if (state.view === 'home') {
        document.getElementById('btn-fab').style.display = 'flex'; // 顯示 + 按鈕
        app.innerHTML = `
          <div class="max-w-5xl mx-auto px-8 py-20">
            <header class="mb-16">
              <h1 class="text-4xl font-extrabold tracking-tight">行程助手</h1>
            </header>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
              ${state.trips.length ? state.trips.map(renderTripCard).join('') : renderEmpty()}
            </div>
          </div>
        `;
      } else {
        document.getElementById('btn-fab').style.display = 'none'; // 隱藏 + 按鈕
        app.innerHTML = renderEditor();
      }
      bindEditorEvents(); // 只綁定編輯器內按鈕，Fab 獨立綁定
    }

    function renderEmpty() {
      return `
        <div class="col-span-full py-24 text-center liquid-glass rounded-[32px]">
          <div class="text-5xl mb-4 opacity-80">✈️</div>
          <h3 class="text-xl font-bold">還沒有任何行程</h3>
        </div>
      `;
    }

    function renderTripCard(trip) {
      return `
        <div data-id="${trip.id}" class="trip-card liquid-glass rounded-[28px] p-6 cursor-pointer tap-scale transition-all hover:shadow-lg">
          <div class="flex justify-between items-start mb-12">
            <div class="w-10 h-10 rounded-full shadow-sm opacity-90" style="background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%)"></div>
            <span class="text-[10px] font-bold uppercase tracking-widest text-[var(--apple-secondary)] bg-white/50 px-3 py-1 rounded-full border border-white/40 shadow-sm">${trip.daysCount} DAYS</span>
          </div>
          <h3 class="text-2xl font-bold truncate tracking-tight">${trip.title}</h3>
          <p class="text-[var(--apple-secondary)] text-sm mt-1">${trip.startDate} 出發</p>
        </div>
      `;
    }

    function renderEditor() {
      const trip = state.trips.find(t => t.id === state.activeId);
      if (!trip) return "";
      let typeSums = {}; // 防止報錯

      return `
        <div class="pb-20">
          <nav class="sticky top-0 z-50 liquid-glass px-6 py-4 flex justify-between items-center border-b-0">
            <div class="flex items-center gap-4">
              <button id="btn-back" class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-black/5 tap-scale text-[var(--apple-text)]">
                <i class="fa-solid fa-chevron-left"></i>
              </button>
              <div>
                <h2 class="text-sm font-bold leading-tight">${trip.title}</h2>
                <p class="text-[10px] text-[var(--apple-secondary)] uppercase tracking-widest">${trip.startDate} 起</p>
              </div>
            </div>
            <button id="btn-delete-trip" class="w-10 h-10 rounded-full flex items-center justify-center text-rose-500 hover:bg-rose-50 tap-scale"><i class="fa-solid fa-trash-can"></i></button>
          </nav>

          <main class="max-w-3xl mx-auto px-6 py-8">
            <div class="space-y-6 mt-4">
              ${trip.days.map((day, idx) => `
                <div class="liquid-glass rounded-[32px] p-8 relative group">
                  <div class="flex justify-between items-start mb-8">
                    <div>
                      <span class="text-[10px] font-black text-[var(--apple-blue)] uppercase tracking-widest mb-1 block opacity-80">DAY ${idx + 1}</span>
                      <h3 class="text-3xl font-bold tracking-tight">${day.date.split('-').slice(1).join('/')}</h3>
                    </div>
                    <input 
                      type="text" 
                      placeholder="設定城市"
                      class="text-right font-semibold py-2 px-4 w-1/2 bg-transparent border-none outline-none text-lg focus:bg-white/40 focus:rounded-[12px] transition-all" 
                      value="${day.destination}" 
                      oninput="updateDayPlace('${day.id}', this.value)"
                    />
                  </div>
                  <div class="space-y-3">
                    <button class="w-full h-[52px] rounded-[16px] bg-white/40 text-[var(--apple-text)] font-semibold text-sm hover:bg-white/60 transition-all tap-scale shadow-sm">
                      <i class="fa-solid fa-plus mr-2 opacity-50"></i>添加項目
                    </button>
                  </div>
                </div>
              `).join('')}
            </div>
          </main>
        </div>
      `;
    }

    // --- 事件綁定 ---
    function bindEditorEvents() {
      const btnBack = document.getElementById('btn-back');
      if (btnBack) btnBack.onclick = () => { state.view = 'home'; render(); };

      const btnDelete = document.getElementById('btn-delete-trip');
      if (btnDelete) btnDelete.onclick = () => {
        if(confirm('確定要刪除這份行程嗎？')) {
          state.trips = state.trips.filter(t => t.id !== state.activeId);
          state.view = 'home';
          save();
          render();
        }
      };

      document.querySelectorAll('.trip-card').forEach(card => {
        card.onclick = () => {
          state.activeId = card.dataset.id;
          state.view = 'editor';
          render();
        };
      });
    }

    window.updateDayPlace = function(dayId, val) {
      const trip = state.trips.find(t => t.id === state.activeId);
      const day = trip.days.find(d => d.id === dayId);
      if (day) { day.destination = val; save(); }
    };

    // --- iOS 風格滾輪選擇器邏輯 ---
    let selectedDays = 5;
    function initWheel() {
      const wheel = document.getElementById('days-wheel');
      let html = '';
      for(let i=1; i<=60; i++) {
        html += `<div class="wheel-item text-xl font-semibold select-none text-[var(--apple-text)]" data-val="${i}">${i}</div>`;
      }
      wheel.innerHTML = html;
      
      // 預設滾動至第 5 天 (index 4)
      setTimeout(() => wheel.scrollTo({top: 4 * 52, behavior: 'auto'}), 0);

      wheel.addEventListener('scroll', () => {
        clearTimeout(wheel.timer);
        wheel.timer = setTimeout(() => {
          const index = Math.round(wheel.scrollTop / 52);
          selectedDays = index + 1;
        }, 100); // 防抖
      });
    }

    // --- 智慧推薦邏輯 ---
    const cityDB = ['北京', '台北', '首爾', '釜山', '東京', '大阪', '京都', '曼谷', '新加坡', '吉隆坡', '倫敦', '巴黎', '紐約'];
    function initSmartSuggest() {
      const inDests = document.getElementById('in-dests');
      const suggs = document.getElementById('dest-suggestions');
      
      inDests.addEventListener('input', (e) => {
        // 取最後一個輸入的詞
        const parts = e.target.value.split(/[,，]+/);
        const currentWord = parts.pop().trim();
        
        if (!currentWord) { suggs.classList.add('hidden'); return; }
        
        // 匹配資料庫 (包含字首或字中)
        const matches = cityDB.filter(c => c.includes(currentWord) && c !== currentWord);
        if (matches.length === 0) { suggs.classList.add('hidden'); return; }
        
        suggs.innerHTML = matches.map(m => `
          <div class="px-6 py-4 border-b border-white/20 hover:bg-white/40 cursor-pointer font-semibold text-sm transition-colors" onclick="selectCity('${m}')">
            ${m}
          </div>
        `).join('');
        suggs.classList.remove('hidden');
      });

      window.selectCity = function(city) {
        const parts = inDests.value.split(/[,，]+/);
        parts.pop(); 
        parts.push(city);
        inDests.value = parts.join(', ') + (parts.length > 0 ? ', ' : '');
        suggs.classList.add('hidden');
        inDests.focus();
      };

      // 點擊外部隱藏推薦
      document.addEventListener('click', (e) => {
        if(!inDests.contains(e.target) && !suggs.contains(e.target)) {
          suggs.classList.add('hidden');
        }
      });
    }

    // --- Modal 控制與啟動 ---
    const modal = document.getElementById('trip-modal');
    const modalCard = document.getElementById('modal-card');

    function openModal() {
      modal.classList.remove('hidden');
      // 觸發滑出動畫
      setTimeout(() => {
        modalCard.classList.remove('translate-y-full');
      }, 10);
      document.getElementById('in-date').value = new Date().toISOString().split('T')[0];
    }

    function closeModal() {
      modalCard.classList.add('translate-y-full');
      setTimeout(() => { modal.classList.add('hidden'); }, 300);
    }

    document.getElementById('btn-fab').onclick = openModal;
    document.getElementById('btn-cancel-modal').onclick = closeModal;
    document.getElementById('modal-bg').onclick = closeModal;

    document.getElementById('btn-confirm-modal').onclick = () => {
      const title = document.getElementById('in-title').value;
      const date = document.getElementById('in-date').value;
      const dests = document.getElementById('in-dests').value;
      if (title && date) {
        createTrip(title, date, selectedDays, dests);
        closeModal();
        document.getElementById('in-title').value = '';
        document.getElementById('in-dests').value = '';
      } else {
        alert('請填寫行程名稱與起始日期');
      }
    };

    // 系統初始化
    load();
    initWheel();
    initSmartSuggest();
  </script>
</body>
</html>
