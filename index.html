<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Travel Log | 行程助手</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js" defer></script>
  <style>
    /* iOS 26 Liquid Glass 基礎變量 */
    :root {
      --apple-bg: #f5f5f7;
      --apple-text: #1d1d1f;
      --apple-blue: #0071e3;
      --orb-start: #f9feff;
      --orb-end: #eefdff;
    }

    body {
      background: radial-gradient(circle at 15% 50%, #e8f0fe, transparent 50%),
                  radial-gradient(circle at 85% 30%, #f6eef2, transparent 50%),
                  var(--apple-bg);
      background-size: 150% 150%;
      animation: ambientShift 20s ease-in-out infinite alternate;
      color: var(--apple-text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      overscroll-behavior-y: none;
    }

    @keyframes ambientShift { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

    /* --- 材質系統 --- */
    .liquid-glass {
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 0.5px solid rgba(255, 255, 255, 0.6);
    }
    
    .liquid-glass-white {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(50px) saturate(200%);
      -webkit-backdrop-filter: blur(50px) saturate(200%);
    }

    /* --- Liquid Orb 3.0 (羽化與焦散效應) --- */
    .liquid-orb {
      background: linear-gradient(135deg, var(--orb-start) 0%, var(--orb-end) 100%);
      box-shadow: 
        inset 3px 3px 10px rgba(255, 255, 255, 0.9),
        inset -3px -3px 10px rgba(0, 0, 0, 0.04),
        0 4px 12px rgba(0, 0, 0, 0.04);
      position: relative;
      overflow: hidden;
      border-radius: 50%;
    }
    /* 內部流動水銀感 (Caustics) */
    .liquid-orb::after {
      content: '';
      position: absolute;
      top: -10%; left: -10%;
      width: 120%; height: 120%;
      background: radial-gradient(circle at 40% 40%, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 60%);
      filter: blur(4px);
      animation: wobble 4s infinite ease-in-out alternate;
    }
    @keyframes wobble { 
      0% { transform: scale(1) translate(0, 0); } 
      100% { transform: scale(1.15) translate(4px, 4px); } 
    }

    /* --- 左滑刪除手勢 --- */
    .swipe-container { position: relative; overflow: hidden; border-radius: 28px; }
    .swipe-actions {
      position: absolute; right: 0; top: 0; bottom: 0; width: 100px;
      display: flex; align-items: center; justify-content: center;
      color: #FF3B30; font-size: 24px; z-index: 0;
      opacity: 0; /* 初始隱藏，滑動時才顯示，杜絕透底 */
      transition: opacity 0.2s;
    }
    .swipe-card { 
      position: relative; z-index: 1; 
      transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); 
      will-change: transform; 
    }

    /* --- 動態氣象系統 --- */
    .weather-header { height: 35vh; min-height: 340px; overflow: hidden; position: relative; }
    .cloud-particle {
      position: absolute; background: rgba(255, 255, 255, 0.4); 
      filter: blur(30px); border-radius: 50%; 
      animation: cloudFloat 25s infinite linear;
    }
    @keyframes cloudFloat { from { transform: translateX(-150px); } to { transform: translateX(120vw); } }
    .rain-drop {
      position: absolute; width: 1px; height: 60px;
      background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0.6));
      animation: rainFall 0.8s linear infinite;
    }
    @keyframes rainFall { 
      0% { transform: translateY(-100px) rotate(10deg); opacity: 0; } 
      30% { opacity: 1; }
      100% { transform: translateY(800px) rotate(10deg); opacity: 0; } 
    }

    /* --- Accordion & Grid --- */
    .accordion-grid {
      display: grid; grid-template-rows: 0fr;
      transition: grid-template-rows 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: grid-template-rows;
    }
    .accordion-grid.expanded { grid-template-rows: 1fr; }
    .accordion-inner { overflow: hidden; }

    /* --- UI 組件 --- */
    .input-std {
      height: 52px; border-radius: 16px; background: rgba(255, 255, 255, 0.6);
      border: 0.5px solid rgba(0, 0, 0, 0.05); padding: 0 16px; width: 100%;
      font-size: 15px; font-weight: 500; outline: none; transition: background 0.3s;
    }
    .input-std:focus { background: rgba(255, 255, 255, 0.9); }
    
    .suggestion-box {
      position: absolute; top: 100%; left: 0; width: 100%; z-index: 50;
      background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px);
      border-radius: 16px; margin-top: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      border: 0.5px solid rgba(0,0,0,0.05); overflow: hidden;
    }

    /* Floating Glass Tray */
    .glass-tray {
      display: flex; gap: 8px; padding: 12px; border-radius: 20px;
      opacity: 0; transform: translateY(-10px) scale(0.95); pointer-events: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      margin-top: 8px; justify-content: space-around;
    }
    .glass-tray.active { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
    .tray-item {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      font-size: 10px; font-weight: 600; color: var(--apple-secondary);
      padding: 8px; border-radius: 12px; transition: background 0.2s; cursor: pointer;
    }
    .tray-item:active { background: rgba(0,0,0,0.05); }
    
    .tap-scale { transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .tap-scale:active { transform: scale(0.96); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>

  <div id="app"></div>

  <!-- FAB -->
  <button id="btn-fab" class="fixed bottom-10 left-1/2 -translate-x-1/2 w-[64px] h-[64px] rounded-full liquid-glass shadow-xl flex items-center justify-center z-[90] tap-scale">
     <div class="w-12 h-12 liquid-orb flex items-center justify-center text-blue-500 shadow-sm"><i class="fa-solid fa-plus text-lg"></i></div>
  </button>

  <!-- Create Modal -->
  <div id="trip-modal" class="fixed inset-0 z-[100] hidden">
    <div id="modal-bg" class="absolute inset-0 bg-black/15 backdrop-blur-[2px] transition-opacity"></div>
    <div class="absolute bottom-0 left-0 w-full md:relative md:mx-auto md:mt-24 md:max-w-md liquid-glass rounded-t-[32px] md:rounded-[32px] p-8 pb-12 transition-transform translate-y-full" id="modal-card">
      <h2 class="text-2xl font-bold mb-8 text-center tracking-tight">開始新的冒險</h2>
      <div class="space-y-5">
        <input id="in-title" type="text" class="input-std" placeholder="行程名稱" />
        <div class="grid grid-cols-2 gap-4">
          <input id="in-start" type="date" class="input-std text-center" />
          <input id="in-end" type="date" class="input-std text-center" />
        </div>
        <div class="relative">
          <input id="in-dests" type="text" class="input-std" placeholder="目的地城市" autocomplete="off" oninput="appEngine.searchCity(this, 'modal-sug', null)" />
          <div id="modal-sug" class="suggestion-box hidden"></div>
        </div>
      </div>
      <button id="btn-confirm-modal" class="w-full h-[52px] mt-8 rounded-2xl bg-[var(--apple-text)] text-white font-bold tap-scale shadow-lg">建立行程</button>
    </div>
  </div>

  <script>
    // --- 高級團隊: 核心引擎 ---
    const CITY_DB = ['北京', '台北', '首爾', '釜山', '東京', '大阪', '京都', '曼谷', '新加坡', '吉隆坡', '倫敦', '巴黎', '紐約'];
    const STORAGE_KEY = "itinerary_v28_pro";

    const appEngine = {
      state: { trips: [], activeId: null, view: 'home' },
      
      init() {
        const data = localStorage.getItem(STORAGE_KEY);
        if (data) this.state = JSON.parse(data);
        this.render();
        this.bindGlobal();
      },

      save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(this.state)); },

      // 降級系統: Live -> Cache -> Fallback
      async getWeather(city) {
        const cacheKey = `wx_${city}`;
        try {
          // 模擬 API 延遲與數據
          const isRainy = Math.random() > 0.5; 
          const data = { 
            temp: Math.floor(Math.random() * 15) + 15, 
            status: isRainy ? 'Rainy' : 'Cloudy', 
            isRainy 
          };
          localStorage.setItem(cacheKey, JSON.stringify(data));
          return { type: 'live', data };
        } catch (e) {
          const cache = localStorage.getItem(cacheKey);
          return cache ? { type: 'cache', data: JSON.parse(cache) } : 
                         { type: 'fallback', data: { temp: 22, status: 'Cloudy', isRainy: false } };
        }
      },

      // 智慧推薦
      searchCity(input, boxId, dayId) {
        const val = input.value.trim();
        const box = document.getElementById(boxId);
        if(!val) { box.classList.add('hidden'); return; }
        
        const matches = CITY_DB.filter(c => c.includes(val) && c !== val);
        if(matches.length) {
          box.innerHTML = matches.map(m => `
            <div class="px-5 py-4 border-b border-black/5 font-semibold text-[var(--apple-text)] active:bg-black/5" 
                 onclick="appEngine.selectCity('${m}', '${input.id}', '${boxId}', '${dayId}')">
              ${m}
            </div>`).join('');
          box.classList.remove('hidden');
        } else {
          box.classList.add('hidden');
        }
      },

      selectCity(city, inputId, boxId, dayId) {
        document.getElementById(inputId).value = city;
        document.getElementById(boxId).classList.add('hidden');
        if(dayId) {
          const trip = this.state.trips.find(t => t.id === this.state.activeId);
          const day = trip.days.find(d => d.id === dayId);
          if (day) day.destination = city;
          this.save();
        }
      },

      createTrip(title, start, end, dest) {
        const d1 = new Date(start), d2 = new Date(end);
        if(d2 < d1) { alert('返程日期不能早於起始日期'); return; }
        
        const daysCount = Math.ceil((d2 - d1) / 86400000) + 1;
        const days = Array.from({length: daysCount}, (_, i) => {
          const cd = new Date(d1); cd.setDate(cd.getDate() + i);
          return { id: crypto.randomUUID(), date: cd.toISOString().split('T')[0], destination: dest || '未設定' };
        });
        
        this.state.trips.unshift({ id: crypto.randomUUID(), title, startDate: start, endDate: end, daysCount, days });
        this.state.activeId = this.state.trips[0].id;
        this.state.view = 'editor';
        this.save(); this.render();
      },

      // --- UI 渲染模塊 ---
      async render() {
        const app = document.getElementById('app');
        if (this.state.view === 'home') {
          document.getElementById('btn-fab').style.display = 'flex';
          app.innerHTML = this.renderHome();
          this.bindSwipe();
        } else {
          document.getElementById('btn-fab').style.display = 'none';
          app.innerHTML = await this.renderEditor();
        }
      },

      renderHome() {
        return `
          <div class="max-w-3xl mx-auto px-6 py-20">
            <h1 class="text-[34px] font-bold mb-10 tracking-tight">行程助手</h1>
            <div class="space-y-6">
              ${this.state.trips.length ? this.state.trips.map(t => this.renderTripCard(t)).join('') : `<div class="py-20 text-center text-gray-400 font-semibold liquid-glass rounded-[32px]">準備好出發了嗎？</div>`}
            </div>
          </div>
        `;
      },

      renderTripCard(trip) {
        return `
          <div class="swipe-container group bg-transparent" data-id="${trip.id}">
            <div class="swipe-actions liquid-glass-white"><i class="fa-solid fa-trash-can"></i></div>
            <div class="swipe-card p-6 liquid-glass rounded-[28px] cursor-pointer" onclick="appEngine.openTrip('${trip.id}')">
              <div class="flex justify-between items-center mb-8">
                 <div class="w-12 h-12 liquid-orb flex items-center justify-center text-[var(--apple-blue)]"><i class="fa-solid fa-plane"></i></div>
                 <div class="text-right">
                    <p class="text-[10px] font-bold uppercase text-[var(--apple-secondary)] tracking-widest mb-1">Duration</p>
                    <p class="text-xs font-bold text-[var(--apple-text)] bg-white/50 px-3 py-1 rounded-full">${trip.startDate} - ${trip.endDate}</p>
                 </div>
              </div>
              <h3 class="text-2xl font-bold tracking-tight">${trip.title}</h3>
            </div>
          </div>
        `;
      },

      async renderEditor() {
        const trip = this.state.trips.find(t => t.id === this.state.activeId);
        const city = trip.days[0]?.destination || 'Kuala Lumpur';
        const weather = await this.getWeather(city);
        
        // 生成粒子系統 (保證進入即下雨/雲動)
        const particles = Array(12).fill().map(() => `<div class="cloud-particle" style="top:${Math.random()*70}%; width:${150+Math.random()*150}px; height:${80+Math.random()*60}px; animation-delay:-${Math.random()*20}s"></div>`).join('');
        const rain = weather.data.isRainy ? Array(30).fill().map(() => `<div class="rain-drop" style="left:${Math.random()*100}%; animation-delay:-${Math.random()}s"></div>`).join('') : '';

        return `
          <div class="min-h-screen pb-24">
            <header class="weather-header">
               <div class="absolute inset-0 bg-gradient-to-b from-[#7da2b8] to-[#bacfdc] opacity-80"></div>
               ${particles} ${rain}
               
               <div class="relative z-10 px-6 pt-14 pb-6 flex flex-col items-center text-white h-full justify-between">
                  <div class="w-full flex justify-between items-center">
                    <button onclick="appEngine.goHome()" class="w-10 h-10 rounded-full liquid-glass flex items-center justify-center tap-scale"><i class="fa-solid fa-chevron-left text-black"></i></button>
                    <div class="w-10 h-10"></div>
                  </div>
                  
                  <div class="flex flex-col items-center text-center -mt-6 drop-shadow-md">
                    <h2 class="text-3xl font-bold tracking-tight mb-0">${city}</h2>
                    <div class="text-[72px] font-thin leading-none tracking-tighter">${weather.data.temp}°</div>
                  </div>
                  
                  <!-- 24H 預報併入 Header -->
                  <div class="w-full liquid-glass rounded-[24px] p-4 flex gap-6 overflow-x-auto no-scrollbar shadow-lg mt-4 border border-white/40">
                     ${[...Array(8)].map((_, i) => `<div class="flex flex-col items-center gap-2 min-w-[45px]"><span class="text-[11px] font-bold opacity-90">${i===0?'Now':(i+8)+'PM'}</span><i class="fa-solid ${weather.data.isRainy?'fa-cloud-rain':'fa-cloud'} text-lg"></i><span class="font-bold text-[15px]">${weather.data.temp - Math.floor(i/2)}°</span></div>`).join('')}
                  </div>
               </div>
            </header>

            <main class="max-w-3xl mx-auto px-6 mt-10">
              <div class="space-y-2 relative">
                <!-- Timeline 線 -->
                <div class="absolute left-[23px] top-6 bottom-0 w-[2px] bg-black/5"></div>
                ${trip.days.map((day, idx) => this.renderTimelineItem(day, idx)).join('')}
              </div>
            </main>
          </div>
        `;
      },

      renderTimelineItem(day, idx) {
        const d = new Date(day.date);
        const dayStr = ['SUN','MON','TUE','WED','THU','FRI','SAT'][d.getDay()];
        const dateNum = String(d.getDate()).padStart(2, '0');
        
        return `
          <div class="relative pl-16 pb-8 group">
            <div class="absolute left-0 top-1 w-12 h-12 liquid-orb flex flex-col items-center justify-center text-[var(--apple-blue)] shadow-md z-10 tap-scale">
              <span class="text-[9px] font-black uppercase">${dayStr}</span>
              <span class="text-lg font-bold leading-none -mt-0.5">${dateNum}</span>
            </div>
            
            <div class="cursor-pointer tap-scale" onclick="appEngine.toggleAccordion('${day.id}')">
              <div class="flex justify-between items-center liquid-glass rounded-[20px] px-5 py-4">
                 <h4 class="text-[17px] font-bold tracking-tight">${day.destination}</h4>
                 <i id="icon-${day.id}" class="fa-solid fa-chevron-down text-xs text-gray-400 transition-transform duration-400"></i>
              </div>
              
              <div id="acc-${day.id}" class="accordion-grid mt-2">
                 <div class="accordion-inner">
                    <div class="liquid-glass rounded-[24px] p-5 shadow-sm">
                       <!-- 城市編輯與智慧搜尋 -->
                       <div class="relative mb-5">
                          <input id="in-${day.id}" type="text" class="input-std !bg-transparent !border-b !border-0 !border-black/10 !rounded-none !px-0 !h-10 text-xl font-bold placeholder-black/20" value="${day.destination}" oninput="appEngine.searchCity(this, 'sug-${day.id}', '${day.id}')" onclick="event.stopPropagation()" placeholder="輸入城市" />
                          <div id="sug-${day.id}" class="suggestion-box hidden"></div>
                       </div>
                       
                       <div class="relative">
                         <button onclick="appEngine.toggleTray(event, 'tray-${day.id}')" class="w-full py-3.5 rounded-xl border-[1.5px] border-dashed border-black/10 text-sm font-bold text-[var(--apple-blue)] bg-blue-50/50 tap-scale">
                           <i class="fa-solid fa-plus mr-2"></i>添加行程
                         </button>
                         
                         <!-- 懸浮玻璃托盤 (4選項) -->
                         <div id="tray-${day.id}" class="glass-tray liquid-glass shadow-lg" onclick="event.stopPropagation()">
                            <div class="tray-item"><i class="fa-solid fa-train-subway text-lg text-blue-500"></i>交通</div>
                            <div class="tray-item"><i class="fa-solid fa-bed text-lg text-orange-400"></i>住宿</div>
                            <div class="tray-item"><i class="fa-solid fa-ticket text-lg text-rose-400"></i>遊玩</div>
                            <div class="tray-item"><i class="fa-solid fa-map-pin text-lg text-purple-500"></i>城市</div>
                         </div>
                       </div>
                    </div>
                 </div>
              </div>
            </div>
          </div>
        `;
      },

      // --- 交互邏輯 ---
      bindSwipe() {
        document.querySelectorAll('.swipe-card').forEach(card => {
          const container = card.parentElement;
          const actions = container.querySelector('.swipe-actions');
          let startX = 0, currentX = 0;
          
          card.ontouchstart = (e) => { startX = e.touches[0].clientX; card.style.transition = 'none'; actions.style.opacity = '1'; };
          card.ontouchmove = (e) => {
            const diff = e.touches[0].clientX - startX;
            if (diff < 0) { currentX = Math.max(diff, -90); card.style.transform = `translateX(${currentX}px)`; }
          };
          card.ontouchend = () => {
            card.style.transition = 'transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1)';
            if (currentX < -60) {
              card.style.transform = `translateX(-100vw)`;
              setTimeout(() => {
                this.state.trips = this.state.trips.filter(t => t.id !== container.dataset.id);
                this.save(); this.render();
              }, 300);
            } else {
              card.style.transform = `translateX(0)`;
              setTimeout(() => actions.style.opacity = '0', 300);
            }
          };
        });
      },

      toggleAccordion(id) {
        const acc = document.getElementById(`acc-${id}`);
        const icon = document.getElementById(`icon-${id}`);
        if(acc.classList.contains('expanded')) {
          acc.classList.remove('expanded'); icon.style.transform = 'rotate(0deg)';
        } else {
          document.querySelectorAll('.accordion-grid.expanded').forEach(c => {
             c.classList.remove('expanded'); 
             document.getElementById(`icon-${c.id.replace('acc-','')}`).style.transform = 'rotate(0deg)';
          });
          acc.classList.add('expanded'); icon.style.transform = 'rotate(180deg)';
        }
      },

      toggleTray(e, trayId) {
        e.stopPropagation();
        document.querySelectorAll('.glass-tray.active').forEach(t => t.classList.remove('active'));
        document.getElementById(trayId).classList.add('active');
      },

      bindGlobal() {
        document.body.onclick = () => {
          document.querySelectorAll('.glass-tray.active').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.suggestion-box').forEach(b => b.classList.add('hidden'));
        };

        const modal = document.getElementById('trip-modal');
        const card = document.getElementById('modal-card');
        
        document.getElementById('btn-fab').onclick = () => {
          modal.classList.remove('hidden');
          const today = new Date().toISOString().split('T')[0];
          document.getElementById('in-start').value = today; document.getElementById('in-end').value = today;
          setTimeout(() => card.classList.remove('translate-y-full'), 10);
        };

        document.getElementById('modal-bg').onclick = () => {
          card.classList.add('translate-y-full'); setTimeout(() => modal.classList.add('hidden'), 300);
        };

        document.getElementById('btn-confirm-modal').onclick = () => {
          const t = document.getElementById('in-title').value, s = document.getElementById('in-start').value;
          const e = document.getElementById('in-end').value, d = document.getElementById('in-dests').value;
          if(t && s && e) { this.createTrip(t, s, e, d); modal.classList.add('hidden'); }
        };
      },

      openTrip(id) { this.state.activeId = id; this.state.view = 'editor'; this.render(); },
      goHome() { this.state.view = 'home'; this.render(); }
    };

    appEngine.init();
  </script>
</body>
</html>
