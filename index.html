<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Liquid Glass Travel OS - Interaction Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <style>
        :root {
            --os-height: 100dvh;
            --safe-top: env(safe-area-inset-top, 47px);
            --safe-bottom: env(safe-area-inset-bottom, 34px);
            --glass-bg: rgba(255, 255, 255, 0.12);
            --glass-rim: rgba(255, 255, 255, 0.4);
            --text-primary: #1e293b;
            --spring-fluid: cubic-bezier(0.23, 1, 0.32, 1);
        }

        body, html {
            width: 100vw; height: var(--os-height);
            overflow: hidden; background: #e2e8f0;
            font-family: -apple-system, "SF Pro Display", sans-serif;
            color: var(--text-primary);
        }

        /* 动态背景场 */
        .ambient-layer {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 100%);
            z-index: -1;
        }

        #root { height: 100%; position: relative; }

        /* 行程卡片：流体展开逻辑 */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border: 0.5px solid var(--glass-rim);
            border-radius: 28px; padding: 24px;
            margin-bottom: 16px; transition: all 0.6s var(--spring-fluid);
            transform-origin: center;
        }

        /* 展开状态的样式控制 */
        .card.expanded {
            position: fixed; inset: var(--safe-top) 20px auto 20px;
            height: calc(var(--os-height) - var(--safe-top) - var(--safe-bottom) - 100px);
            z-index: 100; background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 40px 100px rgba(0,0,0,0.1);
        }

        .add-button {
            position: fixed; right: 24px; bottom: calc(var(--safe-bottom) + 30px);
            width: 60px; height: 60px; border-radius: 30px;
            background: var(--text-primary); color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; z-index: 50; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s var(--spring-fluid);
        }

        .add-button:active { transform: scale(0.85); }
    </style>
</head>
<body>
    <div class="ambient-layer"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [expandedId, setExpandedId] = useState(null);

            const toggleExpand = (id) => {
                setExpandedId(expandedId === id ? null : id);
            };

            return (
                <div style={{ height: '100%', padding: 'calc(var(--safe-top) + 20px) 24px' }}>
                    <h1 style={{ fontWeight: 300, marginBottom: '30px' }}>Hoh Weng Hong 的行程</h1>
                    
                    {/* 卡片 1 */}
                    <div 
                        className={`card ${expandedId === 1 ? 'expanded' : ''}`}
                        onClick={() => toggleExpand(1)}
                    >
                        <div style={{ opacity: expandedId === 1 ? 0.4 : 1, fontSize: '12px' }}>Tonight · 19:30</div>
                        <div style={{ fontSize: '22px', marginTop: '8px' }}>KIWAMI Yakiniku</div>
                        {expandedId === 1 && (
                            <div style={{ marginTop: '30px', animation: 'fadeIn 0.5s forwards' }}>
                                <p style={{ lineHeight: '1.6' }}>
                                    <b>地址：</b> 东京特别区[cite: 1]<br/>
                                    <b>导航：</b> <span style={{ color: '#3b82f6' }}>点击跳转 Google Maps</span>[cite: 1]<br/>
                                    <b>备注：</b> 享受顶级和牛体验
                                </p>
                                <button style={{ marginTop: '40px', padding: '12px 24px', borderRadius: '12px', border: 'none', background: '#000', color: '#fff' }}>
                                    关闭详情
                                </button>
                            </div>
                        )}
                    </div>

                    {/* 卡片 2 - 演示记账管理 */}
                    <div 
                        className="card"
                        style={{ background: 'rgba(0,0,0,0.05)', marginTop: '40px' }}
                    >
                        <div style={{ fontSize: '12px' }}>记账管理 (Luminous Ledger)[cite: 1]</div>
                        <div style={{ fontSize: '18px', marginTop: '8px' }}>今日结余: -35 MYR[cite: 1]</div>
                    </div>

                    {/* 添加按钮 */}
                    <div className="add-button" onClick={() => alert("唤起语义化输入：'明早 8 点 KLIA 登机'")}>
                        +
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
